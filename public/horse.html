<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data More Horse Racing</title>
  <style>
    body { margin:0; background:#0d1117; color:white; font-family:Arial,sans-serif; padding:20px; }
    .header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .logo { width:55px; height:55px; }
    h1 { margin:0; font-size:28px; font-weight:900; }
    
    .controls { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; align-items: center; }
    button, a, input, select { border:none; border-radius:10px; padding:12px 18px; font-weight:800; cursor:pointer; text-decoration:none; color:white; transition: 0.2s; }
    
    input[type="date"], select { background: #161b22; border: 1px solid #30363d; color: white; }
    
    .btn-load { background:#8b5cf6; }
    .btn-mlb { background:#2563eb; }
    .btn-soccer { background:#22c55e; color:#052e16; }
    .btn-nba { background:#f97316; }

    /* Grid Adaptativo */
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    /* Tarjetas */
    .card {
      background:#161b22;
      border:1px solid #30363d;
      border-left:4px solid #a855f7;
      border-radius:14px;
      padding:14px;
      transition: 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    
    .card.alta { border-left: 4px solid #22c55e; }
    .card.media { border-left: 4px solid #facc15; }
    .card.baja { border-left: 4px solid #ef4444; }

    .race-title { font-size:18px; font-weight:900; color:#c084fc; margin-bottom:4px; }
    .meta { color:#94a3b8; font-size:12px; margin-bottom:12px; }
    
    .pick-box { 
      background:rgba(255,255,255,0.03); 
      border:1px solid rgba(255,255,255,0.1); 
      border-radius:10px; 
      margin-bottom:12px;
      padding:10px;
    }
    
    .section-title { color:#38bdf8; font-size:11px; font-weight:900; margin:12px 0 8px; text-transform:uppercase; letter-spacing: 0.5px; }
    .rank-row, .bet { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.07); font-size:12px; }
    .bet { background:#0f172a; padding:8px; border-radius:8px; margin-top:6px; border-bottom:none; }
    
    .pdf-full {
      grid-column: 1 / -1;
      margin-top: 28px;
      background:#161b22;
      border:1px solid #30363d;
      border-radius:16px;
      padding:18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .pdf-full iframe { width:100%; height:850px; border:1px solid #334155; border-radius:12px; background:white; }
  </style>
</head>

<body>
  <div class="header">
    <img src="/logo.png" class="logo" onerror="this.style.display='none'">
    <h1>DATA MORE HORSE</h1>
  </div>

  <div class="controls">
    <input type="date" id="dateInput">
    <select id="trackSelect" style="padding:12px;border-radius:10px;font-weight:900;">
      <option value="gp">Gulfstream Park</option>
      <option value="sa">Santa Anita Park</option>
      <option value="tam">Tampa Bay Downs</option>
      <option value="cd">Churchill Downs</option>
      <option value="kee">Keeneland</option>
      <option value="bel">Belmont / Aqueduct</option>
    </select>
  
    <button class="btn-load" onclick="loadRaces()">🏇 Cargar Retrospecto</button>
    <a class="btn-mlb" href="/">⚾ MLB</a>
    <a class="btn-soccer" href="/soccer">⚽ Soccer</a>
    <a class="btn-nba" href="/nba">🏀 NBA</a>
  </div>

  <div id="races" class="grid"></div>

<script>
// Establecer fecha de hoy por defecto (Zona Horaria America/Chicago)
document.getElementById('dateInput').value = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'America/Chicago',
  year: 'numeric',
  month: '2-digit',
  day: '2-digit'
}).format(new Date());

async function loadRaces() {
  const container = document.getElementById('races');
  container.innerHTML = '<div class="card">Cargando datos...</div>';

  const track = document.getElementById('trackSelect').value;
  const date = document.getElementById('dateInput').value;

  try {
    const res = await fetch(`/api/horse-racing/import-structured?track=${track}&date=${date}`);
    const data = await res.json();

    if (!data.ok || !data.races.length) {
      container.innerHTML = `<div class="card">No hay datos disponibles para la selección actual.</div>`;
      return;
    }

    container.innerHTML = '';

    data.races.forEach((race) => {
      const a = race.analysis;
      const confClass = a ? a.confidence.toLowerCase() : '';

      container.innerHTML += `
        <div class="card ${confClass}">
          <div class="race-title">🏇 Carrera ${race.raceNumber}</div>
          <div class="meta">${race.track.toUpperCase()} • ${race.date}</div>
          ${a ? renderAnalysis(a) : '<p class="small">Sin análisis</p>'}
        </div>
      `;
    });

    // Agregar el PDF dinámico al final
    container.innerHTML += `
      <div class="pdf-full">
        <div class="section-title">Retrospecto oficial completo</div>
        <iframe src="/api/horse-racing/pdf?track=${track}&date=${date}"></iframe>
      </div>
    `;

  } catch (err) {
    container.innerHTML = `<div class="card">Error: ${err.message}</div>`;
  }
}

function renderAnalysis(a) {
  const badge = a.confidence === 'ALTA' ? '🔥' : a.confidence === 'MEDIA' ? '⚠️' : '';
  
  return `
    <div class="section-title">Pick del Modelo</div>
    <div class="pick-box">
      🥇 <span style="color:#22c55e; font-size:16px;"><b>${a.pick}</b></span> ${badge}<br>
      <span style="font-size:11px; color:#94a3b8">Confianza ${a.confidence}</span>
    </div>

    <div class="section-title">Top 3</div>
    ${(a.top3 || []).map((h, i) => `
      <div class="rank-row">
        <span>${i + 1}. ${h.name}</span>
        <span><b>${h.probability}%</b></span>
      </div>
    `).join('')}

    <div class="section-title">Apuestas</div>
    <div class="bet">Win: <b>${a.bets?.win || '-'}</b></div>
    <div class="bet">Ex: <b>${a.bets?.exacta || '-'}</b></div>
    <div class="bet">Tri: <b>${a.bets?.trifecta || '-'}</b></div>
  `;
}

// Carga inicial
loadRaces();
</script>
</body>
</html>
