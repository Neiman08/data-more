<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || !user.proActivo) { window.location.href = '/pago-manual'; }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Picks PRO | Data More</title>
  <style>
    :root {
      --bg-dark: #0d1117; --card-bg: #161b22; --border-color: #30363d;
      --text-main: #c9d1d9; --accent-blue: #38bdf8; --accent-soccer: #22c55e;
      --traffic-green: #22c55e; --traffic-yellow: #facc15; --traffic-red: #ef4444;
    }
    body { background: var(--bg-dark); color: var(--text-main); font-family: sans-serif; margin: 0; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    
    /* TICKER */
    .espn-ticker-container { width: 100%; background: #0b0e14; border-bottom: 1px solid var(--border-color); height: 40px; display: flex; align-items: center; overflow: hidden; position: sticky; top: 0; z-index: 10000; }
    .ticker-wrapper { display: flex; white-space: nowrap; animation: ticker-scroll 150s linear infinite; }
    .ticker-item { display: flex; align-items: center; padding: 0 30px; border-right: 1px solid #1e293b; font-size: 12px; font-weight: 600; }
    .ticker-item img { width: 20px; height: 20px; margin: 0 6px; }
    @keyframes ticker-scroll { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }

    /* HEADER & NAV */
    .brand-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    
    /* CONTROLES UNIFICADOS */
    .controls-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 20px 0;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .controls-bar input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #000;
      color: white;
      font-weight: bold;
    }
    .btn-universal {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: opacity 0.2s;
    }
    .btn-universal:hover { opacity: 0.8; }
    .btn-load { background: #2563eb; }
    .btn-analyze-all { background: #facc15; color: black; }
    .btn-ticket { background: #22c55e; }

    .nav-sports { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
    .nav-btn { width: 140px; height: 45px; border-radius: 12px; border: none; color: white; font-weight: 900; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
    .nav-mlb { background: #2563eb; }
    .nav-soccer { background: #22c55e; color: #052e16; outline: 3px solid #fff; }
    .nav-nba { background: #f97316; }
    .nav-horse { background: #a855f7; }

    /* CARDS */
    .league-title { color: var(--accent-soccer); margin: 25px 0 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; text-transform: uppercase; font-size: 16px; }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
    .game-card { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); border-left: 4px solid var(--accent-soccer); }
    .matchup-pro { display: flex; justify-content: space-between; align-items: center; }
    .team-pro { display: flex; flex-direction: column; align-items: center; width: 40%; text-align: center; }
    .team-pro img { width: 40px; height: 40px; margin-bottom: 5px; }
    .box-score { background: #000; padding: 5px 10px; border-radius: 5px; color: var(--accent-soccer); font-weight: 800; }
    .btn-analyze { background: #2563eb; color: #fff; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
    .pick-res { margin-top: 10px; padding: 10px; background: #000; border-radius: 8px; display: none; font-size: 12px; }
    .stat-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #222; }
  </style>
</head>
<body>

<div class="espn-ticker-container">
  <div class="ticker-wrapper" id="tickerWrapper">Cargando marcadores...</div>
</div>

<div class="container">
  <div class="brand-header">
    <img src="/logo.png" style="width:50px">
    <h1>Data More Soccer</h1>
  </div>

  <div class="controls-bar">
    <input type="date" id="dateSelect" onchange="loadGames()">
    <button class="btn-universal btn-load" onclick="loadGames()">Cargar</button>
    <button class="btn-universal btn-analyze-all" onclick="analyzeAll()">⚡ Analizar Todos</button>
    <button class="btn-universal btn-ticket" onclick="alert('Generando ticket de apuestas...')">🎟 Generar Ticket</button>
  </div>

  <div class="nav-sports">
    <a href="/" class="nav-btn nav-mlb">⚾ MLB</a>
    <a href="/soccer" class="nav-btn nav-soccer">⚽ Soccer</a>
    <a href="/nba" class="nav-btn nav-nba">🏀 NBA</a>
    <a href="/horse.html" class="nav-btn nav-horse">🏇 Hipismo</a>
  </div>

  <div id="gamesList"></div>
</div>

<script>
function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])); }

async function initTicker() {
  const ticker = document.getElementById('tickerWrapper');
  try {
    const res = await fetch('/api/soccer/games-global');
    const data = await res.json();
    if(data.ok) {
      const content = data.games.map(g => `<div class="ticker-item"><img src="${g.homeLogo}">${g.homeScore}-${g.awayScore}<img src="${g.awayLogo}"> <span>${g.time}</span></div>`).join('');
      ticker.innerHTML = content + content;
    }
  } catch(e) {}
}

async function loadGames() {
  const date = document.getElementById('dateSelect').value;
  const container = document.getElementById('gamesList');
  container.innerHTML = '<p style="text-align:center">Cargando...</p>';
  
  try {
    const res = await fetch(`/api/soccer/games-global?date=${date}`);
    const data = await res.json();
    if(!data.ok) return;

    const grouped = {};
    data.games.forEach(g => { (grouped[g.leagueName] = grouped[g.leagueName] || []).push(g); });

    container.innerHTML = '';
    for (const [league, games] of Object.entries(grouped)) {
      let html = `<h2 class="league-title">${escapeHtml(league)}</h2><div class="games-grid">`;
      games.forEach(g => {
        html += `
          <div class="game-card">
            <div class="matchup-pro">
              <div class="team-pro"><img src="${g.homeLogo}"><span>${escapeHtml(g.homeTeam)}</span></div>
              <div class="box-score">${g.homeScore ?? 0} - ${g.awayScore ?? 0}</div>
              <div class="team-pro"><img src="${g.awayLogo}"><span>${escapeHtml(g.awayTeam)}</span></div>
            </div>
            <button class="btn-analyze" onclick="analyze(this, '${g.matchId}', '${g.leagueKey}')">ANALIZAR IA</button>
            <div id="res-${g.matchId}" class="pick-res"></div>
          </div>`;
      });
      html += `</div>`;
      container.innerHTML += html;
    }
  } catch(e) { container.innerHTML = 'Error.'; }
}

async function analyze(btn, matchId, leagueKey) {
  btn.innerText = '...'; btn.disabled = true;
  try {
    const res = await fetch(`/api/soccer/analyze/${matchId}?league=${leagueKey}`);
    const data = await res.json();
    const resDiv = document.getElementById(`res-${matchId}`);
    resDiv.style.display = 'block';
    resDiv.innerHTML = `
      <div class="stat-row"><span>PICK:</span><b>${data.analysis.pick}</b></div>
      <div class="stat-row"><span>Probabilidad:</span><b>${data.analysis.probability}%</b></div>
      <div class="stat-row"><span>Confianza:</span><b>${data.analysis.confidence}</b></div>
    `;
    btn.innerText = 'RE-ANALIZAR'; btn.disabled = false;
  } catch(e) { btn.innerText = 'Error'; }
}

async function analyzeAll() {
  const btns = document.querySelectorAll('.btn-analyze');
  for(let b of btns) { b.click(); await new Promise(r => setTimeout(r, 1000)); }
}

document.getElementById('dateSelect').value = new Intl.DateTimeFormat('en-CA', {timeZone:'America/Chicago'}).format(new Date());
initTicker();
loadGames();
</script>
</body>
</html>
