<!DOCTYPE html>
<html lang="es">
<head>
<style>
  /* Base styles to establish a professional, unified dark theme */
  :root {
    --primary-blue: #3b82f6; 
    --accent-green: #22c55e; 
    --bg-dark-start: #0b1020; 
    --bg-dark-end: #030612; 
    --card-bg-dark: #11182d; 
    --text-main: #ffffff;
    --text-subtle: #94a3b8; 
    --border-dark: #1e293b; 
    --shadow-subtle: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-heavy: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #111b33 0%, var(--bg-dark-start) 45%, var(--bg-dark-end) 100%);
    color: var(--text-main);
    padding: 30px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  .brand-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dark);
  }

  .brand-logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .brand-logo {
    width: 65px;
    height: 65px;
    object-fit: contain;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    padding: 8px;
    border: 1px solid rgba(34, 197, 94, 0.1);
  }

  .brand-header h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 800;
    color: var(--text-main);
    letter-spacing: -0.5px;
  }

  .subtitle {
    margin: 3px 0 0;
    color: var(--text-subtle);
    font-size: 15px;
    font-weight: 500;
  }

  .nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 25px;
  }

  .nav a {
    color: var(--text-main);
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    background: var(--card-bg-dark);
    border: 1px solid var(--border-dark);
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  .nav a:hover:not(.active) {
    background: #19213d;
    border-color: #2e3c54;
  }

  .nav a.active {
    background: var(--primary-blue);
    border-color: #60a5fa;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
  }

  .topbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--card-bg-dark);
    border: 1px solid var(--border-dark);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 25px;
    box-shadow: var(--shadow-subtle);
  }

  label {
    font-weight: 600;
    color: #e2e8f0;
    font-size: 14px;
  }

  input[type="date"] {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #11182d;
    color: var(--text-main);
    font-family: inherit;
    font-size: 14px;
  }

  button {
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--primary-blue);
    color: #ffffff;
  }

  .ticket-btn {
    background: var(--accent-green);
    color: #ffffff;
  }

  .status-box {
    background: var(--card-bg-dark);
    border: 1px solid var(--border-dark);
    color: var(--text-subtle);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 25px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card-bg-dark);
    border: 1px solid var(--border-dark);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow-subtle);
  }

  .matchup-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--border-dark);
  }

  .ball { font-size: 30px; }
  .matchup { font-size: 20px; font-weight: 700; }

  .meta { font-size: 13px; color: var(--text-subtle); line-height: 1.8; margin-bottom: 15px; }

  .odds-badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    background: #0d121f;
    border: 1px solid var(--border-dark);
    color: #93c5fd;
  }

  .lineup-container {
    background: rgba(0, 0, 0, 0.15);
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
    border: 1px solid var(--border-dark);
  }

  .teams-header {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 15px;
    color: #e2e8f0;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .lineups { display: flex; justify-content: space-between; gap: 15px; }
  .team-lineup { width: calc(50% - 7.5px); }

  .player {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    font-size: 13px;
  }

  .order { font-weight: 600; color: var(--accent-green); margin-right: 8px; }
  .p-name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pos { color: var(--text-subtle); background: #1e293b; padding: 1px 4px; border-radius: 4px; font-size: 11px; }

  .confirmed-badge {
    background: rgba(34, 197, 94, 0.1);
    color: var(--accent-green);
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 600;
    font-size: 11px;
  }

  .result { margin-top: 15px; display: none; }
  .pick-box { padding: 16px; border-radius: 10px; font-weight: 600; margin-top: 12px; }
  .alta { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--accent-green); }
  .media { background: rgba(234, 179, 8, 0.1); border: 1px solid #facc15; }
  .baja { background: rgba(239, 68, 68, 0.1); border: 1px solid #fb7185; }

  .extra-box {
    margin-top: 12px;
    padding: 16px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid var(--border-dark);
    font-size: 13px;
  }

  .extra-title { color: #7dd3fc; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>

<body>
  <div class="container">
    <div class="brand-header">
      <div class="brand-logo-container">
        <img src="/logo.png" class="brand-logo">
        <div>
          <h1>Data More MLB Picks</h1>
          <p class="subtitle">Moneyline, Run Line, Team Totals</p>
        </div>
      </div>
    </div>

    <div class="nav">
        <a href="/" class="active">⚾ MLB</a>
        <a href="/soccer">⚽ Soccer</a>
    </div>

    <div class="topbar">
      <div>
        <label for="date">Fecha:</label>
        <input type="date" id="date" />
      </div>
      <button id="loadBtn" class="btn-primary">Cargar juegos</button>
      <button id="analyzeAllBtn" class="btn-primary">Analizar todos</button>
      <button id="ticketBtn" class="ticket-btn">🎟️ Generar Ticket</button>
    </div>

    <div id="statusBox" class="status-box">Cargando interfaz...</div>
    <div id="games" class="grid"></div>
  </div>

  <script>
// 🔥 TRAER LINEUP
async function getLineup(gamePk) {
  const res = await fetch(`/api/baseball/lineup/${gamePk}`);
  return await res.json();
}

// 🎯 RENDER LINEUPS (Ajustado con nombres de equipos)
function renderLineups(data) {
  if (!data.ok || !data.awayLineup || !data.homeLineup) return '';

  return `
    <div class="lineup-container">
      <div class="teams-header">
        <div>${data.awayTeam}</div>
        <div>${data.homeTeam}</div>
      </div>

      <div class="lineups">
        <div class="team-lineup">
          ${data.awayLineup.slice(0, 9).map(p => `
            <div class="player">
              <span class="order">${p.battingOrder[0]}</span>
              <span class="p-name">${p.name}</span>
              <span class="pos">${p.pos}</span>
            </div>
          `).join('')}
        </div>

        <div class="team-lineup">
          ${data.homeLineup.slice(0, 9).map(p => `
            <div class="player">
              <span class="order">${p.battingOrder[0]}</span>
              <span class="p-name">${p.name}</span>
              <span class="pos">${p.pos}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="status" style="margin-top:10px; text-align:center;">
        ${data.homeConfirmed ? '<span class="confirmed-badge">🟢 CONFIRMADO</span>' : '⏳ Pendiente'}
      </div>
    </div>
  `;
}

    const dateInput = document.getElementById("date");
    const gamesContainer = document.getElementById("games");
    const statusBox = document.getElementById("statusBox");
    const loadBtn = document.getElementById("loadBtn");

    dateInput.value = new Date().toISOString().split("T")[0];

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function moneylineText(game) {
      if (!game.odds || !game.odds.bookmakers?.[0]) return "Moneyline: no disponible";
      const h2h = game.odds.bookmakers[0].markets?.find(m => m.key === "h2h");
      if (!h2h) return "Moneyline: no disponible";
      const away = h2h.outcomes?.find(o => o.name === game.awayTeam);
      const home = h2h.outcomes?.find(o => o.name === game.homeTeam);
      return `ML: ${game.awayTeam} ${away?.price ?? "N/D"} | ${game.homeTeam} ${home?.price ?? "N/D"}`;
    }

    async function loadGames() {
      const date = dateInput.value;
      statusBox.textContent = `Cargando juegos para ${date}...`;
      gamesContainer.innerHTML = "";

      try {
        const res = await fetch(`/api/games?date=${encodeURIComponent(date)}`);
        const data = await res.json();

        if (!data.ok || !data.games.length) {
          statusBox.textContent = "Sin juegos disponibles.";
          return;
        }

        for (const game of data.games) {
          const card = document.createElement("div");
          card.className = "card";
          
          const lineup = await getLineup(game.gamePk);

          card.innerHTML = `
            <div class="matchup-row">
              <div class="ball">⚾</div>
              <div class="matchup">${escapeHtml(game.awayTeam)} @ ${escapeHtml(game.homeTeam)}</div>
            </div>

            <div class="meta">
              <strong>Estado:</strong> ${escapeHtml(game.status || "N/D")}<br>
              <strong>Hora:</strong> ${new Date(game.gameDate).toLocaleString([], { hour: '2-digit', minute: '2-digit' })}<br>
              <strong>ID:</strong> ${escapeHtml(game.gamePk)}<br>
              <strong>Pitchers:</strong> ${escapeHtml(game.awayPitcher || "TBD")} vs ${escapeHtml(game.homePitcher || "TBD")}<br>
              <span class="odds-badge">${escapeHtml(moneylineText(game))}</span>
            </div>
            ${renderLineups(lineup)}
            <button onclick="analyzeGame('${game.gamePk}')" class="btn-primary" style="margin-top:18px; width:100%; justify-content:center;">Analizar juego</button>
            <div class="result" id="result-${game.gamePk}"></div>
          `;
          gamesContainer.appendChild(card);
        }
        statusBox.textContent = `Se encontraron ${data.games.length} juegos.`;
      } catch (e) {
        statusBox.textContent = "Error de red.";
      }
    }

    loadBtn.addEventListener("click", loadGames);
    loadGames();
  </script>
</body>
</html>
