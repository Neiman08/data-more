<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data More Horse Racing | Premium</title>
  <style>
    /* 1. Configuración de Scroll y Base */
    html, body {
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin:0; 
      background:#0d1117; 
      color:white; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      padding:20px;
    }

    .header { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
    .logo { width:55px; height:55px; border-radius: 12px; }
    h1 { margin:0; font-size:28px; font-weight:900; letter-spacing: -1px; }
    
    /* 2. BARRA DE CONTROLES UNIVERSAL (ESTILO NIVEL DIOS) */
    .controls-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 25px 0;
      flex-wrap: wrap;
      background: rgba(22, 27, 34, 0.8);
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #30363d;
      backdrop-filter: blur(10px);
    }

    .controls-bar input, .controls-bar select {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: white;
      font-weight: bold;
      outline: none;
      transition: 0.3s;
    }

    .controls-bar input:focus, .controls-bar select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
    }

    button, .nav-link {
      border:none;
      border-radius:10px;
      padding:12px 20px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      color:white;
      transition: 0.2s transform, 0.2s background;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:active { transform: scale(0.95); }

    .btn-load { background: #2563eb; }
    .btn-load:hover { background: #1d4ed8; }

    .btn-analyze { background: #facc15; color: black; }
    .btn-analyze:hover { background: #eab308; }

    .btn-ticket { background: #22c55e; color: #052e16; }
    .btn-ticket:hover { background: #16a34a; }

    /* Navegación rápida */
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .nav-link { font-size: 12px; padding: 8px 14px; background: #21262d; border: 1px solid #30363d; }
    .nav-link.active { background: #8b5cf6; border-color: #a855f7; }

    /* 3. Grid Adaptativo */
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    /* 4. Tarjetas */
    .card {
      background:#161b22;
      border:1px solid #30363d;
      border-left:4px solid #a855f7;
      border-radius:14px;
      padding:14px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover { transform: translateY(-5px); border-color: #8b5cf6; box-shadow: 0 12px 24px rgba(0,0,0,0.5); }
    
    .card.alta { border-left: 4px solid #22c55e; }
    .card.media { border-left: 4px solid #facc15; }
    .card.baja { border-left: 4px solid #ef4444; }

    .race-title { font-size:18px; font-weight:900; color:#c084fc; margin-bottom:4px; }
    .meta { color:#94a3b8; font-size:12px; margin-bottom:12px; }
    
    .pick-box { 
      background:rgba(255,255,255,0.03); 
      border:1px solid rgba(255,255,255,0.1); 
      border-radius:10px; 
      margin-bottom:12px;
      padding:10px;
    }
    
    .section-title { color:#38bdf8; font-size:11px; font-weight:900; margin:12px 0 8px; text-transform:uppercase; letter-spacing: 1px; }
    .rank-row, .bet { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.07); font-size:12px; }
    .bet { background:#0f172a; padding:8px; border-radius:8px; margin-top:6px; border-bottom:none; color: #e2e8f0; }
    
    /* 5. Estilos de PDF */
    .pdf-full {
      grid-column: 1 / -1;
      margin-top: 28px;
      background:#161b22;
      border:1px solid #30363d;
      border-radius:16px;
      padding:18px;
    }

    .pdf-wrapper {
      width: 100%;
      height: 800px;
      overflow: hidden;
      border-radius: 12px;
      background: #f1f5f9;
    }

    .pdf-wrapper iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>

<body>
  <div class="header">
    <img src="/logo.png" class="logo" onerror="this.style.display='none'">
    <h1>DATA MORE HORSE</h1>
  </div>

  <div class="nav-tabs">
    <a class="nav-link active" href="/horse">🏇 Carreras</a>
    <a class="nav-link" href="/">⚾ MLB</a>
    <a class="nav-link" href="/soccer">⚽ Soccer</a>
    <a class="nav-link" href="/nba">🏀 NBA</a>
  </div>

  <div class="controls-bar">
    <input type="date" id="dateInput">
    
    <select id="trackSelect">
      <option value="gp">Gulfstream Park</option>
      <option value="sa">Santa Anita Park</option>
      <option value="tam">Tampa Bay Downs</option>
      <option value="cd">Churchill Downs</option>
      <option value="kee">Keeneland</option>
      <option value="bel">Belmont / Aqueduct</option>
    </select>

    <button class="btn-load" onclick="loadRaces()">Cargar</button>
    <button class="btn-analyze" onclick="alert('Analizando base de datos...')">⚡ Analizar Todos</button>
    <button class="btn-ticket" onclick="alert('Generando ticket inteligente...')">🎟 Generar Ticket</button>
  </div>

  <div id="races" class="grid"></div>

<script>
// Fecha de hoy por defecto (Zona Chicago)
document.getElementById('dateInput').value = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'America/Chicago',
  year: 'numeric',
  month: '2-digit',
  day: '2-digit'
}).format(new Date());

async function loadRaces() {
  const container = document.getElementById('races');
  container.innerHTML = '<div class="card" style="grid-column: 1/-1; text-align:center;">⌛ Procesando Big Data y Retrospectos...</div>';

  const track = document.getElementById('trackSelect').value;
  const date = document.getElementById('dateInput').value;

  try {
    const res = await fetch(`/api/horse-racing/import-structured?track=${track}&date=${date}`);
    const data = await res.json();

    if (!data.ok || !data.races.length) {
      container.innerHTML = `<div class="card" style="grid-column:1/-1">No hay datos disponibles para esta fecha o hipódromo.</div>`;
      return;
    }

    container.innerHTML = '';

    data.races.forEach((race) => {
      const a = race.analysis;
      const confClass = a ? a.confidence.toLowerCase() : '';

      container.innerHTML += `
        <div class="card ${confClass}">
          <div class="race-title">🏇 Carrera ${race.raceNumber}</div>
          <div class="meta">${race.track.toUpperCase()} • ${race.date}</div>
          ${a ? renderAnalysis(a) : '<p style="font-size:12px; color:#64748b;">Análisis en proceso...</p>'}
        </div>
      `;
    });

    // Inyección de PDF
    container.innerHTML += `
      <div class="pdf-full">
        <div class="section-title">Retrospecto Oficial (Daily Racing Form)</div>
        <a href="/api/horse-racing/pdf?track=${track}&date=${date}" target="_blank"
          style="display:block;text-align:center;background:#a855f7;color:white;padding:12px;border-radius:10px;font-weight:900;margin-bottom:15px;text-decoration:none;">
          📄 Expandir PDF Full Screen
        </a>
        <div class="pdf-wrapper">
          <iframe src="/api/horse-racing/pdf?track=${track}&date=${date}"></iframe>
        </div>
      </div>
    `;

  } catch (err) {
    container.innerHTML = `<div class="card" style="grid-column:1/-1">⚠️ Error de conexión: ${err.message}</div>`;
  }
}

function renderAnalysis(a) {
  const badge = a.confidence === 'ALTA' ? '🔥' : a.confidence === 'MEDIA' ? '⚠️' : '';
  
  return `
    <div class="section-title">Pick del Modelo</div>
    <div class="pick-box">
      🥇 <span style="color:#22c55e; font-size:16px;"><b>${a.pick}</b></span> ${badge}<br>
      <span style="font-size:11px; color:#94a3b8">Confianza ${a.confidence}</span>
    </div>

    <div class="section-title">Top 3 Probabilidades</div>
    ${(a.top3 || []).map((h, i) => `
      <div class="rank-row">
        <span>${i + 1}. ${h.name}</span>
        <span><b>${h.probability}%</b></span>
      </div>
    `).join('')}

    <div class="section-title">Estrategia Sugerida</div>
    <div class="bet">WIN: <b>${a.bets?.win || '-'}</b></div>
    <div class="bet">EXA: <b>${a.bets?.exacta || '-'}</b></div>
    <div class="bet">TRI: <b>${a.bets?.trifecta || '-'}</b></div>
  `;
}

// Carga inicial
loadRaces();
</script>
</body>
</html>
