<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Match Center | Data More</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --green:#6bff19;
  --border:rgba(255,255,255,.09);
  --card:rgba(8,12,16,.82);
  --panel:rgba(13,18,24,.78);
  --muted:#9aa3ad;
  --gold:#facc15;
  --red:#ef4444;
  --blue:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:
    linear-gradient(rgba(0,0,0,.84),rgba(0,0,0,.95)),
    url('/logos/IMG_0579.JPG');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:#fff;
  font-family:'Inter',sans-serif;
}

.page{
  max-width:1450px;
  margin:auto;
  padding:24px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.logo{
  font-family:'Anton';
  font-size:28px;
  letter-spacing:1px;
}

.logo span{color:var(--green);}

.back{
  color:var(--green);
  text-decoration:none;
  font-weight:900;
  border:1px solid rgba(107,255,25,.28);
  padding:10px 15px;
  border-radius:12px;
  background:rgba(0,0,0,.35);
}

/* HERO PRO */
.hero-pro{
  background:linear-gradient(135deg,rgba(7,12,16,.94),rgba(12,18,22,.82));
  border:1px solid rgba(107,255,25,.20);
  border-radius:26px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.55);
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 360px 1fr;
  gap:22px;
  align-items:center;
}

.team-hero{
  text-align:center;
  min-width:0;
}

.team-hero img{
  width:76px;
  height:76px;
  object-fit:contain;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.6));
}

.team-hero h2{
  font-family:'Anton';
  font-size:36px;
  line-height:.95;
  margin-top:10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.team-hero small{
  display:block;
  color:var(--gold);
  font-weight:900;
  font-size:12px;
  margin-top:8px;
}

.score-box{
  text-align:center;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:18px;
}

.status-pill{
  display:inline-block;
  padding:5px 12px;
  border-radius:999px;
  background:rgba(107,255,25,.10);
  border:1px solid rgba(107,255,25,.30);
  color:var(--green);
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.score-main{
  font-family:'Anton';
  color:var(--green);
  font-size:70px;
  line-height:.9;
  letter-spacing:-2px;
}

.league{
  color:var(--gold);
  font-size:12px;
  font-weight:900;
  margin-top:8px;
  text-transform:uppercase;
}

/* MAIN LAYOUT */
.pro-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

.pro-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:22px;
  backdrop-filter:blur(12px);
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}

.pro-card h3{
  color:var(--green);
  font-size:15px;
  margin-bottom:16px;
  text-transform:uppercase;
  font-weight:900;
}

/* PREDICTOR */
.predictor{
  display:grid;
  grid-template-columns:1fr 230px 1fr;
  gap:18px;
  align-items:center;
}

.predictor-team{
  text-align:center;
}

.predictor-team img{
  width:74px;
  height:74px;
  object-fit:contain;
  margin-bottom:10px;
}

.predictor-team h4{
  font-family:'Anton';
  font-size:34px;
  line-height:1;
}

.predictor-team span{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin-top:6px;
}

.donut-wrap{
  display:grid;
  place-items:center;
}

.donut{
  width:210px;
  height:210px;
  border-radius:50%;
  background:conic-gradient(var(--green) 0 var(--homePct), var(--gold) var(--homePct) var(--drawPct), var(--red) var(--drawPct) 100%);
  display:grid;
  place-items:center;
  box-shadow:0 0 35px rgba(107,255,25,.10);
}

.donut-inner{
  width:126px;
  height:126px;
  background:#090d11;
  border-radius:50%;
  display:grid;
  place-items:center;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
}

.donut-inner b{
  font-family:'Anton';
  font-size:20px;
}

.donut-inner span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}

.prob-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.prob-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  text-align:center;
}

.prob-box span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}

.prob-box b{
  display:block;
  font-size:20px;
  margin-top:5px;
}

/* STAT PANELS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(10px);
}

.panel h3{
  color:var(--green);
  margin-bottom:14px;
  font-size:14px;
  text-transform:uppercase;
}

.stat{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.stat span{
  color:#cbd5df;
  font-size:12px;
  font-weight:700;
}

.stat b{
  color:#fff;
  font-size:12px;
  text-align:right;
  font-weight:900;
}

.candidate-card{
  display:grid;
  grid-template-columns:42px minmax(0,1fr) auto;
  gap:11px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.candidate-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  display:grid;
  place-items:center;
  overflow:hidden;
  background:linear-gradient(135deg,var(--green),var(--blue));
  color:#000;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.14);
}

.candidate-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.candidate-name{
  display:block;
  color:#fff;
  font-size:12px;
  font-weight:900;
  line-height:1.15;
}

.candidate-meta{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:800;
  margin-top:3px;
}

.candidate-note{
  color:var(--green);
  font-size:11px;
  font-weight:900;
  text-align:right;
  max-width:112px;
  line-height:1.15;
}

.mini-bar{
  width:100%;
  height:8px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
  margin-top:8px;
}

.mini-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),#dcff45);
  border-radius:999px;
}

/* LIVE CARD */
.live-card{
  background:linear-gradient(180deg,rgba(12,18,24,.92),rgba(5,8,11,.95));
  border:1px solid rgba(107,255,25,.20);
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
}

.live-grid{
  display:grid;
  grid-template-columns:1fr 1.4fr 1fr;
  gap:18px;
  align-items:center;
}

.live-team-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:18px;
  padding:15px;
}

.live-team-box h4{
  color:var(--green);
  font-size:13px;
  margin-bottom:10px;
}

.live-stat{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:12px;
}

.pitch{
  position:relative;
  height:210px;
  border-radius:22px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.16);
  background:
    linear-gradient(90deg,rgba(107,255,25,.07) 0 50%,rgba(255,255,255,.035) 50% 100%),
    radial-gradient(circle at center,rgba(107,255,25,.16),rgba(0,0,0,.35));
}

.pitch:before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  width:2px;
  height:100%;
  background:rgba(255,255,255,.18);
}

.pitch:after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:78px;
  height:78px;
  border:2px solid rgba(255,255,255,.18);
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.ball-dot{
  position:absolute;
  width:28px;
  height:28px;
  border-radius:50%;
  background:var(--green);
  color:#000;
  display:grid;
  place-items:center;
  font-weight:900;
  z-index:3;
  transform:translate(-50%,-50%);
  box-shadow:0 0 25px rgba(107,255,25,.8);
}

.timeline{
  margin-top:12px;
  padding:12px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  font-size:12px;
  line-height:1.55;
  color:#dbe2ea;
}

/* COMMENTARY */
.commentary-card{
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
  background:linear-gradient(135deg,rgba(5,10,8,.95),rgba(12,20,15,.86));
  border:1px solid rgba(107,255,25,.22);
}

.commentary-title{
  font-family:'Anton';
  color:var(--green);
  font-size:22px;
  margin-bottom:10px;
}

.commentary-text{
  font-size:16px;
  line-height:1.55;
  font-weight:800;
}

.commentary-text span{color:var(--gold);}

.commentary-sub{
  margin-top:10px;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
}

/* LINEUPS */
.lineups{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.lineup-side{
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:14px;
}

.lineup-side h4{
  color:var(--green);
  margin-bottom:10px;
  font-size:12px;
  text-transform:uppercase;
}

.player{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:12px;
}

.player b{
  color:var(--green);
}

.note{
  color:var(--muted);
  font-size:12px;
}

.alert{
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.25);
  font-size:12px;
  line-height:1.5;
}

.detail-grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:16px;
  align-items:start;
}

.span-6{grid-column:span 6;}
.span-12{grid-column:1/-1;}

.detail-grid > section{
  margin:0;
  min-width:0;
}

.detail-grid .pro-card,
.detail-grid .live-card{
  height:100%;
  padding:18px;
  border-radius:20px;
  box-shadow:0 16px 44px rgba(0,0,0,.34);
}

.detail-grid .stat,
.detail-grid .live-stat{
  padding:7px 0;
}

.detail-grid h3{
  margin-bottom:12px;
}

.match-card{
  display:grid;
  grid-template-columns:minmax(0,1fr) 160px minmax(0,1fr);
  gap:16px;
  align-items:center;
}

.match-team{
  text-align:center;
  min-width:0;
}

.match-team img{
  width:62px;
  height:62px;
  object-fit:contain;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.5));
}

.match-team strong{
  display:block;
  font-family:'Anton';
  font-size:26px;
  line-height:1;
  margin-top:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.match-score{
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  border-radius:18px;
  padding:14px;
}

.match-score b{
  display:block;
  font-family:'Anton';
  color:var(--green);
  font-size:48px;
  line-height:.95;
}

.match-score span{
  display:inline-block;
  color:#061006;
  background:var(--green);
  border-radius:999px;
  padding:5px 10px;
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.meta-grid,.sim-score-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px 14px;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}

.metric-tile{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  padding:12px;
}

.metric-tile span{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

.metric-tile b{
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.form-strip{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin:8px 0 10px;
}

.form-token{
  width:24px;
  height:24px;
  border-radius:7px;
  display:grid;
  place-items:center;
  color:#061006;
  background:var(--green);
  font-size:11px;
  font-weight:900;
}

.form-token.d{background:var(--gold);}
.form-token.l{background:var(--red);color:#fff;}

.event-list{
  display:grid;
  gap:8px;
}

.event-item{
  display:grid;
  grid-template-columns:48px 1fr;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:12px;
}

.event-item b{color:var(--green);}

.explain-btn{
  width:100%;
  border:0;
  border-radius:12px;
  padding:12px 14px;
  background:var(--green);
  color:#061006;
  font-weight:900;
  cursor:pointer;
  margin-top:12px;
}

.explain-box{
  display:none;
  margin-top:12px;
  color:#dfe6ee;
  font-size:13px;
  line-height:1.55;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:14px;
}

@media(max-width:1100px){
  .hero-grid,.pro-layout,.live-grid,.predictor{grid-template-columns:1fr;}
  .grid{grid-template-columns:1fr 1fr;}
  .span-6{grid-column:1/-1;}
}

@media(max-width:700px){
  .page{padding:16px;}
  .grid,.lineups,.prob-row,.detail-grid,.match-card,.meta-grid,.metric-grid,.sim-score-grid{grid-template-columns:1fr;}
  .span-6,.span-12{grid-column:1/-1;}
  .score-main{font-size:54px;}
  .team-hero h2{font-size:28px;}
  .match-score b{font-size:42px;}
}
</style>
</head>

<body>
<div class="page">
  <div class="top">
    <a href="/soccer" class="back">← SOCCER</a>
    <div class="logo">DATA-<span>MORE</span></div>
  </div>

  <div id="content">Loading Match Center...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const matchId = params.get('matchId') || params.get('fixtureId') || params.get('id') || params.get('gameId');
const fixtureId = params.get('fixtureId') || matchId;
const league = params.get('league');
const selectedDate = params.get('date') || '';
const selectedTimezone = params.get('timezone') || Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Chicago';
const selectedSoccerMarket = params.get('soccerMarket') || 'winner';

function paramClean(key){
  const value = params.get(key);
  if(!value || value === 'null' || value === 'undefined') return '';
  try{return decodeURIComponent(value);}catch(e){return value;}
}

const urlGame = {
  homeTeam:paramClean('homeTeam'),
  awayTeam:paramClean('awayTeam'),
  homeLogo:paramClean('homeLogo'),
  awayLogo:paramClean('awayLogo'),
  homeScore:paramClean('homeScore'),
  awayScore:paramClean('awayScore'),
  time:paramClean('time'),
  leagueName:paramClean('leagueName')
};

let isFirstLoad = true;

function safe(v,fallback='--'){
  if(v===undefined||v===null||v===''||v==='null'||v==='undefined') return fallback;
  return v;
}

function hasRealValue(v){
  if(v===undefined||v===null) return false;
  const raw=String(v).trim();
  return raw!==''&&raw!=='--'&&raw!=='N/A'&&raw!=='Pending'&&raw!=='Data unavailable'&&raw!=='null'&&raw!=='undefined';
}

function statLine(label,value){
  if(!hasRealValue(value)) return '';
  return `<div class="stat"><span>${label}</span><b>${value}</b></div>`;
}

function panel(title,html,extraClass='panel'){
  if(!hasRealValue(html)) return '';
  return `<section class="${extraClass}"><h3>${title}</h3>${html}</section>`;
}

function firstValid(){
  for(const value of arguments){
    if(value!==undefined&&value!==null&&value!==''&&value!=='null'&&value!=='undefined') return value;
  }
  return '';
}

function pct(v){
  if(v===undefined||v===null||v===''||v==='N/A'||isNaN(Number(v))) return '--';
  return `${Number(v).toFixed(2)}%`;
}

function num(v,fallback=0){
  const n=Number(v);
  return Number.isFinite(n)?n:fallback;
}

function normalizeLogo(logo){
  if(!logo||logo===''||logo==='null'||logo==='undefined') return '/logos/DATA-MORE.png';
  return logo;
}

function shortName(name){
  const clean=String(name||'TEAM').trim();
  if(clean.length<=14) return clean;
  return clean.split(' ').map(x=>x[0]).join('').slice(0,4).toUpperCase();
}

function getMinuteText(matchTime){
  const status = String(matchTime || '').toUpperCase();
  if(status === 'FT') return 'Final';
  if(status === 'NS' || status === 'TBD' || status === 'SCHEDULED') return 'Scheduled';
  const raw=String(matchTime||'').replace(/[^\d]/g,'');
  if(!raw) return 'LIVE';
  return `Minuto ${raw}`;
}

function getDetailStatusText(game, fallbackTime='') {
  const status = String(game?.status || game?.fixture?.status?.short || '').toUpperCase();
  const liveClock = game?.liveClock;
  const elapsed = game?.elapsed ?? game?.minute ?? game?.fixture?.status?.elapsed;

  if(['1H','2H','HT','ET','LIVE'].includes(status)) {
    return liveClock || (elapsed ? `${elapsed}'` : status);
  }

  if(status === 'FT') return 'FT';
  if(status === 'NS' || status === 'TBD') return game?.localTime || game?.time || fallbackTime || 'Scheduled';

  return liveClock || status || game?.localTime || game?.time || fallbackTime || 'Scheduled';
}

async function fetchGameFromBoard(){
  const endpoints=['/api/soccer/games-global','/api/soccer-games-global'];
  for(const endpoint of endpoints){
    try{
      const query = new URLSearchParams({ t: Date.now(), timezone: selectedTimezone });
      if(selectedDate) query.set('date', selectedDate);
      const res=await fetch(`${endpoint}?${query.toString()}`);
      const data=await res.json();
      if(!data.ok||!Array.isArray(data.games)) continue;
      const found=data.games.find(g=>{
        const ids=[g.matchId,g.fixtureId,g.id,g.gameId,g.fixture?.id].map(x=>String(x||''));
        return ids.includes(String(matchId||'')) || ids.includes(String(fixtureId||''));
      });
      if(found) return found;
    }catch(e){}
  }
  return {};
}

function buildLiveReading({homeTeam,awayTeam,homePoss,awayPoss,homeAttacks,awayAttacks,homeShots,awayShots,homeCorners,awayCorners,homeCards,awayCards}){
  const h=(num(homePoss)*.25)+(num(homeAttacks)*.25)+(num(homeShots)*2.2)+(num(homeCorners)*1.8)-(num(homeCards)*1.5);
  const a=(num(awayPoss)*.25)+(num(awayAttacks)*.25)+(num(awayShots)*2.2)+(num(awayCorners)*1.8)-(num(awayCards)*1.5);
  const leader=h>=a?homeTeam:awayTeam;
  const other=h>=a?awayTeam:homeTeam;
  const diff=Math.abs(h-a);

  if(diff>=22) return `${leader} is applying heavy pressure. The match flow is leaning strongly toward ${leader}. ${other} is being forced to defend deeper.`;
  if(diff>=12) return `${leader} has the clear momentum. Possession, attacks and shot activity suggest ${leader} is carrying more danger.`;
  if(diff>=6) return `${leader} has a slight live edge, but the match is still open.`;
  return `The game is balanced right now. Neither side has full control, and the next attack could shift momentum.`;
}

function buildCommentary(data){
  const {homeTeam,awayTeam,homeScore,awayScore,matchTime,homePoss,awayPoss,homeAttacks,awayAttacks,homeShots,awayShots,homeCorners,awayCorners,homeCards,awayCards}=data;
  const minute=getMinuteText(matchTime);

  const h=(num(homePoss)*.25)+(num(homeAttacks)*.28)+(num(homeShots)*2.6)+(num(homeCorners)*2)-(num(homeCards)*1.2);
  const a=(num(awayPoss)*.25)+(num(awayAttacks)*.28)+(num(awayShots)*2.6)+(num(awayCorners)*2)-(num(awayCards)*1.2);
  const leader=h>=a?homeTeam:awayTeam;
  const defender=h>=a?awayTeam:homeTeam;
  const diff=Math.abs(h-a);

  let situation='';
  if(diff>=24) situation=`${leader} controla la pelota y acelera en campo rival. ${defender} se repliega y el modelo detecta momentum fuerte.`;
  else if(diff>=13) situation=`${leader} empieza a inclinar la cancha con más intención ofensiva.`;
  else if(diff>=6) situation=`${leader} tiene una pequeña ventaja en el ritmo del juego, aunque ${defender} todavía puede responder.`;
  else situation=`el partido está muy parejo. Ambos equipos se estudian y cualquier error puede cambiar el momentum.`;

  let scoreContext='';
  if(Number(homeScore)===Number(awayScore)) scoreContext=`Con el marcador empatado ${homeScore}-${awayScore}, cada ataque empieza a tener más peso.`;
  else if(Number(homeScore)>Number(awayScore)) scoreContext=`${homeTeam} está arriba ${homeScore}-${awayScore}; ${awayTeam} necesita adelantar líneas.`;
  else scoreContext=`${awayTeam} está arriba ${awayScore}-${homeScore}; ${homeTeam} necesita arriesgar más.`;

  return `
    <section class="commentary-card">
      <div class="commentary-title">🎙️ Data More Live Commentary</div>
      <div class="commentary-text"><span>${minute}:</span> ${situation} ${scoreContext}</div>
      <div class="commentary-sub">Auto-generated commentary from possession, attacks, shots, corners, cards, score and clock.</div>
    </section>
  `;
}

  const homeAttacks=safe(a.homeAttacks ?? a.live?.homeAttacks ?? a.attacks?.home,'--');
  const awayAttacks=safe(a.awayAttacks ?? a.live?.awayAttacks ?? a.attacks?.away,'--');

function isAttackingRole(position){
  const pos=String(position||'').toUpperCase();
  return ['F','FW','ST','CF','LW','RW','SS','AM','CAM','LM','RM'].includes(pos);
}

function isCreativeRole(position){
  const pos=String(position||'').toUpperCase();
  return ['M','CM','AM','CAM','LM','RM','LW','RW','WB','LWB','RWB'].includes(pos);
}

function candidateReason(player,type){
  const pos=String(player.pos||player.position||'').toUpperCase();
  if(type==='assist'){
    if(['AM','CAM','LM','RM','LW','RW'].includes(pos)) return 'Chance creation';
    if(isCreativeRole(pos)) return 'Service provider';
    return 'Final-third support';
  }
  if(['ST','CF','FW','F'].includes(pos)) return 'Goal threat';
  if(['LW','RW','SS','AM','CAM'].includes(pos)) return 'Attacking role';
  return 'Box presence';
}

function positionLabel(position){
  const pos=String(position||'').toUpperCase();
  const labels={
    G:'Goalkeeper',
    GK:'Goalkeeper',
    D:'Defender',
    CB:'Defender',
    LB:'Defender',
    RB:'Defender',
    LWB:'Wing-back',
    RWB:'Wing-back',
    M:'Midfielder',
    CM:'Midfielder',
    CDM:'Midfielder',
    AM:'Attacking Midfielder',
    CAM:'Attacking Midfielder',
    LM:'Wide Midfielder',
    RM:'Wide Midfielder',
    F:'Forward',
    FW:'Forward',
    ST:'Forward',
    CF:'Forward',
    LW:'Winger',
    RW:'Winger',
    SS:'Second Striker'
  };
  return labels[pos]||position||'';
}

function buildCandidates(a,type,homeTeam='',awayTeam=''){
  const props=(type==='assist'?a.assistProps:a.goalProps)||a.playerProps||[];
  const realProps=Array.isArray(props)?props
    .filter(p=>hasRealValue(type==='assist'?p.assistChance:(p.goalChance||p.probability)))
    .map(p=>({
      name:p.player||p.name||'Player',
      team:p.team||p.teamName||'',
      position:positionLabel(p.pos||p.position||''),
      confidence:type==='assist'?p.assistChance:(p.goalChance||p.probability),
      reason:candidateReason(p,type),
      photo:playerPhoto(p),
      score:num(type==='assist'?p.assistChance:(p.goalChance||p.probability))
    })):[];

  if(realProps.length){
    return realProps.sort((x,y)=>y.score-x.score).slice(0,3);
  }

  return flattenLineupPlayers(a,homeTeam,awayTeam)
    .filter(player=>type==='assist'?isCreativeRole(player.pos||player.position):isAttackingRole(player.pos||player.position))
    .slice(0,3)
    .map((player,index)=>({
      name:player.player||player.name||'Player',
      team:player.teamName||player.team||'',
      position:positionLabel(player.pos||player.position||''),
      confidence:'',
      reason:candidateReason(player,type),
      photo:playerPhoto(player),
      score:3-index
    }));
}

function metricTile(label,value){
  if(!hasRealValue(value)) return '';
  return `<div class="metric-tile"><span>${label}</span><b>${value}</b></div>`;
}

function toProb(v,fallback=0){
  const n=Number(v);
  return Number.isFinite(n)?n:fallback;
}

function poisson(lambda,k){
  let factorial=1;
  for(let i=2;i<=k;i++) factorial*=i;
  return (Math.exp(-lambda)*Math.pow(lambda,k))/factorial;
}

function buildSimulation(a){
  const oneX2=a.oneX2||a.probabilities||a.market1x2||{};
  const homeProb=toProb(firstValid(oneX2.home,oneX2.local,oneX2.homeWin,a.homeWinPct,a.homeProbability),0);
  const drawProb=toProb(firstValid(oneX2.draw,oneX2.empate,oneX2.tie,a.drawPct,a.drawProbability),0);
  const awayProb=toProb(firstValid(oneX2.away,oneX2.visitante,oneX2.awayWin,a.awayWinPct,a.awayProbability),0);
  const goals=a.expectedGoals||a.goals||{};
  const homeGoals=Math.max(.2,toProb(goals.home||goals.homeProjectedGoals,1.15));
  const awayGoals=Math.max(.2,toProb(goals.away||goals.awayProjectedGoals,1.05));
  const scores=[];

  for(let h=0;h<=5;h++){
    for(let aw=0;aw<=5;aw++){
      scores.push({
        score:`${h}-${aw}`,
        home:h,
        away:aw,
        probability:poisson(homeGoals,h)*poisson(awayGoals,aw)
      });
    }
  }

  const total=scores.reduce((sum,x)=>sum+x.probability,0)||1;
  scores.forEach(x=>{x.probability=(x.probability/total)*100;});
  scores.sort((a,b)=>b.probability-a.probability);

  const over15=scores.filter(x=>x.home+x.away>1.5).reduce((sum,x)=>sum+x.probability,0);
  const over25=scores.filter(x=>x.home+x.away>2.5).reduce((sum,x)=>sum+x.probability,0);
  const bttsYes=scores.filter(x=>x.home>0&&x.away>0).reduce((sum,x)=>sum+x.probability,0);

  return {
    homeProb,
    drawProb,
    awayProb,
    topScores:scores.slice(0,5),
    mostLikely:scores[0],
    over15,
    over25,
    under25:100-over25,
    bttsYes,
    bttsNo:100-bttsYes
  };
}

    ],
    'draw-no-bet':[
      statLine('Home DNB',markets.drawNoBetHome||markets.handicap),
      statLine('Away DNB',markets.drawNoBetAway||markets.handicap),
      statLine('Safer side',selectedRecommendation)
    ],
    'double-chance':[
      statLine('1X',markets.oneX),
      statLine('X2',markets.xTwo),
      statLine('12',markets.oneTwo)
    ],
    'goals-total':[
      statLine('Over 2.5 probability',hasRealValue(markets.over25Probability)?pct(markets.over25Probability):''),
      statLine('Under 2.5 probability',hasRealValue(markets.over25Probability)?pct(100-num(markets.over25Probability)):''),
      statLine('Expected goals',goals.total||goals.projectedTotal)
    ],
    btts:[
      statLine('Yes probability',hasRealValue(markets.bttsProbability)?pct(markets.bttsProbability):''),
      statLine('No probability',hasRealValue(markets.bttsProbability)?pct(100-num(markets.bttsProbability)):''),
      statLine('Recommendation',selectedRecommendation)
    ],
    'first-half':[
      statLine('Home 1H',markets.firstHalfHome),
      statLine('Draw 1H',markets.firstHalfDraw),
      statLine('Away 1H',markets.firstHalfAway)
    ],
    'correct-score':[
      statLine('Projected score 1',sim.topScores?.[0]?.score),
      statLine('Projected score 2',sim.topScores?.[1]?.score),
      statLine('Projected score 3',sim.topScores?.[2]?.score)
    ],
    'team-total':[
      statLine('Home team total lean',goals.home||goals.homeProjectedGoals),
      statLine('Away team total lean',goals.away||goals.awayProjectedGoals),
      statLine('Projected goals by team',hasRealValue(goals.home||goals.homeProjectedGoals)&&hasRealValue(goals.away||goals.awayProjectedGoals)?`${goals.home||goals.homeProjectedGoals} - ${goals.away||goals.awayProjectedGoals}`:'')
    ]
  };

  const marketRows=(rows[key]||rows.winner).join('');
  const html=hasRealValue(marketRows)||hasRealValue(selectedRecommendation)
    ? [
        statLine('Selected Market',selectedLabel),
        marketRows,
        statLine('Recommendation',selectedRecommendation),
        statLine('Confidence',safe(a.confidence,''))
      ].join('')
    : `<p class="commentary-sub">No reliable recommendation for this market yet.</p>`;

  return panel('SELECTED MARKET ANALYSIS',html,'pro-card span-6');
}

function normalizeSoccerMarketKey(key){
  const raw=String(key||'winner').toLowerCase().replace(/_/g,'-');
  const aliases={
    moneyline:'winner',
    ml:'winner',
    '1x2':'winner',
    'over-under':'goals-total',
    overunder:'goals-total',
    totals:'goals-total',
    correctscore:'correct-score',
    teamtotal:'team-total',
    drawnobet:'draw-no-bet',
    doublechance:'double-chance',
    firsthalf:'first-half'
  };
  return aliases[raw]||raw;
}

function soccerMarketLabel(key){
  const normalized=normalizeSoccerMarketKey(key);
  const labels={
    winner:'Moneyline / Winner',
    'draw-no-bet':'Draw No Bet',
    'double-chance':'Double Chance',
    'goals-total':'Over / Under Goals',
    btts:'Both Teams To Score',
    'first-half':'First Half Result',
    'correct-score':'Correct Score',
    'team-total':'Team Total Goals'
  };
  return labels[normalized]||labels.winner;
}

function soccerMarketRecommendation(key,a){
  const normalized=normalizeSoccerMarketKey(key);
  const markets=a.markets||{};
  const sim=buildSimulation(a);
  const goals=a.expectedGoals||a.goals||{};
  const recommendations={
    winner:safe(a.pick,''),
    'draw-no-bet':markets.handicap,
    'double-chance':markets.handicap,
    'goals-total':markets.over25,
    btts:markets.btts,
    'correct-score':sim.mostLikely?.score,
    'team-total':goals.total||goals.projectedTotal
  };
  return recommendations[normalized]||'';
}

function renderRiskAnalysisPro(a,teamForm,homeTeam,awayTeam){
  const rows=[];
  const oneX2=a.oneX2||a.probabilities||{};
  const draw=toProb(firstValid(oneX2.draw,oneX2.empate,oneX2.tie),0);
  const goals=a.expectedGoals||a.goals||{};
  const total=toProb(goals.total||goals.projectedTotal,0);
  if(draw>=27) rows.push(statLine('Draw Risk','Elevated'));
  if(total&&total<2.2) rows.push(statLine('Offensive Production','Low total projection'));
  if(teamForm?.home?.goalsAgainst>teamForm?.home?.games*1.5) rows.push(statLine(`${homeTeam} defense`,'Recent goals allowed risk'));
  if(teamForm?.away?.goalsAgainst>teamForm?.away?.games*1.5) rows.push(statLine(`${awayTeam} defense`,'Recent goals allowed risk'));
  if(String(a.confidence||'').toLowerCase().includes('baja')) rows.push(statLine('Model Confidence','Low'));
  return panel('AI Risk Analysis',rows.join(''),'pro-card span-6');
}

function renderExplainPick(a,homeTeam,awayTeam){
  const text=`Data More leans ${safe(a.pick,'toward the strongest model side')} by combining the current 1X2 probability split, recent team form, projected goals and draw risk. The recommendation remains tied to the model output; unavailable market, injury or lineup data is not assumed.`;
  return `
    <section class="pro-card span-12">
      <h3>Explain This Pick</h3>
      <button class="explain-btn" onclick="toggleExplainPick()">Explain This Pick</button>
      <div class="explain-box" id="explainPickBox">${text}</div>
    </section>
  `;
}

function toggleExplainPick(){
  const box=document.getElementById('explainPickBox');
  if(box) box.style.display=box.style.display==='block'?'none':'block';
}

async function loadMatch(){
  const content=document.getElementById('content');

      fetchGameFromBoard()
    ]);

    const data=analysisRes||{};
    const a=data.analysis||data;
    const g=data.game||data.fixture||boardGame||{};

    const homeTeam=firstValid(boardGame.homeTeam,boardGame.home,boardGame.homeName,boardGame.teams?.home?.name,urlGame.homeTeam,data.homeTeam,a.homeTeam,g.homeTeam,g.home_name,g.teams?.home?.name,'HOME');
    const awayTeam=firstValid(boardGame.awayTeam,boardGame.away,boardGame.awayName,boardGame.teams?.away?.name,urlGame.awayTeam,data.awayTeam,a.awayTeam,g.awayTeam,g.away_name,g.teams?.away?.name,'AWAY');
    const homeLogo=normalizeLogo(firstValid(boardGame.homeLogo,boardGame.home_logo,boardGame.teams?.home?.logo,urlGame.homeLogo,data.homeLogo,a.homeLogo,g.homeLogo,g.home_logo,g.teams?.home?.logo));
    const awayLogo=normalizeLogo(firstValid(boardGame.awayLogo,boardGame.away_logo,boardGame.teams?.away?.logo,urlGame.awayLogo,data.awayLogo,a.awayLogo,g.awayLogo,g.away_logo,g.teams?.away?.logo));
    const homeScore=firstValid(boardGame.homeScore,data.homeScore,a.homeScore,g.homeScore,g.goals?.home,urlGame.homeScore,0);
    const awayScore=firstValid(boardGame.awayScore,data.awayScore,a.awayScore,g.awayScore,g.goals?.away,urlGame.awayScore,0);
    const fallbackTime=firstValid(boardGame.localTime,boardGame.time,data.localTime,data.time,a.time,g.localTime,g.time,urlGame.time);
    const matchTime=getDetailStatusText(boardGame.fixtureId ? boardGame : g, fallbackTime);
    const leagueName=firstValid(urlGame.leagueName,boardGame.leagueName,data.leagueName,a.leagueName,g.leagueName,g.league?.name,league?.toUpperCase(),'LEAGUE');

    const oneX2=a.oneX2||a.probabilities||a.market1x2||{};
    const homeWin=num(firstValid(oneX2.home,oneX2.local,oneX2.homeWin,a.homeWinPct,a.homeProbability,50),50);
    const draw=num(firstValid(oneX2.draw,oneX2.empate,oneX2.tie,a.drawPct,a.drawProbability,0),0);
    const awayWin=num(firstValid(oneX2.away,oneX2.visitante,oneX2.awayWin,a.awayWinPct,a.awayProbability,50),50);

    const homePoss=num(a.homePossession??a.possession?.home??a.live?.homePossession??homeWin,50);
    const cleanHomePoss=Math.min(90,Math.max(10,homePoss));
    const cleanAwayPoss=Math.max(0,100-cleanHomePoss);

    const homeEnd=Math.min(100,homeWin);
    const drawEnd=Math.min(100,homeWin+draw);
    const aiRows=[
      statLine('Main Pick',safe(a.pick,'')),
      statLine('Confidence',safe(a.confidence,'')),
      statLine('Probability',hasRealValue(a.probability??a.pickProbability)?pct(a.probability??a.pickProbability):''),
      statLine('Over 2.5',safe(a.over25||a.totalGoalsPick||a.totalPick,'')),
      statLine('BTTS',safe(a.btts||a.bothTeamsToScore,''))
    ].join('');
    const teamForm=data.teamForm||a.teamForm||a.form||null;
    const headToHead=data.headToHead||a.headToHead||null;
    const events=Array.isArray(data.events)?data.events:[];
    const goalCandidatesHtml=renderCandidates(a,'goal',homeTeam,awayTeam);
    const assistCandidatesHtml=renderCandidates(a,'assist',homeTeam,awayTeam);
    const keyPlayersHtml=renderKeyPlayers(a);
    const lineupsHtml=renderLineups(a,homeTeam,awayTeam);
    const liveAvailable=Boolean(a.live?.available||data.live?.available);
    const liveHtml=liveAvailable?renderSoccerLive(a,homeTeam,awayTeam,homeWin,awayWin,matchTime):'';
    const attackHtml=liveAvailable
      ? renderAttackDefense(a,homeTeam,awayTeam,cleanHomePoss,cleanAwayPoss)
        .replace('class="panel"', 'class="pro-card span-6"')
      : '';

    const legacyHtml=`
      <section class="hero-pro">
        <div class="hero-grid">
          <div class="team-hero">
            <img src="${homeLogo}" onerror="this.onerror=null;this.src='/logos/DATA-MORE.png';">
            <h2>${homeTeam}</h2>
            ${hasRealValue(a.homeRecord)?`<small>${a.homeRecord}</small>`:''}
          </div>

          <div class="score-box">
            <div class="status-pill">${matchTime}</div>
            <div class="score-main">${homeScore} - ${awayScore}</div>
            <div class="league">${leagueName}</div>
          </div>

          <div class="team-hero">
            <img src="${awayLogo}" onerror="this.onerror=null;this.src='/logos/DATA-MORE.png';">
            <h2>${awayTeam}</h2>
            ${hasRealValue(a.awayRecord)?`<small>${a.awayRecord}</small>`:''}
          </div>
        </div>
      </section>

      <div class="pro-layout">
        <section class="pro-card">
          <h3>Matchup Predictor</h3>
          <div class="predictor">
            <div class="predictor-team">
              <img src="${homeLogo}">
              <h4>${shortName(homeTeam)}</h4>
              <span>${pct(homeWin)}</span>
            </div>

            <div class="donut-wrap">
              <div class="donut" style="--homePct:${homeEnd}%;--drawPct:${drawEnd}%;">
                <div class="donut-inner">
                  <div>
                    <b>${shortName(homeTeam)}</b>
                    <span>vs</span>
                    <b>${shortName(awayTeam)}</b>
                  </div>
                </div>
              </div>
            </div>

            <div class="predictor-team">
              <img src="${awayLogo}">
              <h4>${shortName(awayTeam)}</h4>
              <span>${pct(awayWin)}</span>
            </div>
          </div>

          <div class="prob-row">
            <div class="prob-box"><span>${shortName(homeTeam)}</span><b>${pct(homeWin)}</b></div>
            <div class="prob-box"><span>Draw</span><b>${pct(draw)}</b></div>
            <div class="prob-box"><span>${shortName(awayTeam)}</span><b>${pct(awayWin)}</b></div>
          </div>
        </section>

        <section class="pro-card">
          <h3>AI Prediction Center</h3>
          ${aiRows}
        </section>
      </div>

      ${buildCommentary({
        homeTeam,awayTeam,homeScore,awayScore,matchTime,
        homePoss:cleanHomePoss,awayPoss:cleanAwayPoss,
        homeAttacks:a.homeAttacks??a.live?.homeAttacks??a.attacks?.home,
        awayAttacks:a.awayAttacks??a.live?.awayAttacks??a.attacks?.away,
        homeShots:a.homeShots??a.live?.homeShots??a.shots?.home,
        awayShots:a.awayShots??a.live?.awayShots??a.shots?.away,
        homeCorners:a.homeCorners??a.live?.homeCorners??a.corners?.home,
        awayCorners:a.awayCorners??a.live?.awayCorners??a.corners?.away,
        homeCards:a.homeCards??a.live?.homeCards??a.cards?.home,
        awayCards:a.awayCards??a.live?.awayCards??a.cards?.away

      ${renderSoccerLive(a,homeTeam,awayTeam,homeWin,awayWin,matchTime)}

      ${renderMarketIntelligence(a)}

      <div class="grid">
        ${renderTeamForm(a,homeTeam,awayTeam)}
        ${renderAttackDefense(a,homeTeam,awayTeam,cleanHomePoss,cleanAwayPoss)}
        ${renderBettingRecommendations(a)}
        ${renderRiskAnalysis(a)}
        ${panel('Key Players',keyPlayersHtml)}
        ${panel('Top 3 Goal Scorer Candidates',goalCandidatesHtml)}
        ${panel('Top 3 Assist Candidates',assistCandidatesHtml)}

        <section class="panel">
          <h3>Live Possession</h3>
          <div class="stat"><span>${homeTeam}</span><b>${cleanHomePoss.toFixed(0)}%</b></div>
          <div class="mini-bar"><div class="mini-fill" style="width:${cleanHomePoss}%"></div></div>
          <div class="stat"><span>${awayTeam}</span><b>${cleanAwayPoss.toFixed(0)}%</b></div>
        </section>

      ${panel('Confirmed / Projected Lineups',lineupsHtml,'panel lineups-panel')}
    `;

    content.innerHTML=`
      <div class="detail-grid">
        ${renderMatchCenter({homeTeam,awayTeam,homeLogo,awayLogo,homeScore,awayScore,matchTime,leagueName,game:boardGame.fixtureId?boardGame:g})}
        ${renderPredictionCenter(a,homeTeam,awayTeam,homeWin,draw,awayWin)}
        ${renderSimulation(a)}
        ${renderSelectedMarketAnalysis(a)}
        ${renderBettingRecommendationsPro(a)}
        ${renderTeamFormPro(teamForm,homeTeam,awayTeam)}
        ${renderHeadToHead(headToHead,homeTeam,awayTeam)}
