  <script>
    const dateInput = document.getElementById("date");
    const gamesContainer = document.getElementById("games");
    const statusBox = document.getElementById("statusBox");
    const loadBtn = document.getElementById("loadBtn");
    const analyzeAllBtn = document.getElementById("analyzeAllBtn");
    const ticketBtn = document.getElementById("ticketBtn");
    const ticketBox = document.getElementById("ticketBox");

    dateInput.value = new Date().toISOString().split("T")[0];

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function formatNum(value, decimals = 2) {
      const num = Number(value);
      return isNaN(num) ? "N/D" : num.toFixed(decimals);
    }

    function confidenceClass(confidence) {
      const c = String(confidence || "").toLowerCase();
      if (c.includes("alta")) return "alta";
      if (c.includes("media")) return "media";
      return "baja";
    }

    function renderBases(bases = {}) {
      const first = bases.first ? "◆" : "◇";
      const second = bases.second ? "◆" : "◇";
      const third = bases.third ? "◆" : "◇";
      return `<div>${second}</div><div>${third} ${first}</div>`;
    }

    async function loadLiveCards() {
      try {
        const res = await fetch('/api/baseball/live-scores');
        const data = await res.json();
        if (!data.ok || !data.games.length) return;
        const html = data.games.slice(0, 8).map(g => `
          <div class="live-card">
            <div class="live-header">
              <span class="live-badge">● ${g.abstractState === "Live" ? "EN VIVO" : g.status}</span>
              <span class="inning">${g.inningOrdinal || ""}</span>
            </div>
            <div class="score-main">
              <div class="team-box">
                <img src="/logos/${g.awayAbbrev}.png" onerror="this.style.display='none'">
                <strong>${g.awayAbbrev || g.awayTeam}</strong>
              </div>
              <div class="score-center">
                <h2>${g.awayScore} - ${g.homeScore}</h2>
                <div class="bases">${renderBases(g.bases)}</div>
                <small>${g.outs ?? 0} Outs</small>
              </div>
              <div class="team-box">
                <img src="/logos/${g.homeAbbrev}.png" onerror="this.style.display='none'">
                <strong>${g.homeAbbrev || g.homeTeam}</strong>
              </div>
            </div>
          </div>
        `).join('');
        gamesContainer.innerHTML = html;
      } catch (e) { console.log("Error cargando live cards"); }
    }

    async function loadLiveTicker() {
      try {
        const res = await fetch('/api/baseball/live-scores');
        const data = await res.json();
        if (!data.ok || !data.games.length) return;
        const items = data.games.map(g => `
          <div class="ticker-item">
            <span>${g.awayAbbrev || g.awayTeam}</span>
            <span class="ticker-score">${g.awayScore} - ${g.homeScore}</span>
            <span>${g.homeAbbrev || g.homeTeam}</span>
            <span class="ticker-inning">${g.inningState} ${g.inning}</span>
          </div>
        `).join('');
        document.getElementById('liveTicker').innerHTML = `<div class="ticker-track">${items}</div>`;
      } catch (e) { console.log('Error live ticker'); }
    }

    async function getLineup(gamePk) {
      try {
        const res = await fetch(`/api/baseball/lineup/${gamePk}`);
        return await res.json();
      } catch (e) { return { ok: false }; }
    }

    function renderLineups(data) {
      if (!data.ok || !data.awayLineup || !data.homeLineup) return '';
      return `<div class="lineup-card">
          <div class="teams-header"><div>${data.awayTeam}</div><div>${data.homeTeam}</div></div>
          <div class="lineups">
            <div class="team">${data.awayLineup.slice(0, 9).map(p => `<div class="player"><span><span class="order">${String(p.battingOrder).charAt(0)}</span> ${p.name}</span><span class="pos">${p.pos}</span></div>`).join('')}</div>
            <div class="team">${data.homeLineup.slice(0, 9).map(p => `<div class="player"><span><span class="order">${String(p.battingOrder).charAt(0)}</span> ${p.name}</span><span class="pos">${p.pos}</span></div>`).join('')}</div>
          </div>
          <div style="text-align:center; font-size:11px; margin-top:8px; color: ${data.homeConfirmed ? '#22c55e' : '#94a3b8'}">${data.homeConfirmed ? '🟢 Confirmed' : '⏳ Pending'}</div>
        </div>`;
    }

    function moneylineText(game) {
      if (!game.odds || !game.odds.bookmakers || !game.odds.bookmakers.length) return "Odds: no disponibles";
      const bookmaker = game.odds.bookmakers[0];
      const h2h = bookmaker.markets?.find(m => m.key === "h2h");
      if (!h2h) return "ML: no disponible";
      const away = h2h.outcomes?.find(o => o.name === game.awayTeam);
      const home = h2h.outcomes?.find(o => o.name === game.homeTeam);
      return `ML ${game.awayTeam}: ${away?.price ?? "N/D"} | ${game.homeTeam}: ${home?.price ?? "N/D"}`;
    }

    async function loadGames() {
      const date = dateInput.value;
      statusBox.innerHTML = `<span class="loading">Cargando juegos para ${date}...</span>`;
      gamesContainer.innerHTML = "";
      ticketBox.innerHTML = "";
      try {
        const res = await fetch(`/api/games?date=${encodeURIComponent(date)}`);
        const data = await res.json();
        if (!data.ok || !data.games.length) return statusBox.textContent = "No hay juegos.";
        for (const game of data.games) {
          const card = document.createElement("div");
          card.className = "card";
          const lineup = await getLineup(game.gamePk);
          card.innerHTML = `
            <div class="matchup">${escapeHtml(game.awayTeam)} vs ${escapeHtml(game.homeTeam)}</div>
            <div class="meta">
              <strong>Status:</strong> ${escapeHtml(game.status)}<br>
              <strong>Pitchers:</strong> ${escapeHtml(game.awayPitcher || "TBD")} vs ${escapeHtml(game.homePitcher || "TBD")}<br>
              <div class="odds-badge">${moneylineText(game)}</div>
            </div>
            ${renderLineups(lineup)}
            <button onclick="analyzeGame('${game.gamePk}')" style="margin-top:15px; width:100%">Analizar</button>
            <div class="result" id="result-${game.gamePk}"></div>`;
          gamesContainer.appendChild(card);
        }
        statusBox.textContent = `${data.games.length} juegos cargados.`;
      } catch (e) { statusBox.textContent = "Error de conexión."; }
    }

    async function analyzeGame(gamePk) {
      const result = document.getElementById(`result-${gamePk}`);
      result.innerHTML = `<div class="loading" style="font-size:12px;">Analizando...</div>`;
      const propsRes = await fetch(`/api/baseball/player-props/${gamePk}`);
      const propsData = await propsRes.json();
      let propsHTML = '';
      if (propsData.ok && propsData.props.length > 0) {
        const teams = {};
        propsData.props.forEach(p => { if (!teams[p.team]) teams[p.team] = []; teams[p.team].push(p); });
        Object.keys(teams).forEach(team => {
          const top = teams[team].sort((a, b) => b.hitChance - a.hitChance).slice(0, 3);
          propsHTML += `<div style="margin-top:10px; font-weight:bold; color:#7dd3fc; border-bottom: 1px solid rgba(125, 211, 252, 0.2); padding-bottom: 2px;">${team}</div>`;
          propsHTML += top.map(p => `<div class="prop-row"><span><strong>${p.name}</strong></span><span class="prop-rating rating-${p.rating.toLowerCase()}">${p.rating}</span></div><div style="font-size: 10px; color: var(--text-subtle); margin-bottom: 5px;">Prob: Hit ${p.hitChance}% | HR ${p.hrChance}% | RBI ${p.rbiChance}%</div>`).join('');
        });
      } else { propsHTML = '<div class="small">No hay props disponibles aún.</div>'; }
      try {
        const res = await fetch(`/api/analyze/${gamePk}?date=${dateInput.value}`);
        const data = await res.json();
        if (!data.ok) return result.innerHTML = "Error";
        const a = data.analysis || {};
        const away = a.away || {};
        const home = a.home || {};
        const runLine = a.runLine || {};
        const teamTotals = a.teamTotals || {};
        const pickPct = a.pick === away.team ? away.modelWinPct : home.modelWinPct;
        result.innerHTML = `<div class="pick-box ${confidenceClass(a.confidence)}">🔥 <strong>Moneyline Pick:</strong> ${escapeHtml(a.pick || "N/D")}<br>📊 <strong>Confianza:</strong> ${escapeHtml(a.confidence || "N/D")}<br>📈 <strong>Probabilidad:</strong> ${formatNum(pickPct)}%</div><div class="extra-box"><div class="extra-title">📉 Run Line</div><strong>Pick:</strong> ${escapeHtml(runLine.pick || "N/D")}<br><strong>Prob:</strong> ${formatNum(runLine.coverProb)}% | <strong>Margen:</strong> ${formatNum(runLine.projectedMargin)}</div><div class="extra-box"><div class="extra-title">📊 Team Totals</div>${escapeHtml(away.team)}: ${escapeHtml(teamTotals.away?.pick)} (${formatNum(teamTotals.away?.probability)}%)<br>${escapeHtml(home.team)}: ${escapeHtml(teamTotals.home?.pick)} (${formatNum(teamTotals.home?.probability)}%)<div class="divider"></div><strong>Total Combinado:</strong> ${formatNum(teamTotals.combinedProjectedTotal)}</div><div class="extra-box"><div class="extra-title">💎 TOP PLAYER PROPS</div>${propsHTML}</div><div style="font-size:11px; color:var(--text-subtle); margin-top:8px;">${(a.notes || []).map(n => `• ${escapeHtml(n)}`).join("<br>")}</div>`;
      } catch (e) { result.innerHTML = "Error"; }
    }

    function confidenceScore(confidence) {
      const c = String(confidence || "").toLowerCase();
      if (c.includes("alta")) return 10;
      if (c.includes("media")) return 5;
      return 0;
    }

    function buildBalancedTicket(picks, limit) {
      const valid = picks.filter(p => p.pick && p.pick !== "N/D" && p.probability > 0);
      const moneyline = valid.filter(p => p.market === "Moneyline").sort((a, b) => b.score - a.score);
      const runline = valid.filter(p => p.market === "Run Line" && p.confidence !== "baja" && p.probability >= 58).sort((a, b) => b.score - a.score);
      const totals = valid.filter(p => p.market === "Team Total" && p.probability >= 54).sort((a, b) => b.score - a.score);
      const result = [];
      const addPick = (pick) => { if (!pick || result.length >= limit || result.some(p => p.matchup === pick.matchup)) return; result.push(pick); };
      if (limit <= 4) { moneyline.slice(0, 4).forEach(addPick); }
      else if (limit <= 7) { addPick(runline[0]); moneyline.slice(2, 6).forEach(addPick); totals.slice(0, 3).forEach(addPick); moneyline.slice(0, 2).forEach(addPick); }
      else { runline.slice(0, 2).forEach(addPick); moneyline.slice(4, 10).forEach(addPick); totals.slice(0, 6).forEach(addPick); moneyline.slice(0, 4).forEach(addPick); }
      const fallback = [...moneyline, ...runline, ...totals].sort((a, b) => b.score - a.score);
      for (const pick of fallback) { addPick(pick); }
      return result.slice(0, limit);
    }

    function renderSuggestedTicket(title, picks) {
      return `<div class="ticket-box"><h2>${escapeHtml(title)}</h2><p>Total picks: ${escapeHtml(picks.length)}</p>${picks.map(p => `<div class="ticket-pick">⚾ <strong>${escapeHtml(p.matchup)}</strong><br>🎯 Pick: ${escapeHtml(p.pick)}<br>📌 Mercado: ${escapeHtml(p.market)}<br>📊 Prob: ${formatNum(p.probability)}% | ⚡ ${escapeHtml(p.confidence)}</div>`).join("")}<p class="small" style="font-size:11px; margin-top:10px; opacity:0.8;">Ticket balanceado por algoritmo de mercado mixto.</p></div>`;
    }

    async function loadMLBTicket() {
      const date = dateInput.value;
      ticketBox.innerHTML = `<div class="status-box"><span class="loading">Procesando picks inteligentes...</span></div>`;
      try {
        const gamesRes = await fetch(`/api/games?date=${encodeURIComponent(date)}`);
        const gamesData = await gamesRes.json();
        if (!gamesData.ok || !gamesData.games.length) return ticketBox.innerHTML = "No hay juegos.";
        const bestPicks = [];
        for (const game of gamesData.games) {
          if (["postponed", "delayed", "suspended"].some(s => String(game.status || "").toLowerCase().includes(s))) continue;
          const res = await fetch(`/api/analyze/${game.gamePk}?date=${encodeURIComponent(date)}`);
          const data = await res.json();
          if (!data.ok || !data.analysis) continue;
          const a = data.analysis;
          const matchup = `${game.awayTeam} vs ${game.homeTeam}`;
          const mlProb = a.pick === a.away.team ? Number(a.away.modelWinPct) : Number(a.home.modelWinPct);
          if (a.pick && mlProb > 0) bestPicks.push({ matchup, pick: a.pick, market: "Moneyline", probability: mlProb, confidence: a.confidence, score: mlProb + confidenceScore(a.confidence) + (mlProb > 65 ? 10 : 0) });
          if (a.runLine.pick && Number(a.runLine.coverProb) > 0) bestPicks.push({ matchup, pick: a.runLine.pick, market: "Run Line", probability: Number(a.runLine.coverProb), confidence: a.runLine.confidence, score: Number(a.runLine.coverProb) + confidenceScore(a.runLine.confidence) });
          if (a.teamTotals.away?.pick) bestPicks.push({ matchup, pick: a.teamTotals.away.pick, market: "Team Total", probability: Number(a.teamTotals.away.probability), confidence: a.teamTotals.away.confidence, score: Number(a.teamTotals.away.probability) + confidenceScore(a.teamTotals.away.confidence) + 3 });
          if (a.teamTotals.home?.pick) bestPicks.push({ matchup, pick: a.teamTotals.home.pick, market: "Team Total", probability: Number(a.teamTotals.home.probability), confidence: a.teamTotals.home.confidence, score: Number(a.teamTotals.home.probability) + confidenceScore(a.teamTotals.home.confidence) + 3 });
        }
        if (!bestPicks.length) return ticketBox.innerHTML = "No hay picks suficientes.";
        const sorted = bestPicks.sort((a, b) => b.score - a.score);
        ticketBox.innerHTML = `${renderSuggestedTicket("🔥 Ticket Seguro", buildBalancedTicket(sorted, 4))}${renderSuggestedTicket("⚡ Ticket Medio", buildBalancedTicket(sorted, 7))}${renderSuggestedTicket("💣 Ticket Grande", buildBalancedTicket(sorted, Math.min(12, sorted.length)))}`;
      } catch (error) { ticketBox.innerHTML = "Error al generar ticket."; }
    }

    loadBtn.addEventListener("click", loadGames);

    analyzeAllBtn.addEventListener("click", async () => {
      const cards = document.querySelectorAll('.card button[onclick^="analyzeGame"]');
      for (const b of cards) await b.click();
    });

    ticketBtn.addEventListener("click", loadMLBTicket);

    // INICIALIZACIÓN
    loadGames();
    loadLiveTicker();
    setInterval(loadLiveTicker, 15000);

    // NO actives esto todavía porque borra las tarjetas de análisis:
    // loadLiveCards();
    // setInterval(loadLiveCards, 15000);
  </script>
