  <style>

<body>
  <div class="container">

    <div class="brand-header">
      <img src="/logo.png" class="brand-logo">
      <div>
        <h1>Data More MLB Picks</h1>
        <p class="subtitle">Moneyline, Run Line, Team Totals</p>
      </div>
    </div>

    <div class="nav">
        <a href="/" class="active">⚾ MLB</a>
        <a href="/soccer">⚽ Soccer</a>
    </div>

    <div class="topbar">
      <label for="date">Fecha:</label>
      <input type="date" id="date" />
      <button id="loadBtn">Cargar juegos</button>
      <button id="analyzeAllBtn">Analizar todos</button>
      <button id="ticketBtn" class="ticket-btn">🎟️ Generar Ticket</button>
    </div>

    <div id="statusBox" class="status-box">Cargando interfaz...</div>
    <div id="ticketBox"></div>
    <div id="games" class="grid"></div>

    <p class="footer-note">
      Si no ves odds, puede ser que la línea aún no esté disponible o que la API de cuotas no tenga ese juego.
    </p>
  </div>

  <script>
// 🔥 TRAER LINEUP
async function getLineup(gamePk) {
  const res = await fetch(`/api/baseball/lineup/${gamePk}`);
  return await res.json();
}

// 🎯 RENDER con limitación a los 9 mejores
function renderLineups(data) {
  if (!data.ok) return '';

  return `
    <div class="lineup-card">

      <div class="teams-header">
        <div>${data.awayTeam}</div>
        <div>${data.homeTeam}</div>
      </div>

      <div class="lineups">

        <div class="team">
          ${data.awayLineup.slice(0, 9).map(p => `
            <div class="player">
              <span class="order">${p.battingOrder[0]}</span>
              <span>${p.name}</span>
              <span class="pos">${p.pos}</span>
            </div>
          `).join('')}
        </div>

        <div class="team">
          ${data.homeLineup.slice(0, 9).map(p => `
            <div class="player">
              <span class="order">${p.battingOrder[0]}</span>
              <span>${p.name}</span>
              <span class="pos">${p.pos}</span>
            </div>
          `).join('')}
        </div>

      </div>

      <div class="status">
        ${data.homeConfirmed ? '🟢 Confirmed' : '⏳ Pending'}
      </div>

    </div>
  `;
}

    const dateInput = document.getElementById("date");
    const gamesContainer = document.getElementById("games");
    const statusBox = document.getElementById("statusBox");
    const loadBtn = document.getElementById("loadBtn");
    const analyzeAllBtn = document.getElementById("analyzeAllBtn");
    const ticketBtn = document.getElementById("ticketBtn");
    const ticketBox = document.getElementById("ticketBox");

    const today = new Date().toISOString().split("T")[0];
    dateInput.value = today;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatNum(value, decimals = 2) {
      const num = Number(value);
      if (Number.isNaN(num)) return "N/D";
      return num.toFixed(decimals);
    }

    function confidenceClass(confidence) {
      const c = String(confidence || "").toLowerCase();
      if (c.includes("alta")) return "alta";
      if (c.includes("media")) return "media";
      return "baja";
    }

    function moneylineText(game) {
      if (!game.odds || !game.odds.bookmakers || !game.odds.bookmakers.length) {
        return "Odds: no disponibles";
      }

      const bookmaker = game.odds.bookmakers[0];
      const h2h = bookmaker.markets?.find(m => m.key === "h2h");

      if (!h2h) return "Moneyline: no disponible";

      const away = h2h.outcomes?.find(o => o.name === game.awayTeam);
      const home = h2h.outcomes?.find(o => o.name === game.homeTeam);

      return `ML ${game.awayTeam}: ${away?.price ?? "N/D"} | ${game.homeTeam}: ${home?.price ?? "N/D"}`;
    }

    async function loadGames() {
      const date = dateInput.value;
      statusBox.textContent = `Cargando juegos para ${date}...`;
      ticketBox.innerHTML = "";
      gamesContainer.innerHTML = "";

      try {
        const res = await fetch(`/api/games?date=${encodeURIComponent(date)}`);
        const data = await res.json();

        if (!data.ok) {
          statusBox.textContent = "La API respondió con error.";
          gamesContainer.innerHTML = `<div class="empty">Error: ${escapeHtml(data.error || "No se pudo cargar")}</div>`;
          return;
        }

        if (!data.games || !data.games.length) {
          statusBox.textContent = "No se encontraron juegos para esa fecha.";
          gamesContainer.innerHTML = `<div class="empty">No hay juegos disponibles en ${escapeHtml(date)}.</div>`;
          return;
        }

        statusBox.textContent = `Se encontraron ${data.games.length} juegos para ${date}.`;

        for (const game of data.games) {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.gamepk = game.gamePk;

          const gameDate = game.gameDate
            ? new Date(game.gameDate).toLocaleString()
            : "N/D";

          const lineup = await getLineup(game.gamePk);

          let html = `
            <div class="matchup-row">
              <div class="ball">⚾</div>
              <div class="matchup">${escapeHtml(game.awayTeam)} vs ${escapeHtml(game.homeTeam)}</div>
            </div>

            <div class="meta">
              <strong>Estado:</strong> ${escapeHtml(game.status || "N/D")}<br>
              <strong>Hora:</strong> ${escapeHtml(gameDate)}<br>
              <strong>ID juego:</strong> ${escapeHtml(game.gamePk)}<br>
              <strong>Pitchers:</strong> ${escapeHtml(game.awayProbablePitcher || "N/D")} vs ${escapeHtml(game.homeProbablePitcher || "N/D")}<br>
              <span class="odds-badge">${escapeHtml(moneylineText(game))}</span>
            </div>
          `;

          html += renderLineups(lineup);

          html += `
            <button onclick="analyzeGame('${escapeHtml(game.gamePk)}')" style="margin-top:15px">Analizar juego</button>
            <div class="result" id="result-${escapeHtml(game.gamePk)}"></div>
          `;

          card.innerHTML = html;
          gamesContainer.appendChild(card);
        }

      } catch (error) {
        statusBox.textContent = "Error cargando juegos.";
        gamesContainer.innerHTML = `<div class="empty">Error: ${escapeHtml(error.message)}</div>`;
      }
    }

    async function analyzeGame(gamePk) {
      const date = dateInput.value;
      const result = document.getElementById(`result-${gamePk}`);

      result.innerHTML = `<div class="small">Analizando juego...</div>`;

      try {
        const res = await fetch(`/api/analyze/${gamePk}?date=${encodeURIComponent(date)}`);
        const data = await res.json();

        if (!data.ok) {
          result.innerHTML = `<div class="small">Error: ${escapeHtml(data.error || "No se pudo analizar")}</div>`;
          return;
        }

        const a = data.analysis || {};
        const away = a.away || {};
        const home = a.home || {};
        const runLine = a.runLine || {};
        const teamTotals = a.teamTotals || {};
        const awayTT = teamTotals.away || {};
        const homeTT = teamTotals.home || {};

        const pickIsAway = a.pick === away.team;
        const pickPct = pickIsAway ? away.modelWinPct : home.modelWinPct;

        result.innerHTML = `
          <div class="pick-box ${confidenceClass(a.confidence)}">
            🔥 <strong>Moneyline Pick:</strong> ${escapeHtml(a.pick || "N/D")}<br>
            📊 <strong>Confianza:</strong> ${escapeHtml(a.confidence || "N/D")}<br>
            ⚾ <strong>${escapeHtml(away.team || "Away")}:</strong> Score ${escapeHtml(formatNum(away.finalScore))} | Prob ${escapeHtml(formatNum(away.modelWinPct))}% | ML ${escapeHtml(away.moneyline ?? "N/D")}<br>
            ⚾ <strong>${escapeHtml(home.team || "Home")}:</strong> Score ${escapeHtml(formatNum(home.finalScore))} | Prob ${escapeHtml(formatNum(home.modelWinPct))}% | ML ${escapeHtml(home.moneyline ?? "N/D")}<br>
            📈 <strong>Probabilidad pick:</strong> ${escapeHtml(formatNum(pickPct))}%
          </div>

          <div class="extra-box">
            <div class="extra-title">📉 Run Line</div>
            <strong>Pick:</strong> ${escapeHtml(runLine.pick || "N/D")}<br>
            <strong>Probabilidad de cubrir:</strong> ${escapeHtml(formatNum(runLine.coverProb))}%<br>
            <strong>Margen proyectado:</strong> ${escapeHtml(formatNum(runLine.projectedMargin))}<br>
            <strong>Confianza:</strong> ${escapeHtml(runLine.confidence || "N/D")}
          </div>

          <div class="extra-box">
            <div class="extra-title">📊 Team Totals</div>

            <strong>🏟️ ${escapeHtml(away.team || "Away")}:</strong> ${escapeHtml(awayTT.pick || "N/D")}<br>
            Línea: ${escapeHtml(formatNum(awayTT.line, 1))} |
            Proyección: ${escapeHtml(formatNum(awayTT.projectedRuns))} |
            Prob: ${escapeHtml(formatNum(awayTT.probability))}% |
            Confianza: ${escapeHtml(awayTT.confidence || "N/D")}

            <div class="divider"></div>

            <strong>🏟️ ${escapeHtml(home.team || "Home")}:</strong> ${escapeHtml(homeTT.pick || "N/D")}<br>
            Línea: ${escapeHtml(formatNum(homeTT.line, 1))} |
            Proyección: ${escapeHtml(formatNum(homeTT.projectedRuns))} |
            Prob: ${escapeHtml(formatNum(homeTT.probability))}% |
            Confianza: ${escapeHtml(homeTT.confidence || "N/D")}

            <div class="divider"></div>

            <strong>➕ Total combinado proyectado:</strong> ${escapeHtml(formatNum(teamTotals.combinedProjectedTotal))}
          </div>

          <div class="small">
            ${(a.notes || []).map(n => `• ${escapeHtml(n)}`).join("<br>")}
          </div>
        `;
      } catch (error) {
        result.innerHTML = `<div class="small">Error analizando juego: ${escapeHtml(error.message)}</div>`;
      }
    }

    async function analyzeAll() {
      const cards = Array.from(document.querySelectorAll(".card"));
      for (const card of cards) {
        await analyzeGame(card.dataset.gamepk);
      }
    }
 
async function loadMLBTicket() {
  const date = dateInput.value;
  ticketBox.innerHTML = `<div class="status-box">Generando ticket sugerido para ${escapeHtml(date)}...</div>`;

  try {
    const gamesRes = await fetch(`/api/games?date=${encodeURIComponent(date)}`);
    const gamesData = await gamesRes.json();

    if (!gamesData.ok || !gamesData.games || !gamesData.games.length) {
      ticketBox.innerHTML = `<div class="status-box">No hay juegos para generar ticket en ${escapeHtml(date)}.</div>`;
      return;
    }

    const bestPicks = [];

    for (const game of gamesData.games) {
      if (
        ["postponed", "delayed", "suspended"].some(s =>
          String(game.status || "").toLowerCase().includes(s)
        ) ||
        !game.odds ||
        !game.odds.bookmakers ||
        !game.odds.bookmakers.length
      ) {
        continue;
      }
      try {
        const res = await fetch(`/api/analyze/${game.gamePk}?date=${encodeURIComponent(date)}`);
        const data = await res.json();

        if (!data.ok || !data.analysis) continue;

        const a = data.analysis;
        const away = a.away || {};
        const home = a.home || {};
        const runLine = a.runLine || {};
        const teamTotals = a.teamTotals || {};
        const awayTT = teamTotals.away || {};
        const homeTT = teamTotals.home || {};

        const matchup = `${away.team || game.awayTeam} vs ${home.team || game.homeTeam}`;
        const options = [];

        const pickIsAway = a.pick === away.team;
        const mlProb = pickIsAway ? Number(away.modelWinPct) : Number(home.modelWinPct);

        if (a.pick && mlProb > 0) {
          options.push({
            matchup,
            pick: a.pick,
            market: "Moneyline",
            probability: mlProb,
            confidence: a.confidence || "N/D",
            score: mlProb + confidenceScore(a.confidence) + 8
          });
        }

        if (runLine.pick && Number(runLine.coverProb) > 0) {
          const margin = Math.abs(Number(runLine.projectedMargin || 0));
          let rlScore = Number(runLine.coverProb) + confidenceScore(runLine.confidence);

          if (margin < 8) rlScore -= 25;
          else if (margin < 15) rlScore -= 15;
          else if (margin < 25) rlScore -= 8;

          if (Number(runLine.coverProb) === 72) rlScore -= 12;

          options.push({
            matchup,
            pick: runLine.pick,
            market: "Run Line",
            probability: Number(runLine.coverProb),
            confidence: runLine.confidence || "N/D",
            score: rlScore
          });
        }

        if (awayTT.pick && Number(awayTT.probability) > 0) {
          options.push({
            matchup,
            pick: awayTT.pick,
            market: "Team Total",
            probability: Number(awayTT.probability),
            confidence: awayTT.confidence || "N/D",
            score: Number(awayTT.probability) + confidenceScore(awayTT.confidence) + 3
          });
        }

        if (homeTT.pick && Number(homeTT.probability) > 0) {
          options.push({
            matchup,
            pick: homeTT.pick,
            market: "Team Total",
            probability: Number(homeTT.probability),
            confidence: homeTT.confidence || "N/D",
            score: Number(homeTT.probability) + confidenceScore(homeTT.confidence) + 3
          });
        }

        if (!options.length) continue;

        options.sort((a, b) => b.score - a.score);
        bestPicks.push(options[0]);

      } catch (err) {
        console.log("Error analizando juego para ticket:", game.gamePk, err.message);
      }
    }

    if (!bestPicks.length) {
      ticketBox.innerHTML = `<div class="status-box">No hay picks suficientes para generar ticket.</div>`;
      return;
    }

    const sorted = bestPicks.sort((a, b) => b.score - a.score);

    const seguro = buildBalancedTicket(sorted, 4);
    const medio = buildBalancedTicket(sorted, 7);
    const grande = buildBalancedTicket(sorted, Math.min(12, sorted.length));

    ticketBox.innerHTML = `
      ${renderSuggestedTicket("🔥 Ticket Seguro", seguro)}
      ${renderSuggestedTicket("⚡ Ticket Medio", medio)}
      ${renderSuggestedTicket("💣 Ticket Grande", grande)}
    `;

  } catch (error) {
    ticketBox.innerHTML = `<div class="status-box">Error generando ticket: ${escapeHtml(error.message)}</div>`;
  }
}

function confidenceScore(confidence) {
  const c = String(confidence || "").toLowerCase();
  if (c.includes("alta")) return 10;
  if (c.includes("media")) return 5;
  return 0;
}

function buildBalancedTicket(picks, limit) {
  const valid = picks.filter(p => {
    if (!p.pick || p.pick === "N/D") return false;
    if (!p.probability || p.probability <= 0) return false;
    if (String(p.status || "").toLowerCase().includes("postponed")) return false;
    return true;
  });

  const moneyline = valid
    .filter(p => p.market === "Moneyline")
    .sort((a, b) => b.score - a.score);

  const runline = valid
    .filter(p =>
      p.market === "Run Line" &&
      p.confidence !== "baja" &&
      p.probability >= 58
    )
    .sort((a, b) => b.score - a.score);

  const totals = valid
    .filter(p =>
      p.market === "Team Total" &&
      p.probability >= 54
    )
    .sort((a, b) => b.score - a.score);

  const result = [];

  function addPick(pick) {
    if (!pick) return;
    if (result.length >= limit) return;
    if (result.some(p => p.matchup === pick.matchup)) return;
    result.push(pick);
  }

  if (limit <= 4) {
    moneyline.slice(0, 4).forEach(addPick);
  }
  else if (limit <= 7) {
    addPick(runline[0]);
    moneyline.slice(2, 6).forEach(addPick);
    totals.slice(0, 3).forEach(addPick);
    moneyline.slice(0, 2).forEach(addPick);
  }
  else {
    runline.slice(0, 2).forEach(addPick);
    moneyline.slice(4, 10).forEach(addPick);
    totals.slice(0, 6).forEach(addPick);
    moneyline.slice(0, 4).forEach(addPick);
  }

  const fallback = [...moneyline, ...runline, ...totals]
    .sort((a, b) => b.score - a.score);

  for (const pick of fallback) {
    if (result.length >= limit) break;
    addPick(pick);
  }

  return result.slice(0, limit);
}

function renderSuggestedTicket(title, picks) {
  return `
    <div class="ticket-box">
      <h2>${escapeHtml(title)}</h2>
      <p>Total picks: ${escapeHtml(picks.length)}</p>

      ${picks.map(p => `
        <div class="ticket-pick">
          ⚾ <strong>${escapeHtml(p.matchup)}</strong><br>
          🎯 Pick: ${escapeHtml(p.pick)}<br>
          📌 Mercado: ${escapeHtml(p.market)}<br>
          📊 Probabilidad: ${escapeHtml(formatNum(p.probability))}%<br>
          ⚡ Confianza: ${escapeHtml(p.confidence)}
        </div>
      `).join("")}

      <p class="small">
        Ticket balanceado usando Moneyline, Run Line y Team Totals. 
      </p>
    </div>
  `;
}
