<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // BLOQUE DE SEGURIDAD
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || !user.proActivo) { 
      window.location.href = '/pago-manual'; 
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data More | Horse Racing Analytics Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">

  <style>
    /* --- SISTEMA DE DISEÑO UNIFICADO --- */
    :root {
      --green: #6bff19;
      --horse-purple: #a855f7;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #888d93;
      --bg-panel: rgba(20, 25, 30, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    main.page {
      max-width: 1440px;
      margin: 0 auto;
      background: radial-gradient(circle at 30% 30%, #150a1a 0%, #020509 60%);
      position: relative;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    /* --- NAVEGACIÓN PRINCIPAL --- */
    header {
      height: 70px;
      padding: 0 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; font-family: 'Anton', sans-serif; text-transform: uppercase; }
    .logo span { color: var(--horse-purple); }

    nav { display: flex; gap: 20px; }
    nav a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
    nav a.active { opacity: 1; border-bottom: 2px solid var(--horse-purple); padding-bottom: 25px; margin-bottom: -25px; }

    /* --- CONTENEDOR --- */
    .container { padding: 30px 50px; }

    h1.page-title {
      font-family: 'Anton';
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }
    h1.page-title span { color: var(--horse-purple); }

    /* --- NAVEGACIÓN DE DEPORTES --- */
    .nav-sports { display: flex; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .nav-btn {
      padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
      color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer;
      background: rgba(255,255,255,0.03); transition: all 0.2s; text-transform: uppercase;
    }
    .nav-btn.active { background: var(--horse-purple); color: #fff; border-color: var(--horse-purple); font-weight: 800; }

    /* --- CONTROLES --- */
    .topbar { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
    .topbar input, .topbar select {
      background: #111; border: 1px solid var(--border); padding: 12px; border-radius: 8px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 600; outline: none;
    }
    .btn-action {
      background: var(--horse-purple); color: #fff; padding: 12px 24px; border-radius: 8px;
      font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 13px;
    }
    .btn-sec { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; }

    /* --- GRID DE 4 COLUMNAS --- */
    .grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    }
    @media (max-width: 1300px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }

    /* --- TARJETAS --- */
    .card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; backdrop-filter: blur(10px); transition: 0.3s;
      border-left: 4px solid var(--horse-purple);
    }
    .card:hover { border-color: var(--horse-purple); transform: translateY(-5px); }
    
    .card.alta { border-left-color: var(--green); }
    .card.media { border-left-color: #facc15; }
    .card.baja { border-left-color: #ef4444; }

    .race-title { font-family: 'Anton'; font-size: 20px; color: var(--horse-purple); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .meta { color: var(--muted); font-size: 10px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
    
    .section-title { color: #38bdf8; font-size: 10px; font-weight: 900; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .pick-box { 
      background: rgba(107, 255, 25, 0.05); border: 1px solid rgba(107, 255, 25, 0.1); 
      border-radius: 10px; padding: 12px; margin-bottom: 10px;
    }
    
    .rank-row, .bet { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    .bet { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px; border-bottom: none; margin-top: 4px; }
    .bet b { color: var(--horse-purple); }

    /* --- PDF SECTION --- */
    .pdf-full {
      grid-column: 1 / -1; margin-top: 30px; background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: 16px; padding: 25px; backdrop-filter: blur(10px);
    }

    .btn-pdf {
      display: block; text-align: center; background: var(--horse-purple); color: white;
      padding: 14px; border-radius: 10px; font-weight: 900; margin-bottom: 20px;
      text-decoration: none; text-transform: uppercase; font-size: 12px;
    }

    .pdf-wrapper {
      width: 100%; height: 800px; border-radius: 12px; overflow: hidden; background: #000;
      border: 1px solid var(--border);
    }
    .pdf-wrapper iframe { width: 100%; height: 100%; border: none; }

    .loading { animation: pulse 1s infinite; color: var(--horse-purple); font-size: 12px; text-align: center; padding: 20px; grid-column: 1/-1; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>

<body>

<main class="page">
  <header>
    <div class="logo">DATA-<span>MORE</span></div>
    <nav>
      <a href="/">Inicio</a>
      <a class="active" href="/horse">Picks</a>
      <a href="/precios">Precios</a>
      <a href="/estadisticas">Estadísticas</a>
    </nav>
    <div class="header-actions">
      <span style="font-size:12px; color:#fff; font-weight:700;">👤 HORSE PRO</span>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">HORSE RACING <span>ANALYTICS PRO</span></h1>

    <div class="nav-sports">
        <a href="/"><button class="nav-btn">⚾ MLB</button></a>
        <a href="/soccer"><button class="nav-btn">⚽ Fútbol</button></a>
        <a href="/nba"><button class="nav-btn">🏀 NBA</button></a>
        <a href="/horse"><button class="nav-btn active">🏇 Hipismo</button></a>
    </div>

    <div class="topbar">
      <input type="date" id="dateInput">
      <select id="trackSelect">
        <option value="gp">Gulfstream Park</option>
        <option value="sa">Santa Anita Park</option>
        <option value="tam">Tampa Bay Downs</option>
        <option value="cd">Churchill Downs</option>
        <option value="kee">Keeneland</option>
        <option value="bel">Belmont / Aqueduct</option>
      </select>
      <button class="btn-action" onclick="loadRaces()">Cargar Pizarra</button>
      <button class="btn-sec btn-action" onclick="alert('Analizando base de datos...')">⚡ Analizar Todos</button>
      <button class="btn-sec btn-action" onclick="alert('Generando ticket inteligente...')">🎟 Ticket</button>
    </div>

    <div id="races" class="grid"></div>
  </div>
</main>

<script>
// --- LÓGICA FUNCIONAL PRESERVADA ---
document.getElementById('dateInput').value = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'America/Chicago',
  year: 'numeric',
  month: '2-digit',
  day: '2-digit'
}).format(new Date());

async function loadRaces() {
  const container = document.getElementById('races');
  container.innerHTML = '<div class="loading">⌛ Procesando Big Data y Retrospectos...</div>';

  const track = document.getElementById('trackSelect').value;
  const date = document.getElementById('dateInput').value;

  try {
    const res = await fetch(`/api/horse-racing/import-structured?track=${track}&date=${date}`);
    const data = await res.json();

    if (!data.ok || !data.races.length) {
      container.innerHTML = `<div class="card" style="grid-column:1/-1; border-left-color: #ef4444;">No hay datos disponibles para esta fecha o hipódromo.</div>`;
      return;
    }

    container.innerHTML = '';

    data.races.forEach((race) => {
      const a = race.analysis;
      const confClass = a ? a.confidence.toLowerCase() : '';

      container.innerHTML += `
        <div class="card ${confClass}">
          <div class="race-title">Carrera ${race.raceNumber}</div>
          <div class="meta">${race.track.toUpperCase()} • ${race.date}</div>
          ${a ? renderAnalysis(a) : '<div class="loading" style="font-size:10px;">Análisis en proceso...</div>'}
        </div>
      `;
    });

    // Inyección de PDF
    container.innerHTML += `
      <div class="pdf-full">
        <div class="section-title" style="margin-top:0">Retrospecto Oficial (Daily Racing Form)</div>
        <a href="/api/horse-racing/pdf?track=${track}&date=${date}" target="_blank" class="btn-pdf">
          📄 Expandir PDF Full Screen
        </a>
        <div class="pdf-wrapper">
          <iframe src="/api/horse-racing/pdf?track=${track}&date=${date}"></iframe>
        </div>
      </div>
    `;

  } catch (err) {
    container.innerHTML = `<div class="card" style="grid-column:1/-1; border-left-color: #ef4444;">⚠️ Error de conexión: ${err.message}</div>`;
  }
}

function renderAnalysis(a) {
  const badge = a.confidence === 'ALTA' ? '🔥' : a.confidence === 'MEDIA' ? '⚠️' : '';
  
  return `
    <div class="section-title">Pick del Modelo</div>
    <div class="pick-box">
      <span style="color:var(--green); font-size:16px; font-weight:800;">🥇 ${a.pick}</span> ${badge}<br>
      <span style="font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase;">Confianza ${a.confidence}</span>
    </div>

    <div class="section-title">Top 3 Probabilidades</div>
    ${(a.top3 || []).map((h, i) => `
      <div class="rank-row">
        <span>${i + 1}. ${h.name}</span>
        <b style="color:#fff;">${h.probability}%</b>
      </div>
    `).join('')}

    <div class="section-title">Estrategia Sugerida</div>
    <div class="bet">WIN <b>${a.bets?.win || '-'}</b></div>
    <div class="bet">EXA <b>${a.bets?.exacta || '-'}</b></div>
    <div class="bet">TRI <b>${a.bets?.trifecta || '-'}</b></div>
  `;
}

// Carga inicial
loadRaces();
</script>
</body>
</html>
