      overflow: hidden;
      position: sticky;
      top: 0;
      z-index: 10000;

<script>
function escapeHtml(v) {
  return String(v ?? "").replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":"&#039;"
  }[m]));
}

function shortTeamName(name) {
  const clean = String(name || '').trim();
  if (!clean) return 'TEAM';

  const map = {
    'Nottingham Forest': 'N. Forest',
    'Newcastle United': 'Newcastle',
    'Crystal Palace': 'C. Palace',
    'Aston Villa': 'A. Villa',
    'Real Madrid': 'R. Madrid',
    'Manchester United': 'Man United',
    'Manchester City': 'Man City',
    'Bayern Munich': 'Bayern',
    'Borussia Dortmund': 'Dortmund'
  };

  if (map[clean]) return map[clean].toUpperCase();

  if (clean.length <= 12) return clean.toUpperCase();

  return clean
    .replace('United', 'Utd')
    .replace('City', 'City')
    .replace('Club', '')
    .slice(0, 12)
    .toUpperCase();
}

function renderRealForm(formString = '') {

  const raw = String(formString || '').trim();

  if (!raw) {
    return `
      <div class="form-box">
        <span class="form-item win">W</span>
        <span class="form-item draw">D</span>
        <span class="form-item win">W</span>
        <span class="form-item loss">L</span>
        <span class="form-item win">W</span>
      </div>
    `;
  }

  const items = raw
    .replace(/,/g, ' ')
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 5);

  return `
    <div class="form-box">

      ${items.map(x => {

        const val = x.toUpperCase();

        let cls = 'loss';

        if (val === 'W') cls = 'win';
        else if (
          val === 'D' ||
          val === 'E' ||
          val === 'DRAW'
        ) cls = 'draw';

        return `
          <span class="form-item ${cls}">
            ${val === 'E' ? 'D' : val}
          </span>
        `;
      }).join('')}

    </div>
  `;
}

function getStatusClass(status) {
  const raw = String(status || '').toLowerCase();

  if (
    raw.includes('live') ||
    raw.includes('1h') ||
    raw.includes('2h') ||
    raw.includes('ht') ||
    raw.includes('et') ||
    raw.includes('p')
  ) {
    return 'live';
  }

  return '';
}

async function initTicker() {
  const ticker = document.getElementById('tickerWrapper');

  try {
    const res = await fetch('/api/soccer/games-global');
    const data = await res.json();

    if (data.ok && data.games?.length) {
      const content = data.games.map(g => `
        <div class="ticker-item">
          <span class="sport-tag">SOCCER</span>
          <img src="${g.homeLogo}" onerror="this.style.display='none'">
          ${escapeHtml(shortTeamName(g.homeTeam))}
          <span class="ticker-score">${g.homeScore ?? 0}</span>
          -
          <span class="ticker-score">${g.awayScore ?? 0}</span>
          ${escapeHtml(shortTeamName(g.awayTeam))}
          <img src="${g.awayLogo}" onerror="this.style.display='none'">
          <span class="ticker-status">${escapeHtml(g.time || g.status || '')}</span>
        </div>
      `).join('');

      ticker.innerHTML = content + content;
    } else {
      ticker.innerHTML = '<span class="ticker-item">Soccer scores unavailable...</span>';
    }
  } catch(e) {
    ticker.innerHTML = '<span class="ticker-item">Soccer scores unavailable...</span>';
  }
}

async function loadGames() {
  const date = document.getElementById('dateSelect').value;
  const container = document.getElementById('gamesList');

  container.innerHTML = '<div class="loading">Syncing global leagues...</div>';

  try {
    const res = await fetch(`/api/soccer/games-global?date=${date}`);
    const data = await res.json();

    if (!data.ok || !data.games?.length) {
      container.innerHTML = '<p>No games available.</p>';
      return;
    }

    const grouped = {};

    data.games.forEach(g => {
      (grouped[g.leagueName] = grouped[g.leagueName] || []).push(g);
    });

    container.innerHTML = '';

    for (const [league, games] of Object.entries(grouped)) {
      let html = `<h2 class="league-title">${escapeHtml(league)}</h2><div class="games-grid">`;

      games.forEach(g => {
        const homeShort = shortTeamName(g.homeTeam);
        const awayShort = shortTeamName(g.awayTeam);
        const statusClass = getStatusClass(g.status || g.time);

        html += `
          <div class="card">

            <div class="match-header" 
                 onclick="openSoccerDetail('${g.matchId}', '${g.leagueKey}')">

              <div class="team-box">
                <img src="${g.homeLogo}" class="team-logo" onerror="this.src='/logo.png'">
                <span class="team-name">${escapeHtml(homeShort)}</span>
                <span class="team-record">${escapeHtml(g.homeRecord || '')}</span>
                ${renderRealForm(g.homeForm)}
                <span class="coach-name">${escapeHtml(g.homeCoach || g.homeTeam)}</span>
              </div>

              <div class="score-center">
                <div class="live-tag ${statusClass}">
                  ${escapeHtml(g.status || g.time || 'Scheduled')}
                </div>
                <div class="score-now">
                  <span>${g.homeScore ?? 0}</span><span>-</span><span>${g.awayScore ?? 0}</span>
                </div>
                <div class="game-time">${escapeHtml(g.time || 'Scheduled')}</div>
              </div>

              <div class="team-box">
                <img src="${g.awayLogo}" class="team-logo" onerror="this.src='/logo.png'">
                <span class="team-name">${escapeHtml(awayShort)}</span>
                <span class="team-record">${escapeHtml(g.awayRecord || '')}</span>
                ${renderRealForm(g.awayForm)}
                <span class="coach-name">${escapeHtml(g.awayCoach || g.awayTeam)}</span>
              </div>

            </div>

            <div 
              class="soccer-lineup-box" 
              id="lineup-${g.matchId}"
              style="display:none;">
            </div>

            <button class="analyze-btn" onclick="analyze(this, '${g.matchId}', '${g.leagueKey}')">
              ANALYZE WITH AI
            </button>

            <div id="res-${g.matchId}" class="pick-res"></div>

          </div>
        `;
      });

      html += `</div>`;
      container.innerHTML += html;
    }

  } catch(e) {
    container.innerHTML = '<p>Error loading board.</p>';
  }
}

function pct(v) {
  if (v === undefined || v === null || v === '' || Number.isNaN(Number(v))) return '?';
  return Number(v).toFixed(2) + '%';
}

function val(...items) {
  for (const item of items) {
    if (item !== undefined && item !== null && item !== '') return item;
  }

  return 'N/A';
}

function normalizeConfidence(confidence) {
  const raw = String(confidence || '').toLowerCase();

  if (raw.includes('alta') || raw.includes('high')) return 'HIGH';
  if (raw.includes('media') || raw.includes('medium')) return 'MEDIUM';
  if (raw.includes('baja') || raw.includes('low')) return 'LOW';

  return String(confidence || 'MEDIUM').toUpperCase();
}

function translatePickValue(value) {
  const raw = String(value ?? '');

  return raw
    .replace(/Empate/gi, 'Draw')
    .replace(/Local/gi, 'Home')
    .replace(/Visitante/gi, 'Away')
    .replace(/Ambos anotan/gi, 'Both Teams To Score')
    .replace(/Sí/gi, 'Yes')
    .replace(/No/gi, 'No');
}

function firstValidArray(...arrays) {
  for (const arr of arrays) {
    if (Array.isArray(arr) && arr.length > 0) return arr;
  }

  return [];
}

function firstValidObject(...objs) {
  for (const obj of objs) {
    if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
      if (
        (Array.isArray(obj.home) && obj.home.length) ||
        (Array.isArray(obj.away) && obj.away.length) ||
        (Array.isArray(obj.local) && obj.local.length) ||
        (Array.isArray(obj.visitante) && obj.visitante.length)
      ) {
        return obj;
      }
    }
  }

  return null;
}

function renderLineups(lineupsObject, lineupsArray) {
  let homePlayers = [];
  let awayPlayers = [];

  if (lineupsObject) {
    homePlayers = lineupsObject.home || lineupsObject.local || [];
    awayPlayers = lineupsObject.away || lineupsObject.visitante || [];
  }

  if ((!homePlayers.length && !awayPlayers.length) && lineupsArray.length) {
    const half = Math.ceil(lineupsArray.length / 2);
    homePlayers = lineupsArray.slice(0, half);
    awayPlayers = lineupsArray.slice(half);
  }

  if (!homePlayers.length && !awayPlayers.length) {
    return `
      <div style="font-size:10px;text-align:center;padding:10px;color:var(--muted);">
        Lineup data not available
      </div>
    `;
  }

  return `
    <div class="lineup-grid-pro">

      <div>
        ${homePlayers.slice(0, 11).map((p, i) => `
          <div class="lineup-player-pro">
            <span>
              <span class="lineup-num">${i + 1}</span>
              ${escapeHtml(p.player || p.name || 'Player')}
            </span>
            <span class="lineup-pos">${escapeHtml(p.pos || p.position || '')}</span>
          </div>
        `).join('')}
      </div>

      <div>
        ${awayPlayers.slice(0, 11).map((p, i) => `
          <div class="lineup-player-pro">
            <span>
              <span class="lineup-num">${i + 1}</span>
              ${escapeHtml(p.player || p.name || 'Player')}
            </span>
            <span class="lineup-pos">${escapeHtml(p.pos || p.position || '')}</span>
          </div>
        `).join('')}
      </div>

    </div>
  `;
}

function renderTopGoalProps(props) {
  const list = props
    .filter(p => Number(p.goalChance || p.probability || 0) > 0)
    .sort((a, b) => Number(b.goalChance || b.probability || 0) - Number(a.goalChance || a.probability || 0))
    .slice(0, 3);

  if (!list.length) {
    return `<div style="font-size:10px; color:var(--muted)">Goal scorer props not available</div>`;
  }

  return list.map(p => `
    <div class="stat-row">
      <span>${escapeHtml(p.player || p.name || 'Player')}</span>
      <b>Goal ${p.goalChance || p.probability}%</b>
    </div>
  `).join('');
}

function renderTopAssistProps(props) {
  const list = props
    .filter(p => Number(p.assistChance || 0) > 0)
    .sort((a, b) => Number(b.assistChance || 0) - Number(a.assistChance || 0))
    .slice(0, 3);

  if (!list.length) {
    return `<div style="font-size:10px; color:var(--muted)">Assist props not available</div>`;
  }

  return list.map(p => `
    <div class="stat-row">
      <span>${escapeHtml(p.player || p.name || 'Player')}</span>
      <b>Assist ${p.assistChance}%</b>
    </div>
  `).join('');
}

async function analyze(btn, matchId, leagueKey) {
  const resDiv = document.getElementById(`res-${matchId}`);
  const lineupBox = document.getElementById(`lineup-${matchId}`);

  resDiv.style.display = 'block';
  resDiv.innerHTML = '<div class="loading">Running AI analysis...</div>';
  btn.disabled = true;

  try {
    const res = await fetch(`/api/soccer/analyze/${matchId}?league=${leagueKey}`);
    const data = await res.json();
    const a = data.analysis || data;

    const oneX2 = a.oneX2 || a.probabilities || a.market1x2 || {};

    const homePct = val(
      oneX2.home,
      oneX2.local,
      oneX2.homeWin,
      a.homeWin,
      a.homeWinPct,
      a.localWinPct,
      a.homeProbability
    );

    const drawPct = val(
      oneX2.draw,
      oneX2.empate,
      oneX2.tie,
      a.draw,
      a.drawPct,
      a.tieProbability
    );

    const awayPct = val(
      oneX2.away,
      oneX2.visitante,
      oneX2.awayWin,
      a.awayWin,
      a.awayWinPct,
      a.visitWinPct,
      a.awayProbability
    );

    const over25 = val(
      a.over25,
      a.goals25,
      a.overUnder,
      a.totalGoalsPick,
      a.totalPick,
      a.markets?.over25,
      a.totals?.over25,
      a.totals?.pick
    );

    const btts = val(
      a.btts,
      a.bothTeamsScore,
      a.bothTeamsToScore,
      a.ambosAnotan,
      a.markets?.btts
    );

    const props = firstValidArray(
      a.playerProps,
      a.props,
      a.playersProps,
      a.lineupProps,
      data.playerProps,
      data.props
    );

    const lineupsArray = firstValidArray(
      a.lineups,
      a.lineup,
      a.startingLineups,
      data.lineups,
      data.lineup,
      data.startingLineups
    );

    const lineupsObject = firstValidObject(
      a.lineups,
      a.lineup,
      a.startingLineups,
      data.lineups,
      data.lineup,
      data.startingLineups
    );

    const lineupsHtml = renderLineups(lineupsObject, lineupsArray);
    const goalPropsHtml = renderTopGoalProps(props);
    const assistPropsHtml = renderTopAssistProps(props);

    if (lineupBox) {
      lineupBox.style.display = 'block';
      lineupBox.innerHTML = lineupsHtml;
    }

    resDiv.innerHTML = `
      <div class="prediction-box">
        <div class="prediction-title">
          <span>🔥 Winner / 1X2 Pick</span>
          <span style="background:rgba(255,255,255,.1);padding:3px 8px;border-radius:5px;">
            ${normalizeConfidence(a.confidence)}
          </span>
        </div>

        <span class="pick-val">${translatePickValue(a.pick || 'N/A')}</span>
        <div class="data-mono">
          Model Probability: ${pct(a.probability ?? a.pickProbability ?? a.winProbability)}
        </div>
      </div>

      <div class="stat-row" style="margin-top:8px; border-top:1px solid var(--border)">
        <span>1X2 %:</span>
        <b>${pct(homePct)} | ${pct(drawPct)} | ${pct(awayPct)}</b>
      </div>

      <div class="stat-row">
        <span>Goals Over 2.5:</span>
        <b>${translatePickValue(over25)}</b>
      </div>

      <div class="stat-row">
        <span>Both Teams To Score:</span>
        <b>${translatePickValue(btts)}</b>
      </div>

      <div class="prop-title">Top 3 Goal Scorer Props</div>
      ${goalPropsHtml}

      <div class="prop-title">Top 3 Assist Props</div>
      ${assistPropsHtml}
    `;

    btn.innerText = 'RE-ANALYZE';
    btn.disabled = false;

  } catch(e) {
    resDiv.innerHTML = '<div style="color:red; font-size:10px;">Analysis error</div>';
    btn.disabled = false;
  }
}

  const btns = document.querySelectorAll('.analyze-btn');

  for (let b of btns) {
    b.click();
    await new Promise(r => setTimeout(r, 1200));
  }
}
