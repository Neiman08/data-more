<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data More Picks | MLB</title>
  <style>
    :root {
      --primary-blue: #3b82f6;
      --accent-green: #22c55e;
      --bg-dark-start: #0b1020;
      --bg-dark-end: #030612;
      --card-bg-dark: #11182d;
      --text-main: #ffffff;
      --text-subtle: #94a3b8;
      --border-dark: #1e293b;
    }

    /* LOADER VISUAL */
    .loading {
      animation: pulse 1s infinite;
      display: inline-block;
      font-weight: bold;
      color: var(--primary-blue);
    }

    @keyframes pulse {
      0% { opacity: .4 }
      50% { opacity: 1 }
      100% { opacity: .4 }
    }

    /* TICKER ESTILO ESPN */
    .ticker {
      width: 100%;
      overflow: hidden;
      background: linear-gradient(90deg, #020617, #06142d, #020617);
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 14px;
      margin-bottom: 20px;
      position: relative;
      box-shadow: 0 0 25px rgba(34,197,94,0.12);
      min-height: 45px;
    }

    .ticker::before {
      content: "MLB HOY";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 88px;
      background: #020617;
      color: #ffffff;
      font-weight: 900;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      border-right: 1px solid #1e293b;
    }

    .ticker-track {
      display: flex;
      gap: 28px;
      white-space: nowrap;
      animation: scrollTicker 55s linear infinite;
      padding-left: 110px;
    }

    .ticker-item {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      padding: 12px 0;
      color: #e5e7eb;
    }

    .ticker-team { font-weight: 800; color: #ffffff; }
    .ticker-logo { width: 18px; height: 18px; object-fit: contain; }
    .ticker-score {
      font-weight: 900;
      color: #22c55e;
      background: rgba(34,197,94,0.14);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(34,197,94,0.25);
    }

    @keyframes scrollTicker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111b33 0%, var(--bg-dark-start) 45%, var(--bg-dark-end) 100%);
      color: var(--text-main);
      padding: 25px;
    }

    .container { max-width: 1300px; margin: auto; }
    .brand-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .brand-logo { width: 70px; border-radius: 12px; }
    h1 { margin: 0; font-size: 30px; color: #7dd3fc; }
    .subtitle { color: var(--text-subtle); font-size: 14px; }

    .nav { margin-bottom: 20px; }
    .nav a {
      padding: 10px 16px; background: var(--card-bg-dark); border-radius: 8px;
      text-decoration: none; color: white; margin-right: 10px; font-weight: bold; border: 1px solid var(--border-dark);
    }
    .nav a.active { background: var(--primary-blue); border-color: #60a5fa; }

    .topbar {
      display: flex; gap: 12px; flex-wrap: wrap; background: var(--card-bg-dark);
      padding: 15px; border-radius: 10px; margin-bottom: 20px; align-items: center; border: 1px solid var(--border-dark);
    }

    input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid var(--border-dark); background: #ffffff; color: #000; font-weight: bold; }

    button { 
      padding: 8px; 
      border-radius: 6px; 
      border: none; 
      font-weight: bold; 
      cursor: pointer; 
      color: white; 
      background: var(--primary-blue); 
      transition: transform 0.1s; 
      font-size: 11px;
    }
    button:active { transform: scale(0.98); }
    .ticket-btn { background: var(--accent-green); }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: linear-gradient(145deg, #0f172a, #0b1224);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      box-shadow: 0 6px 12px rgba(0,0,0,0.35);
    }

    .matchup-pro { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .team-pro { display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 13px; }
    .team-pro img { width: 34px; height: 34px; object-fit: contain; }
    .vs-pro { font-size: 10px; color: var(--text-subtle); font-weight: bold; }
    .meta { font-size: 11px; color: var(--text-subtle); line-height: 1.4; }
    .odds-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 6px;
      background: #0d121f;
      border-radius: 6px;
      font-size: 10px;
      color: #93c5fd;
      border: 1px solid var(--border-dark);
    }

    .result { margin-top: 15px; }
    .pick-box { margin-top: 12px; padding: 12px; border-radius: 10px; font-weight: bold; line-height: 1.6; }
    .alta { border: 2px solid #22c55e; background: rgba(34,197,94,0.1); color: #4ade80; }
    .media { border: 2px solid #facc15; background: rgba(234,179,8,0.1); color: #facc15; }
    .baja { border: 2px solid #ef4444; background: rgba(239,68,68,0.1); color: #f87171; }

    .extra-box { margin-top: 10px; padding: 10px; background: #0b1224; border-radius: 10px; font-size: 13px; border: 1px solid #1e293b; }
    .extra-title { color: #7dd3fc; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-bottom: 5px; }
    .divider { height: 1px; background: #273449; margin: 10px 0; }

    .tickets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 25px; }
    @media (max-width: 900px) { .tickets-grid { grid-template-columns: 1fr; } }

    .ticket-box { 
      background: linear-gradient(135deg, #06391d 0%, #032c18 100%); 
      border: 1px solid var(--accent-green); 
      padding: 20px; 
      border-radius: 15px; 
    }

    .ticket-pick { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
    .footer-note { margin-top: 30px; text-align: center; color: var(--text-subtle); font-size: 13px; }
  </style>
</head>

<body>
  <div class="container">
    <div class="brand-header">
      <img src="/logo.png" class="brand-logo">
      <div>
        <h1>Data More MLB Picks</h1>
        <p class="subtitle">Moneyline, Run Line, Team Totals</p>
      </div>
    </div>

    <div id="liveTicker" class="ticker"></div>

    <div class="nav">
        <a href="/" class="active">⚾ MLB</a>
        <a href="/soccer">⚽ Soccer</a>
        <a href="/nba">🏀 NBA</a>
    </div>

    <div class="topbar">
      <label for="date">Fecha:</label>
      <input type="date" id="date" />
      <button id="loadBtn">Cargar juegos</button>
      <button id="analyzeAllBtn">Analizar todos</button>
      <button id="ticketBtn" class="ticket-btn">🎟️ Generar Ticket</button>
    </div>

    <div id="statusBox" class="status-box" style="margin-bottom: 15px; color: var(--text-subtle);">Listo...</div>
    <div id="ticketBox"></div>
    <div id="games" class="grid"></div>
    <p class="footer-note">Información procesada con algoritmos de IA y análisis estadístico avanzado.</p>
  </div>

  <script>
    const dateInput = document.getElementById("date");
    const gamesContainer = document.getElementById("games");
    const statusBox = document.getElementById("statusBox");
    const loadBtn = document.getElementById("loadBtn");
    const analyzeAllBtn = document.getElementById("analyzeAllBtn");
    const ticketBtn = document.getElementById("ticketBtn");
    const ticketBox = document.getElementById("ticketBox");

    dateInput.value = new Date().toISOString().split("T")[0];

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function formatNum(value, decimals = 2) {
      const num = Number(value);
      return isNaN(num) ? "N/D" : num.toFixed(decimals);
    }

    function confidenceClass(confidence) {
      const c = String(confidence || "").toLowerCase();
      if (c.includes("alta")) return "alta";
      if (c.includes("media")) return "media";
      return "baja";
    }

    function moneylineText(game) {
      if (!game.odds || !game.odds.bookmakers || !game.odds.bookmakers.length) return "Odds: no disponibles";
      const bookmaker = game.odds.bookmakers[0];
      const h2h = bookmaker.markets?.find(m => m.key === "h2h");
      if (!h2h) return "ML: no disponible";
      const away = h2h.outcomes?.find(o => o.name === game.awayTeam);
      const home = h2h.outcomes?.find(o => o.name === game.homeTeam);
      return `ML ${game.awayTeam}: ${away?.price ?? "N/D"} | ${game.homeTeam}: ${home?.price ?? "N/D"}`;
    }

    async function loadGames() {
      const date = dateInput.value;
      statusBox.innerHTML = `<span class="loading">Cargando juegos para ${date}...</span>`;
      gamesContainer.innerHTML = "";
      ticketBox.innerHTML = "";
      try {
        const res = await fetch(`/api/games?date=${encodeURIComponent(date)}&t=${Date.now()}`);
        const data = await res.json();
        if (!data.ok || !data.games.length) return statusBox.textContent = "No hay juegos.";

        for (const game of data.games) {
          const card = document.createElement("div");
          card.className = "card";
          
          card.innerHTML = `
            <div class="matchup-pro">
              <div class="team-pro">
                <img src="/logos/${escapeHtml(game.awayAbbrev)}.png" onerror="this.style.opacity='0'">
                <span>${escapeHtml(game.awayTeam)}</span>
              </div>
              <div class="vs-pro">VS</div>
              <div class="team-pro">
                <span>${escapeHtml(game.homeTeam)}</span>
                <img src="/logos/${escapeHtml(game.homeAbbrev)}.png" onerror="this.style.opacity='0'">
              </div>
            </div>
            <div class="meta">
              <strong>Status:</strong> ${escapeHtml(game.status)}<br>
              <strong>Pitchers:</strong> ${escapeHtml(game.awayProbablePitcher || "TBD")} vs ${escapeHtml(game.homeProbablePitcher || "TBD")}<br>
              <div class="odds-badge">${moneylineText(game)}</div>
            </div>
            <button onclick="analyzeGame('${game.gamePk}', '${escapeHtml(game.awayTeam)}', '${escapeHtml(game.homeTeam)}')" style="margin-top:10px; width:100%">Analizar</button>
            <div class="result" id="result-${game.gamePk}"></div>`;
          gamesContainer.appendChild(card);
        }
        statusBox.textContent = `${data.games.length} juegos cargados.`;
      } catch (e) { statusBox.textContent = "Error de conexión."; }
    }

    async function analyzeGame(gamePk, awayName, homeName) {
      const result = document.getElementById(`result-${gamePk}`);
      result.innerHTML = `<div class="loading" style="font-size:12px;">Analizando...</div>`;

      try {
        const res = await fetch(`/api/analyze/${gamePk}?date=${dateInput.value}`);
        const data = await res.json();
        if (!data.ok) return result.innerHTML = "Error en el análisis.";
        const a = data.analysis || {};
        const away = a.away || {};
        const home = a.home || {};
        const runLine = a.runLine || {};
        const teamTotals = a.teamTotals || {};
        const pickPct = a.pick === away.team ? away.modelWinPct : home.modelWinPct;

        result.innerHTML = `
          <div class="pick-box ${confidenceClass(a.confidence)}">
            🔥 <strong>Moneyline:</strong> ${escapeHtml(a.pick || "N/D")}<br>
            📊 <strong>Confianza:</strong> ${escapeHtml(a.confidence || "N/D")}<br>
            📈 <strong>Probabilidad:</strong> ${formatNum(pickPct)}%
          </div>
          <div class="extra-box">
            <div class="extra-title">📉 Run Line</div>
            <strong>Pick:</strong> ${escapeHtml(runLine.pick || "N/D")}<br>
            <strong>Prob:</strong> ${formatNum(runLine.coverProb)}%
          </div>
          <div class="extra-box">
            <div class="extra-title">📊 Team Totals</div>
            ${escapeHtml(awayName)}: ${escapeHtml(teamTotals.away?.pick)}<br>
            ${escapeHtml(homeName)}: ${escapeHtml(teamTotals.home?.pick)}
          </div>
          <div style="font-size:11px; color:var(--text-subtle); margin-top:8px;">
            ${(a.notes || []).map(n => `• ${escapeHtml(n)}`).join("<br>")}
          </div>`;
      } catch (e) { result.innerHTML = "Error de conexión."; }
    }

    async function loadMLBTicket() {
      const date = dateInput.value;
      ticketBox.innerHTML = `<div class="status-box"><span class="loading">Generando tickets inteligentes...</span></div>`;
      try {
        const gamesRes = await fetch(`/api/games?date=${encodeURIComponent(date)}&t=${Date.now()}`);
        const gamesData = await gamesRes.json();
        if (!gamesData.ok || !gamesData.games.length) return ticketBox.innerHTML = "No hay datos para generar ticket.";

        const allPicks = [];
        for (const game of gamesData.games) {
          const res = await fetch(`/api/analyze/${game.gamePk}?date=${encodeURIComponent(date)}`);
          const data = await res.json();
          if (data.ok && data.analysis) {
             const a = data.analysis;
             const prob = a.pick === a.away?.team ? a.away.modelWinPct : a.home?.modelWinPct;
             allPicks.push({ matchup: `${game.awayTeam} @ ${game.homeTeam}`, pick: a.pick, probability: prob, confidence: a.confidence });
          }
        }

        if (allPicks.length === 0) return ticketBox.innerHTML = "No se pudieron generar picks.";

        const safePicks = allPicks
          .filter(p => String(p.confidence || '').toLowerCase() === 'alta')
          .slice(0, 4);
        
        ticketBox.innerHTML = `
          <div class="tickets-grid">
            <div class="ticket-box">
              <h2>🔥 Ticket Seguro</h2>
              ${safePicks.length > 0 ? safePicks.map(p => `
                <div class="ticket-pick">
                  <strong>${escapeHtml(p.matchup)}</strong><br>
                  🎯 ${escapeHtml(p.pick)} (${formatNum(p.probability)}%)
                </div>
              `).join('') : '<p style="font-size:12px; opacity:0.7;">No hay picks de confianza alta disponibles hoy.</p>'}
            </div>
          </div>`;
      } catch (e) { ticketBox.innerHTML = "Error al procesar ticket."; }
    }

    loadBtn.addEventListener("click", loadGames);
    analyzeAllBtn.addEventListener("click", async () => {
      const cards = document.querySelectorAll('.card button[onclick^="analyzeGame"]');
      for (const b of cards) await b.click();
    });
    ticketBtn.addEventListener("click", loadMLBTicket);

    // INICIO
    loadGames();
  </script>
</body>
</html>
