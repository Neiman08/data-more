<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // BLOQUE DE SEGURIDAD
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || !user.proActivo) { 
      window.location.href = '/pago-manual'; 
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data More | Soccer Analytics Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">

  <style>
    /* --- SISTEMA DE DISEÑO UNIFICADO --- */
    :root {
      --green: #6bff19;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #888d93;
      --bg-panel: rgba(20, 25, 30, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    main.page {
      max-width: 1440px;
      margin: 0 auto;
      background: radial-gradient(circle at 30% 30%, #0a1a0a 0%, #020509 60%);
      position: relative;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    /* --- TICKER DE RESULTADOS --- */
    .espn-ticker-container {
        width: 100%;
        background: #000;
        border-bottom: 1px solid var(--border);
        height: 40px;
        display: flex;
        align-items: center;
        overflow: hidden;
        position: sticky;
        top: 0;
        z-index: 10000;
    }
    .ticker-wrapper {
        display: flex;
        white-space: nowrap;
        animation: ticker-scroll 150s linear infinite;
    }
    .ticker-item {
        display: flex;
        align-items: center;
        padding: 0 30px;
        border-right: 1px solid var(--border);
        height: 40px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
    }
    .ticker-item img { width: 18px; height: 18px; object-fit: contain; margin: 0 6px; }
    .ticker-score { color: #fff; margin: 0 2px; font-weight: 800; }
    .ticker-status { margin-left: 10px; color: var(--green); font-size: 9px; font-weight: bold; }
    
    @keyframes ticker-scroll {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
    }

    /* --- NAVEGACIÓN PRINCIPAL --- */
    header {
      height: 70px;
      padding: 0 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      position: sticky;
      top: 40px;
      z-index: 1000;
    }

    .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; font-family: 'Anton', sans-serif; text-transform: uppercase; }
    .logo span { color: var(--green); }

    nav { display: flex; gap: 20px; }
    nav a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
    nav a.active { opacity: 1; border-bottom: 2px solid var(--green); padding-bottom: 25px; margin-bottom: -25px; }

    /* --- CONTENEDOR --- */
    .container { padding: 30px 50px; }

    h1.page-title {
      font-family: 'Anton';
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }
    h1.page-title span { color: var(--green); }

    /* --- NAVEGACIÓN DE DEPORTES --- */
    .nav-sports { display: flex; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .nav-btn {
      padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
      color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer;
      background: rgba(255,255,255,0.03); transition: all 0.2s; text-transform: uppercase;
    }
    .nav-btn.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 800; }

    /* --- CONTROLES --- */
    .topbar { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
    .topbar input[type="date"] {
      background: #111; border: 1px solid var(--border); padding: 12px; border-radius: 8px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 600;
    }
    .btn-action {
      background: var(--green); color: #000; padding: 12px 24px; border-radius: 8px;
      font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 13px;
    }
    .btn-sec { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; }

    /* --- GRID DE 4 COLUMNAS --- */
    .league-title {
      font-family: 'Anton'; color: var(--green); margin: 30px 0 15px; 
      font-size: 18px; text-transform: uppercase; letter-spacing: 1px;
    }
    .games-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;
    }
    @media (max-width: 1300px) { .games-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1000px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 650px) { .games-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; backdrop-filter: blur(10px); display: flex; flex-direction: column;
    }

    /* --- ELEMENTOS INTERNOS TARJETA --- */
    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .team-box { text-align: center; flex: 1; }
    .team-logo { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
    .team-name { display: block; font-size: 12px; font-weight: 800; color: #fff; line-height: 1.2; }

    .score-center { flex: 1; text-align: center; }
    .score-now { font-size: 24px; font-weight: 900; color: var(--green); font-family: 'Anton', sans-serif; }
    .game-time { font-size: 10px; color: var(--muted); font-weight: 700; margin-top: 4px; }

    .soccer-lineup-box {
      font-size: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: var(--muted);
      margin-top: 10px;
    }

    .analyze-btn {
      width: 100%; background: var(--green); color: #000; border: none; border-radius: 8px;
      padding: 12px; font-size: 12px; font-weight: 800; cursor: pointer; margin-top: 15px;
      text-transform: uppercase; transition: opacity 0.2s;
    }

    /* --- RESULTADOS ANÁLISIS --- */
    .pick-res { 
      margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); 
      border-radius: 10px; border-left: 4px solid var(--green); display: none;
    }
    .stat-row { 
      display: flex; justify-content: space-between; padding: 6px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; 
    }
    .stat-row span { color: var(--muted); font-weight: 600; }
    .stat-row b { color: #fff; font-weight: 800; }
    
    .prop-title { color: #facc15; font-size: 10px; font-weight: 900; margin: 12px 0 8px; text-transform: uppercase; }

    .loading { animation: pulse 1s infinite; color: var(--green); font-size: 12px; text-align: center; padding: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* NUEVOS AJUSTES DE DISEÑO PARA ALINEACIONES */
    .pick-res {
      display: none;
      width: 100%;
      overflow: visible;
    }
    .pick-res .stat-row {
      gap: 12px;
    }
    .pick-res .stat-row span {
      text-align: left;
    }
    .pick-res .stat-row b {
      text-align: right;
    }
  </style>
</head>
<body>

<main class="page">
  <div class="espn-ticker-container">
    <div class="ticker-wrapper" id="tickerWrapper">Cargando marcadores en vivo...</div>
  </div>

  <header>
    <div class="logo">DATA-<span>MORE</span></div>
    <nav>
      <a href="/">Inicio</a>
      <a class="active" href="/soccer">Picks</a>
      <a href="/precios">Precios</a>
      <a href="/estadisticas">Estadísticas</a>
    </nav>
    <div class="header-actions">
      <span style="font-size:12px; color:#fff; font-weight:700;">👤 PRO ACTIVE</span>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">SOCCER <span>ANALYTICS PRO</span></h1>

    <div class="nav-sports">
        <a href="/"><button class="nav-btn">⚾ MLB</button></a>
        <a href="/soccer"><button class="nav-btn active">⚽ Fútbol</button></a>
        <a href="/nba"><button class="nav-btn">🏀 NBA</button></a>
        <a href="/horse.html"><button class="nav-btn">🏇 Hipismo</button></a>
    </div>

    <div class="topbar">
      <input type="date" id="dateSelect">
      <button class="btn-action" onclick="loadGames()">Cargar Pizarra</button>
      <button class="btn-action btn-sec" onclick="analyzeAll()">⚡ Analizar Todo</button>
    </div>

    <div id="gamesList"></div>
  </div>
</main>

<script>
// --- LÓGICA FUNCIONAL ---
function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])); }

async function initTicker() {
  const ticker = document.getElementById('tickerWrapper');
  try {
    const res = await fetch('/api/soccer/games-global');
    const data = await res.json();
    if(data.ok) {
      const content = data.games.map(g => `
        <div class="ticker-item">
            <img src="${g.homeLogo}">
            <span class="ticker-score">${g.homeScore ?? 0}</span> - <span class="ticker-score">${g.awayScore ?? 0}</span>
            <img src="${g.awayLogo}"> 
            <span class="ticker-status">${g.time}</span>
        </div>`).join('');
      ticker.innerHTML = content + content;
    }
  } catch(e) {}
}

async function loadGames() {
  const date = document.getElementById('dateSelect').value;
  const container = document.getElementById('gamesList');
  container.innerHTML = '<div class="loading">Sincronizando ligas globales...</div>';
  
  try {
    const res = await fetch(`/api/soccer/games-global?date=${date}`);
    const data = await res.json();
    if(!data.ok) { container.innerHTML = '<p>No hay juegos disponibles.</p>'; return; }

    const grouped = {};
    data.games.forEach(g => { (grouped[g.leagueName] = grouped[g.leagueName] || []).push(g); });

    container.innerHTML = '';
    for (const [league, games] of Object.entries(grouped)) {
      let html = `<h2 class="league-title">${escapeHtml(league)}</h2><div class="games-grid">`;
      games.forEach(g => {
        html += `
          <div class="card">
            <div class="match-header">
              <div class="team-box">
                <img src="${g.homeLogo}" class="team-logo" onerror="this.src='/logo.png'">
                <span class="team-name">${escapeHtml(g.homeTeam)}</span>
              </div>
              <div class="score-center">
                <div class="score-now">${g.homeScore ?? 0} - ${g.awayScore ?? 0}</div>
                <div class="game-time">${g.time || 'Programado'}</div>
              </div>
              <div class="team-box">
                <img src="${g.awayLogo}" class="team-logo" onerror="this.src='/logo.png'">
                <span class="team-name">${escapeHtml(g.awayTeam)}</span>
              </div>
            </div>
            
            <div class="soccer-lineup-box" id="lineup-${g.matchId}">
              Alineaciones confirmadas pendientes...
            </div>

            <button class="analyze-btn" onclick="analyze(this, '${g.matchId}', '${g.leagueKey}')">ANALIZAR CON IA</button>
            <div id="res-${g.matchId}" class="pick-res"></div>
          </div>`;
      });
      html += `</div>`;
      container.innerHTML += html;
    }
  } catch(e) { container.innerHTML = '<p>Error al cargar pizarra.</p>'; }
}

async function analyze(btn, matchId, leagueKey) {
  const resDiv = document.getElementById(`res-${matchId}`);
  resDiv.style.display = 'block';
  resDiv.innerHTML = '<div class="loading">Consultando IA...</div>';
  btn.disabled = true;

  try {
    const res = await fetch(`/api/soccer/analyze/${matchId}?league=${leagueKey}`);
    const data = await res.json();
    const a = data.analysis || data;

    function pct(v) {
      if (v === undefined || v === null || v === '' || Number.isNaN(Number(v))) return '?';
      return Number(v).toFixed(2) + '%';
    }

    function val(...items) {
      for (const item of items) {
        if (item !== undefined && item !== null && item !== '') return item;
      }
      return 'N/A';
    }

    const oneX2 = a.oneX2 || a.probabilities || a.market1x2 || {};

    const homePct = val(
      oneX2.home,
      oneX2.local,
      oneX2.homeWin,
      a.homeWin,
      a.homeWinPct,
      a.localWinPct,
      a.homeProbability
    );

    const drawPct = val(
      oneX2.draw,
      oneX2.empate,
      oneX2.tie,
      a.draw,
      a.drawPct,
      a.tieProbability
    );

    const awayPct = val(
      oneX2.away,
      oneX2.visitante,
      oneX2.awayWin,
      a.awayWin,
      a.awayWinPct,
      a.visitWinPct,
      a.awayProbability
    );

    const over25 = val(
      a.over25,
      a.goals25,
      a.overUnder,
      a.totalGoalsPick,
      a.totalPick,
      a.markets?.over25,
      a.totals?.over25,
      a.totals?.pick
    );

    const btts = val(
      a.btts,
      a.bothTeamsScore,
      a.bothTeamsToScore,
      a.ambosAnotan,
      a.markets?.btts
    );

    const props =
      a.playerProps ||
      a.props ||
      a.playersProps ||
      a.lineupProps ||
      data.playerProps ||
      data.props ||
      [];

    const lineups =
      a.lineups ||
      a.lineup ||
      a.startingLineups ||
      data.lineups ||
      data.lineup ||
      data.startingLineups ||
      [];

    let lineupsHtml = '';

    if (props && props.length) {
      lineupsHtml = props.map(p => `
        <div class="stat-row">
          <span>${p.player || p.name || 'Jugador'}</span>
          <b>${p.prediction || p.market || p.pick || p.prop || ''}</b>
        </div>
      `).join('');
    } else if (Array.isArray(lineups) && lineups.length) {
      lineupsHtml = lineups.map(p => `
        <div class="stat-row">
          <span>${p.player || p.name || 'Jugador'}</span>
          <b>${p.position || p.pos || p.team || 'Titular'}</b>
        </div>
      `).join('');
    } else if (lineups.home || lineups.away) {
      const homePlayers = lineups.home || [];
      const awayPlayers = lineups.away || [];

      lineupsHtml = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;">
          <div>
            <div class="prop-title">Local</div>
            ${homePlayers.map(p => `
              <div class="stat-row">
                <span>${p.player || p.name || 'Jugador'}</span>
                <b>${p.position || p.pos || ''}</b>
              </div>
            `).join('')}
          </div>

          <div>
            <div class="prop-title">Visitante</div>
            ${awayPlayers.map(p => `
              <div class="stat-row">
                <span>${p.player || p.name || 'Jugador'}</span>
                <b>${p.position || p.pos || ''}</b>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      lineupsHtml = `<div style="font-size:10px; color:var(--muted)">Datos de alineación no disponibles</div>`;
    }

    const lineupBox = document.getElementById(`lineup-${matchId}`);
    if (lineupBox) {
      lineupBox.innerHTML = lineupsHtml;
    }

    resDiv.innerHTML = `
      <div class="stat-row"><span>🎯 PICK:</span><b>${a.pick || 'N/A'}</b></div>

      <div class="stat-row">
        <span>Probabilidad:</span>
        <b style="color:var(--green)">${pct(a.probability ?? a.pickProbability ?? a.winProbability)}</b>
      </div>

      <div class="stat-row">
        <span>Confianza:</span>
        <b>${(a.confidence || 'MEDIA').toUpperCase()}</b>
      </div>

      <div class="stat-row" style="margin-top:8px; border-top:1px solid var(--border)">
        <span>1X2 %:</span>
        <b>${pct(homePct)} | ${pct(drawPct)} | ${pct(awayPct)}</b>
      </div>

      <div class="stat-row">
        <span>Goles +2.5:</span>
        <b>${over25}</b>
      </div>

      <div class="stat-row">
        <span>Ambos anotan:</span>
        <b>${btts}</b>
      </div>

      <div class="prop-title">Player Props / Alineación</div>
      ${lineupsHtml}
    `;

    btn.innerText = 'RE-ANALIZAR';
    btn.disabled = false;

  } catch(e) {
    resDiv.innerHTML = '<div style="color:red; font-size:10px;">Error de análisis</div>';
    btn.disabled = false;
  }
}

async function analyzeAll() {
  const btns = document.querySelectorAll('.analyze-btn');
  for(let b of btns) { 
    b.click(); 
    await new Promise(r => setTimeout(r, 1200)); 
  }
}

// Inicialización
document.getElementById('dateSelect').value = new Intl.DateTimeFormat('en-CA', {timeZone:'America/Chicago'}).format(new Date());
initTicker();
loadGames();
</script>
</body>
</html>
