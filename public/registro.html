<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Data More Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #030612;
      --bg-card: #0b1224;
      --primary-blue: #3b82f6;
      --accent-green: #22c55e;
      --text-main: #ffffff;
      --text-subtle: #94a3b8;
      --border-dark: #1e293b;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      text-align: center;
    }

    .logo-area img { width: 60px; margin-bottom: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 24px; color: #7dd3fc; }
    p { color: var(--text-subtle); font-size: 14px; margin-bottom: 30px; }

    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--primary-blue); margin-bottom: 8px; text-transform: uppercase; }
    
    input {
      width: 100%;
      background: #161e2e;
      border: 1px solid var(--border-dark);
      padding: 12px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); }

    .btn-submit {
      width: 100%;
      background: var(--accent-green);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .footer-links { margin-top: 25px; font-size: 13px; color: var(--text-subtle); }
    .footer-links a { color: var(--primary-blue); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="register-card">
    <div class="logo-area">
      <img src="/logo.png" alt="Data More Logo" onerror="this.style.display='none'">
    </div>
    <h2>Data More Pro</h2>
    <p>Crea tu cuenta para acceder a los análisis</p>

    <form action="/api/auth/register" method="POST">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" placeholder="Juan Pérez" required>
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" placeholder="tu@correo.com" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">REGISTRARSE AHORA</button>
    </form>

    <div class="footer-links">
      ¿Ya tienes cuenta? <a href="/login">Inicia Sesión</a>
    </div>
  </div>

</body>
</html>
