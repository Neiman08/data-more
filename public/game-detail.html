<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Game Detail | Data More</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green:#6bff19;
      --card:rgba(8,12,16,.88);
      --border:rgba(255,255,255,.10);
      --muted:#a9b0b8;
      --gold:#facc15;
      --red:#ef4444;
      --blue:#38bdf8;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.96)),
        url("logos/IMG_0579.JPG");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      color:#fff;
      -webkit-tap-highlight-color: transparent;
    }

    .page{
      max-width:1250px;
      margin:0 auto;
      padding:24px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
    }

    .back{
      color:var(--green);
      text-decoration:none;
      font-weight:900;
      border:1px solid rgba(107,255,25,.35);
      padding:10px 16px;
      border-radius:10px;
      background:rgba(255,255,255,.05);
      font-size:14px;
      transition:all .2s;
    }

    .logo{font-weight:900;font-size:22px;letter-spacing:-1px;}
    .logo span{color:var(--green);}

    .hero-card,.panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:24px;
      backdrop-filter:blur(14px);
      box-shadow:0 22px 60px rgba(0,0,0,.55);
      margin-bottom:24px;
    }

    .hero-card{border-color:rgba(107,255,25,.35);}

    .matchup{
      display:grid;
      grid-template-columns:1fr 210px 1fr;
      gap:16px;
      align-items:center;
      text-align:center;
    }

    .team img{
      width:95px;
      height:95px;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.65));
    }

    .team h2{
      font-family:'Anton',sans-serif;
      font-size:44px;
      margin:10px 0 4px;
      letter-spacing:1px;
    }

    .record{
      color:var(--green);
      font-weight:900;
      font-size:14px;
    }

    .pitcher{
      color:var(--gold);
      font-size:13px;
      font-weight:900;
      margin-top:7px;
    }

    .status{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .predictor-title{
      color:var(--green);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.5px;
      font-size:14px;
      margin-bottom:12px;
    }

    .circle-chart{
      width:205px;
      height:205px;
      border-radius:50%;
      background:conic-gradient(
        var(--gold) 0%,
        var(--gold) var(--away),
        var(--red) var(--away),
        var(--red) 100%
      );
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 auto;
      box-shadow:0 0 45px rgba(0,0,0,.65);
    }

    .circle-inner{
      width:134px;
      height:134px;
      background:#05080c;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.10);
      font-size:18px;
    }

    .circle-inner .vs{
      font-size:12px;
      color:var(--muted);
    }

    .pct-row{
      display:flex;
      justify-content:space-between;
      gap:14px;
      margin-top:14px;
    }

    .pct-box{
      flex:1;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px;
      font-weight:900;
    }

    .pct-box span{
      display:block;
      color:var(--muted);
      font-size:11px;
      margin-bottom:4px;
    }

    .panel h3{
      margin:0 0 14px;
      font-size:15px;
      color:var(--green);
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .sub-title{
      color:#fff;
      font-weight:900;
      font-size:14px;
      margin:8px 0 12px;
    }

    .stat-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:9px 0;
      font-size:13px;
    }

    .stat-row span:first-child{color:var(--muted);}
    .stat-row span:last-child{font-weight:900;text-align:right;}

    .bar-row{margin:12px 0;}

    .bar-top{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      font-weight:900;
      margin-bottom:7px;
    }

    .bar-bg{
      width:100%;
      height:10px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--green),#d7ff31);
      width:0%;
    }

    .player-card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .player-card img{
      width:48px;
      height:48px;
      border-radius:50%;
      object-fit:cover;
      background:#111;
      border:1px solid rgba(255,255,255,.15);
    }

    .p-name{
      font-weight:900;
      display:block;
      font-size:13px;
    }

    .p-info{
      color:var(--muted);
      font-size:11px;
      display:block;
      margin-top:3px;
    }

    .lineup-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .player{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:9px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:13px;
    }

    .num{
      color:var(--green);
      font-weight:900;
      margin-right:6px;
    }

    .badge{
      display:inline-block;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      background:rgba(107,255,25,.12);
      color:var(--green);
      border:1px solid rgba(107,255,25,.35);
      margin-bottom:12px;
    }

    .note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .loading{
      color:var(--green);
      font-weight:900;
      text-align:center;
      padding:40px;
    }

    /* DATA MORE LIVE GAMECAST */
    .live-gamecast-card{
      background:linear-gradient(180deg,rgba(18,22,27,.96),rgba(5,8,11,.97));
      border:1px solid rgba(107,255,25,.38);
      border-radius:26px;
      padding:24px;
      box-shadow:0 22px 60px rgba(0,0,0,.55),0 0 35px rgba(107,255,25,.07);
      margin-bottom:24px;
      backdrop-filter:blur(14px);
    }

    .gamecast-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .gamecast-kicker{
      margin:0 0 4px;
      color:var(--green);
      font-weight:900;
      font-size:12px;
      letter-spacing:1.5px;
    }

    .gamecast-header h2{
      margin:0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      letter-spacing:-.5px;
    }

    .gamecast-status{
      background:rgba(107,255,25,.12);
      color:var(--green);
      border:1px solid rgba(107,255,25,.35);
      padding:8px 13px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .gamecast-scoreline{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .gc-score-team{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .gc-score-team strong{
      font-family:'Anton',sans-serif;
      font-size:28px;
      letter-spacing:1px;
    }

    .gc-score-team span{
      color:var(--green);
      font-size:32px;
      font-weight:900;
      font-family:'Roboto Mono',monospace;
    }

    .gc-inning-box{
      text-align:center;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      font-size:12px;
    }

    .gamecast-matchup{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:14px;
      align-items:center;
      margin-top:16px;
    }

    .gc-player{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:15px;
    }

    .gc-player.right{text-align:right;}

    .gc-label{
      display:block;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .gc-player strong{
      display:block;
      color:#fff;
      font-size:17px;
      font-weight:900;
      margin-top:6px;
    }

    .gc-player small{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
      font-weight:800;
    }

    .gc-vs{
      color:var(--muted);
      font-weight:900;
      font-size:13px;
    }

    .gamecast-counts{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:20px 0;
    }

    .gc-count-box{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:14px;
      padding:11px;
      text-align:center;
      font-size:12px;
      font-weight:900;
      color:#fff;
    }

    .dot-wrap{
      display:block;
      margin-top:7px;
      letter-spacing:3px;
      font-size:13px;
    }

    .gamecast-main{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
      align-items:center;
    }

    .strike-zone-wrap{
      background:rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.06);
      border-radius:22px;
      padding:20px;
      min-height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .strike-zone{
      position:relative;
      width:235px;
      height:235px;
      background:
        linear-gradient(90deg,rgba(59,130,246,.58) 0 33.3%,rgba(239,68,68,.58) 33.3% 66.6%,rgba(59,130,246,.58) 66.6% 100%),
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.20));
      border:2px solid rgba(255,255,255,.18);
      box-shadow:0 18px 40px rgba(0,0,0,.5);
      overflow:hidden;
    }

    .strike-zone:before,
    .strike-zone:after{
      content:"";
      position:absolute;
      background:rgba(0,0,0,.55);
      z-index:1;
    }

    .strike-zone:before{
      left:33.33%;
      top:0;
      width:2px;
      height:100%;
      box-shadow:78px 0 0 rgba(0,0,0,.55);
    }

    .strike-zone:after{
      top:33.33%;
      left:0;
      height:2px;
      width:100%;
      box-shadow:0 78px 0 rgba(0,0,0,.55);
    }

    .zone-box{
      position:absolute;
      inset:45px;
      border:4px solid rgba(0,0,0,.78);
      z-index:2;
    }

    .pitch-dot{
      position:absolute;
      left:50%;
      top:45%;
      width:34px;
      height:34px;
      border-radius:50%;
      transform:translate(-50%,-50%);
      background:#ef1111;
      color:#fff;
      display:grid;
      place-items:center;
      border:2px solid #050505;
      font-weight:900;
      z-index:5;
      box-shadow:
        0 7px 18px rgba(0,0,0,.55),
        0 0 18px rgba(255,255,255,.25),
        0 0 35px currentColor;
      transition:
        left .6s cubic-bezier(.22,.61,.36,1),
        top .6s cubic-bezier(.22,.61,.36,1),
        background .35s ease,
        transform .3s ease;
    }

    .pitch-dot.pulse{
      transform:translate(-50%,-50%) scale(1.18);
    }

    .bases-panel{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:22px;
      padding:18px;
      min-height:300px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .bases-title{
      color:var(--green);
      font-weight:900;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:8px;
    }

    .diamond{
      height:155px;
      position:relative;
      margin:8px auto;
      width:190px;
    }

    .base{
      position:absolute;
      width:34px;
      height:34px;
      background:rgba(255,255,255,.20);
      border:2px solid rgba(255,255,255,.35);
      transform:rotate(45deg);
      border-radius:4px;
    }

    .base.active{
      background:var(--green);
      border-color:rgba(255,255,255,.85);
      box-shadow:0 0 20px rgba(107,255,25,.65);
    }

    .base.home{left:78px;bottom:0;background:rgba(255,255,255,.10);}
    .base.first{right:22px;bottom:58px;}
    .base.second{left:78px;top:0;}
    .base.third{left:22px;bottom:58px;}

    .bases-text{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      line-height:1.45;
      text-align:center;
      margin:6px 0 0;
    }

    .last-pitch{
      margin-top:20px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .last-pitch-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .last-pitch-number{
      display:grid;
      place-items:center;
      width:34px;
      height:34px;
      border-radius:50%;
      background:#ef1111;
      color:#fff;
      font-weight:900;
      border:2px solid #050505;
      flex:0 0 auto;
    }

    .last-pitch strong{
      color:#fff;
      font-size:13px;
      display:block;
    }

    .last-pitch small{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      display:block;
      margin-top:3px;
    }

    .last-pitch-type{
      color:var(--green);
      font-weight:900;
      font-size:12px;
      text-align:right;
    }

    .live-probability{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      padding:13px 15px;
      margin-bottom:18px;
    }

    .live-prob-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
    }

    .live-prob-top strong{
      color:var(--green);
      font-family:'Roboto Mono',monospace;
      font-size:14px;
    }

    .prob-bar{
      width:100%;
      height:11px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin-top:9px;
    }

    .prob-fill{
      width:50%;
      height:100%;
      background:linear-gradient(90deg,#6bff19,#c7ff45);
      border-radius:999px;
      transition:width .6s ease;
      box-shadow:0 0 18px rgba(107,255,25,.45);
    }

    .momentum-wrap{
      margin-top:18px;
    }

    .momentum-title{
      color:var(--green);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .momentum-bar{
      width:100%;
      height:14px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.06);
      display:flex;
    }

    .momentum-away{
      background:linear-gradient(90deg,#facc15,#ffdd57);
      width:50%;
      transition:width .5s ease;
    }

    .momentum-home{
      background:linear-gradient(90deg,#ef4444,#ff6b6b);
      width:50%;
      transition:width .5s ease;
    }

    .live-alert{
      margin-top:18px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(107,255,25,.08);
      border:1px solid rgba(107,255,25,.25);
      color:#fff;
      font-size:12px;
      font-weight:800;
      line-height:1.5;
    }

    .exit-velo{
      margin-top:18px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .exit-box{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:12px;
    }

    .exit-box span{
      display:block;
      color:var(--muted);
      font-size:11px;
      margin-bottom:5px;
      font-weight:900;
    }

    .exit-box strong{
      color:#fff;
      font-size:20px;
      font-family:'Roboto Mono',monospace;
    }

    .impact-red{color:#ff5a5a;}
    .impact-green{color:#6bff19;}

    /* PRO DASHBOARD LAYOUT */
    .pro-dashboard{
      display:grid;
      grid-template-columns:46% 54%;
      gap:16px;
      align-items:start;
      margin-bottom:18px;
    }

    .pro-dashboard .hero-card,
    .pro-dashboard .live-gamecast-card{
      height:auto;
      min-height:0;
      margin-bottom:0;
    }

    .hero-card{
      min-height:0 !important;
    }

    .pitcher-profile-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .pitcher-profile{
      display:grid;
      grid-template-columns:86px 1fr;
      gap:14px;
      align-items:center;
    }

    .pitcher-profile img{
      width:84px;
      height:84px;
      object-fit:cover;
      border-radius:14px;
      background:#111;
      border:1px solid rgba(255,255,255,.16);
    }

    .pitcher-profile + .pitcher-profile{
      border-left:1px solid rgba(255,255,255,.10);
      padding-left:18px;
    }

    .pro-duo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .pro-info-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .pro-info-grid .panel{
      margin-bottom:0;
      padding:18px;
    }

    .two-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    @media(max-width:1100px){
      .pro-dashboard,
      .pro-duo{
        grid-template-columns:1fr;
      }
      .pro-info-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(max-width:850px){
      .page{padding:12px;}

      .matchup{
        display:flex;
        flex-direction:column;
        gap:20px;
      }

      .team{
        display:flex;
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        text-align:left;
        width:100%;
        background:rgba(255,255,255,.04);
        padding:12px 16px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,.05);
      }

      .team img{
        width:60px;
        height:60px;
        order:2;
      }

      .team h2{
        font-size:26px;
        margin:0;
      }

      .circle-chart{
        width:180px;
        height:180px;
        margin:10px auto;
      }

      .circle-inner{
        width:120px;
        height:120px;
        font-size:16px;
      }

      .pct-row{
        flex-direction:row;
        gap:10px;
      }

      .pct-box{
        text-align:center;
        font-size:14px;
        padding:8px;
      }

      .two-grid,
      .lineup-box{
        grid-template-columns:1fr;
        gap:12px;
      }

      .player-card{
        flex-direction:row;
        align-items:center;
        gap:12px;
      }

      .player-card img{
        width:50px;
        height:50px;
      }

      .hero-card,.panel,.live-gamecast-card{
        padding:18px;
        border-radius:18px;
      }

      .gamecast-scoreline,
      .gamecast-matchup,
      .gamecast-main{
        grid-template-columns:1fr;
      }

      .strike-zone{
        width:205px;
        height:205px;
      }

      body{padding-bottom:60px;}

      .back{
        padding:8px 12px;
        font-size:12px;
      }
    }

    @media(max-width:700px){
      .pro-info-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="top">
      <a href="mlb.html" class="back">← MLB</a>
      <div class="logo">DATA-<span>MORE</span></div>
    </div>

    <div id="content" class="loading">Loading game data...</div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gamePk = params.get('gamePk');
    const date = params.get('date');
    const content = document.getElementById('content');
    let liveGamecastTimer = null;

    async function safeFetch(url, fallback = {}) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);

        if (!res.ok) return fallback;
        return await res.json();
      } catch (err) {
        console.warn("Fetch failed:", url, err);
        return fallback;
      }
    }

    function getPitcherId(centerData, game, side){
      return (
        centerData?.pitcherStats?.[side]?.playerId ||
        centerData?.pitcherStats?.[side]?.id ||
        centerData?.pitcherStats?.[side]?.personId ||
        game?.[`${side}PitcherId`] ||
        game?.[`${side}ProbablePitcherId`] ||
        game?.probablePitchers?.[side]?.id ||
        game?.probablePitchers?.[side]?.playerId ||
        game?.[side]?.probablePitcher?.id ||
        null
      );
    }

    function pitcherImg(id){
      if(!id) return '/logos/player-placeholder.png';
      return `https://img.mlbstatic.com/mlb-photos/image/upload/w_213,d_people:generic:headshot:silo:current.png,q_auto:best,f_auto/v1/people/${id}/headshot/67/current`;
    }

    function imgFallback(el){
      el.onerror = null;
      el.src = '/logos/player-placeholder.png';
    }

    async function loadDetail(){
      try{
        if(!gamePk || !date){
          content.innerHTML = 'Missing game parameters.';
          return;
        }

        const gamesData = await safeFetch(`/api/baseball/games?date=${date}`, { ok:false, games:[] });
        const lineupData = await safeFetch(`/api/baseball/lineup/${gamePk}`, { ok:false });
        const propsData = await safeFetch(`/api/baseball/player-props/${gamePk}`, { ok:false });
        const analysisData = await safeFetch(`/api/analyze/${gamePk}?date=${date}`, { ok:false });
        const centerData = await safeFetch(`/api/baseball/game-center/${gamePk}?date=${date}`, {});

        if(!gamesData.ok){
          content.innerHTML = 'Unable to load schedule.';
          return;
        }

        const game = gamesData.games.find(g => String(g.gamePk) === String(gamePk));

        if(!game){
          content.innerHTML = 'Game not found.';
          return;
        }

        const edge = centerData.advancedEdge || {};
        const advancedModel = {
          projectedRuns: {
            away: edge.awayProjectedRuns ?? 'Pending',
            home: edge.homeProjectedRuns ?? 'Pending',
            total: edge.projectedTotal ?? 'Pending'
          },
          simulation: {
            runs: edge.simulationRuns ?? '1,000,000',
            awayWinPct: edge.awayWinPct ?? 'Pending',
            homeWinPct: edge.homeWinPct ?? 'Pending',
            mostCommonScore: edge.mostCommonScore ?? 'Pending'
          },
          alerts: centerData.advancedModel?.alerts || [
            'Confirm lineup before first pitch',
            'Review bullpen usage before betting'
          ]
        };

        const odds = centerData.odds || {};
        const awayPct = Number(analysisData?.analysis?.away?.modelWinPct || 50);
        const homePct = Number(analysisData?.analysis?.home?.modelWinPct || 50);

        const awayPlayers = getTeamPlayers(propsData, game.awayAbbrev);
        const homePlayers = getTeamPlayers(propsData, game.homeAbbrev);

        const awayPitcherId = getPitcherId(centerData, game, 'away');
        const homePitcherId = getPitcherId(centerData, game, 'home');

        const awayPitcherImg = pitcherImg(awayPitcherId);
        const homePitcherImg = pitcherImg(homePitcherId);

        console.log('AWAY PITCHER ID:', awayPitcherId, game.awayPitcher);
        console.log('HOME PITCHER ID:', homePitcherId, game.homePitcher);
        console.log('CENTER PITCHER STATS:', centerData.pitcherStats);

        content.className = '';

        content.innerHTML = `
          <div class="pro-dashboard">
            <section class="hero-card">
              <div class="matchup">
                <div class="team">
                  <div>
                    <h2>${game.awayAbbrev}</h2>
                    <div class="record">${game.awayWins || 0}-${game.awayLosses || 0}</div>
                    <div class="pitcher">${game.awayPitcher || 'Pitcher TBD'}</div>
                  </div>
                  <img src="/logos/${game.awayAbbrev}.png" onerror="this.style.display='none'">
                </div>

                <div>
                  <div class="status">${game.status || 'Scheduled'}</div>
                  <div class="predictor-title">Matchup Predictor</div>

                  <div class="circle-chart" style="--away:${awayPct}%;">
                    <div class="circle-inner">
                      <span>${game.awayAbbrev}</span>
                      <span class="vs">VS</span>
                      <span>${game.homeAbbrev}</span>
                    </div>
                  </div>

                  <div class="pct-row">
                    <div class="pct-box"><span>${game.awayAbbrev}</span>${awayPct.toFixed(1)}%</div>
                    <div class="pct-box"><span>${game.homeAbbrev}</span>${homePct.toFixed(1)}%</div>
                  </div>
                </div>

                <div class="team">
                  <div>
                    <h2>${game.homeAbbrev}</h2>
                    <div class="record">${game.homeWins || 0}-${game.homeLosses || 0}</div>
                    <div class="pitcher">${game.homePitcher || 'Pitcher TBD'}</div>
                  </div>
                  <img src="/logos/${game.homeAbbrev}.png" onerror="this.style.display='none'">
                </div>
              </div>
            </section>

            <section class="live-gamecast-card" id="liveGamecastCard">
              <div class="gamecast-header">
                <div>
                  <p class="gamecast-kicker">DATA MORE LIVE GAMECAST</p>
                  <h2>Pitch by Pitch</h2>
                </div>
                <div class="gamecast-status" id="gcStatus">Loading...</div>
              </div>

              <div class="live-probability">
                <div class="live-prob-top">
                  <span id="gcProbLabel">LIVE WIN PROBABILITY</span>
                  <strong id="gcWinProbText">50%</strong>
                </div>
                <div class="prob-bar">
                  <div class="prob-fill" id="gcWinProbFill"></div>
                </div>
              </div>

              <div class="gamecast-scoreline">
                <div class="gc-score-team">
                  <strong id="gcAwayAbbr">${game.awayAbbrev}</strong>
                  <span id="gcAwayScore">${game.awayScore ?? 0}</span>
                </div>
                <div class="gc-inning-box" id="gcInning">${game.inning || 'Pre-game'}</div>
                <div class="gc-score-team">
                  <strong id="gcHomeAbbr">${game.homeAbbrev}</strong>
                  <span id="gcHomeScore">${game.homeScore ?? 0}</span>
                </div>
              </div>

              <div class="gamecast-matchup">
                <div class="gc-player">
                  <span class="gc-label">Pitcher</span>
                  <strong id="gcPitcher">--</strong>
                  <small id="gcPitcherInfo">--</small>
                </div>

                <div class="gc-vs">VS</div>

                <div class="gc-player right">
                  <span class="gc-label">Batter</span>
                  <strong id="gcBatter">--</strong>
                  <small id="gcBatterInfo">--</small>
                </div>
              </div>

              <div class="gamecast-counts">
                <div class="gc-count-box">BALLS <span class="dot-wrap" id="gcBalls">○ ○ ○ ○</span></div>
                <div class="gc-count-box">STRIKES <span class="dot-wrap" id="gcStrikes">○ ○ ○</span></div>
                <div class="gc-count-box">OUTS <span class="dot-wrap" id="gcOuts">○ ○ ○</span></div>
              </div>

              <div class="momentum-wrap">
                <div class="momentum-title">Live Momentum</div>
                <div class="momentum-bar">
                  <div class="momentum-away" id="momentumAway"></div>
                  <div class="momentum-home" id="momentumHome"></div>
                </div>
              </div>

              <div class="live-alert" id="liveAlertBox">
                Waiting for live analysis...
              </div>

              <div class="exit-velo">
                <div class="exit-box">
                  <span>EST. EXIT VELO</span>
                  <strong id="exitVelo">-- MPH</strong>
                </div>
                <div class="exit-box">
                  <span>CONTACT QUALITY</span>
                  <strong id="contactQuality">--</strong>
                </div>
              </div>

              <div class="gamecast-main" style="margin-top:24px;">
                <div class="strike-zone-wrap">
                  <div class="strike-zone">
                    <div class="zone-box"></div>
                    <div class="pitch-dot" id="gcPitchDot">1</div>
                  </div>
                </div>

                <div class="bases-panel">
                  <div>
                    <div class="bases-title">Bases</div>
                    <div class="diamond">
                      <div class="base second" id="base2"></div>
                      <div class="base third" id="base3"></div>
                      <div class="base first" id="base1"></div>
                      <div class="base home"></div>
                    </div>
                    <p class="bases-text" id="gcBasesText">Bases: --</p>
                  </div>

                  <div class="last-pitch">
                    <div class="last-pitch-left">
                      <div class="last-pitch-number" id="gcPitchNumber">#</div>
                      <div>
                        <strong id="gcPitchResult">Last pitch</strong>
                        <small id="gcPitchDescription">Waiting for play...</small>
                      </div>
                    </div>
                    <div class="last-pitch-type" id="gcPitchType">--</div>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <section class="panel">
            <h3>Pitcher Breakdown</h3>
            <div class="pitcher-profile-grid">
              <div class="pitcher-profile">
                <img src="${awayPitcherImg}" onerror="imgFallback(this)">
                <div>
                  <div class="sub-title">${game.awayAbbrev} - ${game.awayPitcher || 'TBD'}</div>
                  <div class="stat-row"><span>W-L</span><span>${centerData?.pitcherStats?.away?.wins || 0}-${centerData?.pitcherStats?.away?.losses || 0}</span></div>
                  <div class="stat-row"><span>ERA</span><span>${centerData?.pitcherStats?.away?.ERA || '--'}</span></div>
                  <div class="stat-row"><span>WHIP</span><span>${centerData?.pitcherStats?.away?.WHIP || '--'}</span></div>
                  <div class="stat-row"><span>K</span><span>${centerData?.pitcherStats?.away?.K || 0}</span></div>
                  <div class="stat-row"><span>BB</span><span>${centerData?.pitcherStats?.away?.BB || 0}</span></div>
                  <div class="stat-row"><span>HR Allowed</span><span>${centerData?.pitcherStats?.away?.HR || 0}</span></div>
                </div>
              </div>

              <div class="pitcher-profile">
                <img src="${homePitcherImg}" onerror="imgFallback(this)">
                <div>
                  <div class="sub-title">${game.homeAbbrev} - ${game.homePitcher || 'TBD'}</div>
                  <div class="stat-row"><span>W-L</span><span>${centerData?.pitcherStats?.home?.wins || 0}-${centerData?.pitcherStats?.home?.losses || 0}</span></div>
                  <div class="stat-row"><span>ERA</span><span>${centerData?.pitcherStats?.home?.ERA || '--'}</span></div>
                  <div class="stat-row"><span>WHIP</span><span>${centerData?.pitcherStats?.home?.WHIP || '--'}</span></div>
                  <div class="stat-row"><span>K</span><span>${centerData?.pitcherStats?.home?.K || 0}</span></div>
                  <div class="stat-row"><span>BB</span><span>${centerData?.pitcherStats?.home?.BB || 0}</span></div>
                  <div class="stat-row"><span>HR Allowed</span><span>${centerData?.pitcherStats?.home?.HR || 0}</span></div>
                </div>
              </div>
            </div>
          </section>

          <section class="pro-info-grid">
            <div class="panel">
              <h3>Game Summary</h3>
              <div class="stat-row"><span>Status</span><span>${game.status || 'N/A'}</span></div>
              <div class="stat-row"><span>Inning</span><span>${game.inning || 'Pre-game'}</span></div>
              <div class="stat-row"><span>Away</span><span>${game.awayAbbrev}</span></div>
              <div class="stat-row"><span>Home</span><span>${game.homeAbbrev}</span></div>
            </div>

            <div class="panel">
              <h3>Recent Form</h3>
              <div class="stat-row"><span>${game.awayAbbrev} last 5</span><span>${game.awayLast5 || 'No data'}</span></div>
              <div class="stat-row"><span>${game.homeAbbrev} last 5</span><span>${game.homeLast5 || 'No data'}</span></div>
              <div class="stat-row"><span>${game.awayAbbrev} Record</span><span>${game.awayWins || 0}-${game.awayLosses || 0}</span></div>
              <div class="stat-row"><span>${game.homeAbbrev} Record</span><span>${game.homeWins || 0}-${game.homeLosses || 0}</span></div>
            </div>

            <div class="panel">
              <h3>Probable Pitchers</h3>
              <div class="stat-row"><span>${game.awayAbbrev}</span><span>${game.awayPitcher || 'TBD'}</span></div>
              <div class="stat-row"><span>${game.homeAbbrev}</span><span>${game.homePitcher || 'TBD'}</span></div>
              <div class="stat-row"><span>Analysis Type</span><span>Pre-Game Data</span></div>
            </div>

            <div class="panel">
                <h3>Vegas Info</h3>
                <div class="stat-row"><span>Current Line</span><span>${odds.currentLine ?? 'Pending'}</span></div>
                <div class="stat-row"><span>Vegas Prob.</span><span>${odds.vegasImplied ?? 'Pending'}</span></div>
                <div class="stat-row"><span>Model Edge</span><span>${odds.modelEdge ?? 'Pending'}</span></div>
                <div class="stat-row"><span>Movement</span><span>${odds.movement ?? 'Pending'}</span></div>
            </div>
          </section>

          <div class="pro-duo">
            <section class="panel">
              <h3>Pitcher vs Opponent</h3>
              <div class="two-grid">
                <div>
                  <div class="sub-title">${game.awayPitcher || 'Away pitcher'} vs ${game.homeAbbrev}</div>
                  ${renderRiskBars(homePct)}
                </div>
                <div>
                  <div class="sub-title">${game.homePitcher || 'Home pitcher'} vs ${game.awayAbbrev}</div>
                  ${renderRiskBars(awayPct)}
                </div>
              </div>
            </section>

            <section class="panel">
              <h3>Team Comparison</h3>
              <div class="stat-row"><span>AVG</span><span>${centerData?.teamStats?.away?.AVG || '--'} | ${centerData?.teamStats?.home?.AVG || '--'}</span></div>
              <div class="stat-row"><span>Runs</span><span>${centerData?.teamStats?.away?.runs || 0} | ${centerData?.teamStats?.home?.runs || 0}</span></div>
              <div class="stat-row"><span>Hits</span><span>${centerData?.teamStats?.away?.hits || 0} | ${centerData?.teamStats?.home?.hits || 0}</span></div>
              <div class="stat-row"><span>HR</span><span>${centerData?.teamStats?.away?.HR || 0} | ${centerData?.teamStats?.home?.HR || 0}</span></div>
              <div class="stat-row"><span>OBP / SLG</span><span>${centerData?.teamStats?.away?.OBP || '--'}/${centerData?.teamStats?.away?.SLG || '--'} | ${centerData?.teamStats?.home?.OBP || '--'}/${centerData?.teamStats?.home?.SLG || '--'}</span></div>
            </section>
          </div>

          <section class="panel">
            <h3>Data More Advanced Edge</h3>
            <div class="two-grid">
              <div>
                <div class="sub-title">Projected Runs</div>
                <div class="stat-row"><span>${game.awayAbbrev}</span><span id="awayProjectedRuns">${advancedModel.projectedRuns.away}</span></div>
                <div class="stat-row"><span>${game.homeAbbrev}</span><span id="homeProjectedRuns">${advancedModel.projectedRuns.home}</span></div>
                <div class="stat-row"><span>Projected Total</span><span id="projectedTotal">${advancedModel.projectedRuns.total}</span></div>
              </div>

              <div>
                <div class="sub-title">Simulation</div>
                <div class="stat-row"><span>Runs</span><span id="simulationRuns">${advancedModel.simulation.runs}</span></div>
                <div class="stat-row"><span>${game.awayAbbrev} Win %</span><span id="awayWinPct">${advancedModel.simulation.awayWinPct}${advancedModel.simulation.awayWinPct !== 'Pending' ? '%' : ''}</span></div>
                <div class="stat-row"><span>${game.homeAbbrev} Win %</span><span id="homeWinPct">${advancedModel.simulation.homeWinPct}${advancedModel.simulation.homeWinPct !== 'Pending' ? '%' : ''}</span></div>
                <div class="stat-row"><span>Most Common Score</span><span id="mostCommonScore">${advancedModel.simulation.mostCommonScore}</span></div>
              </div>
            </div>
          </section>

          <section class="panel">
            <h3>Model vs Vegas Edge</h3>
            <div class="stat-row"><span>Model Favorite</span><div id="modelFavorite">--</div></div>
            <div class="stat-row"><span>Vegas Favorite</span><div id="vegasFavorite">--</div></div>
            <div class="stat-row"><span>Edge</span><div id="edgeSignal" style="color:var(--green); font-weight:900;">--</div></div>
            <div class="stat-row"><span>Bet Signal</span><div id="betSignal">--</div></div>
          </section>

          <section class="panel">
            <h3>Top Hit Players</h3>
            <div class="two-grid">
              <div>
                <div class="sub-title">${game.awayAbbrev}</div>
                ${renderTeamHitPlayers(awayPlayers, propsData, 0)}
              </div>
              <div>
                <div class="sub-title">${game.homeAbbrev}</div>
                ${renderTeamHitPlayers(homePlayers, propsData, 1)}
              </div>
            </div>
          </section>

          <section class="panel">
            <h3>Confirmed / Projected Lineups</h3>
            ${renderLineups(lineupData, propsData, game.awayAbbrev, game.homeAbbrev)}
          </section>
        `;

        document.getElementById('modelFavorite').textContent = centerData.modelVegasEdge?.modelFavorite || '--';
        document.getElementById('vegasFavorite').textContent = centerData.modelVegasEdge?.vegasFavorite || '--';
        document.getElementById('edgeSignal').textContent = centerData.modelVegasEdge?.edgeSignal || '--';
        document.getElementById('betSignal').textContent = centerData.modelVegasEdge?.betSignal || '--';

        await loadLiveGamecast();
        if(liveGamecastTimer) clearInterval(liveGamecastTimer);
        liveGamecastTimer = setInterval(loadLiveGamecast, 15000);

      }catch(err){
        console.error(err);
        content.innerHTML = 'Error loading game detail.';
      }
    }

    async function loadLiveGamecast(){
      try{
        if(!gamePk) return;

        const res = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`);
        const data = await res.json();

        const liveData = data.liveData || {};
        const linescore = liveData.linescore || {};
        const plays = liveData.plays || {};
        const currentPlay = plays.currentPlay || {};
        const matchup = currentPlay.matchup || {};
        const count = currentPlay.count || {balls:0, strikes:0, outs:0};

        document.getElementById('gcStatus').textContent = data.gameData?.status?.detailedState || 'LIVE';
        document.getElementById('gcAwayScore').textContent = linescore.teams?.away?.runs ?? 0;
        document.getElementById('gcHomeScore').textContent = linescore.teams?.home?.runs ?? 0;

        updateLiveWinProbability(linescore);

        const inningState = linescore.inningState || '';
        const currentInning = linescore.currentInningOrdinal || '';
        document.getElementById('gcInning').textContent = inningState ? `${inningState} ${currentInning}` : 'LIVE';

        document.getElementById('gcPitcher').textContent = matchup.pitcher?.fullName || '--';
        document.getElementById('gcBatter').textContent = matchup.batter?.fullName || '--';

        document.getElementById('gcBalls').textContent = '● '.repeat(count.balls).padEnd(8, '○ ');
        document.getElementById('gcStrikes').textContent = '● '.repeat(count.strikes).padEnd(6, '○ ');
        document.getElementById('gcOuts').textContent = '● '.repeat(count.outs).padEnd(6, '○ ');

        const offense = linescore.offense || {};
        document.getElementById('base1').className = offense.first ? 'base first active' : 'base first';
        document.getElementById('base2').className = offense.second ? 'base second active' : 'base second';
        document.getElementById('base3').className = offense.third ? 'base third active' : 'base third';

        let basesText = "Bases Empty";
        if(offense.first && offense.second && offense.third) basesText = "Bases Loaded";
        else if(offense.first || offense.second || offense.third){
          const active = [];
          if(offense.first) active.push("1st");
          if(offense.second) active.push("2nd");
          if(offense.third) active.push("3rd");
          basesText = "Runners on: " + active.join(", ");
        }
        document.getElementById('gcBasesText').textContent = basesText;

        const allPitches = currentPlay.playEvents?.filter(e => e.isPitch) || [];
        const lastPitch = allPitches[allPitches.length - 1];
        if(lastPitch){
          const dot = document.getElementById('gcPitchDot');
          document.getElementById('gcPitchNumber').textContent = lastPitch.pitchNumber || '#';
          document.getElementById('gcPitchResult').textContent = lastPitch.details?.call?.description || 'Last pitch';
          document.getElementById('gcPitchDescription').textContent = lastPitch.details?.description || 'Waiting for play...';
          document.getElementById('gcPitchType').textContent = lastPitch.details?.type?.description || '--';

          const px = lastPitch.pitchData?.coordinates?.pX || 0;
          const pz = lastPitch.pitchData?.coordinates?.pZ || 0;
          
          const pitchType = String(lastPitch.details?.type?.description || '').toLowerCase();
          let pitchColor = '#ef1111';

          if (pitchType.includes('fastball')) pitchColor = '#ef1111';
          if (pitchType.includes('slider')) pitchColor = '#38bdf8';
          if (pitchType.includes('curve')) pitchColor = '#a855f7';
          if (pitchType.includes('change')) pitchColor = '#22c55e';

          dot.style.background = pitchColor;
          dot.style.boxShadow = `0 7px 18px rgba(0,0,0,.55), 0 0 18px rgba(255,255,255,.25), 0 0 35px ${pitchColor}`;
          dot.style.left = Math.max(6, Math.min(94, 50 + (px * 35))) + '%';
          dot.style.top = Math.max(6, Math.min(94, 50 - (pz * 25))) + '%';
          dot.textContent = lastPitch.pitchNumber;

          dot.classList.add('pulse');
          setTimeout(() => dot.classList.remove('pulse'), 350);
        }

      }catch(err){
        console.warn("Live gamecast feed error:", err);
      }
    }

    function updateLiveWinProbability(linescore){
      const awayAbbr = document.getElementById('gcAwayAbbr')?.textContent || 'AWAY';
      const homeAbbr = document.getElementById('gcHomeAbbr')?.textContent || 'HOME';
      const awayRuns = Number(linescore?.teams?.away?.runs || 0);
      const homeRuns = Number(linescore?.teams?.home?.runs || 0);

      let awayProb = 50 + ((awayRuns - homeRuns) * 9);
      awayProb = Math.max(8, Math.min(92, awayProb));

      const fill = document.getElementById('gcWinProbFill');
      const text = document.getElementById('gcWinProbText');
      const label = document.getElementById('gcProbLabel');

      if(fill) fill.style.width = `${awayProb.toFixed(0)}%`;
      if(text) text.textContent = `${awayProb.toFixed(0)}%`;
      if(label) label.textContent = `${awayAbbr} LIVE WIN PROBABILITY`;

      document.getElementById('momentumAway').style.width = `${awayProb}%`;
      document.getElementById('momentumHome').style.width = `${100 - awayProb}%`;

      const velo = Math.floor(Math.random() * 18) + 92;
      const veloEl = document.getElementById('exitVelo');
      if(veloEl) veloEl.textContent = `${velo} MPH`;

      const qualityEl = document.getElementById('contactQuality');
      const alertBox = document.getElementById('liveAlertBox');

      const quality = velo >= 105 ? 'BARREL' : velo >= 100 ? 'HARD HIT' : 'WEAK CONTACT';

      if(qualityEl){
        qualityEl.textContent = quality;
        qualityEl.className = velo >= 100 ? 'impact-red' : 'impact-green';
      }

      if(alertBox){
        if(awayProb >= 68) alertBox.textContent = `${awayAbbr} tiene el momentum del juego.`;
        else if(awayProb <= 32) alertBox.textContent = `${homeAbbr} tiene el control del juego.`;
        else alertBox.textContent = 'Balanced game flow.';
      }
    }

    function getTeamPlayers(propsData, abbrev){
      if(!propsData || !propsData.players) return [];
      return propsData.players.filter(p => p.teamAbbrev === abbrev);
    }

    function renderRiskBars(pct){
      return `
        <div class="bar-row">
          <div class="bar-top"><span>Edge Factor</span><span>${pct}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    }

    function renderTeamHitPlayers(players, propsData, side){
      if(!players.length) return '<p class="note">No hitter data found.</p>';
      return players.filter(p => p.propType === 'Hits').slice(0,4).map(p => `
        <div class="player-card">
          <img src="https://img.mlbstatic.com/mlb-photos/person/main/v2/${p.playerId}.png">
          <div>
            <span class="p-name">${p.playerName}</span>
            <span class="p-info">Over 0.5: ${p.overOdds} | Edge: ${p.edge}%</span>
          </div>
        </div>
      `).join('');
    }

    function renderLineups(lineupData, propsData, away, home){
      if(!lineupData.ok || !lineupData.lineups) return '<p class="note">Lineups not yet confirmed.</p>';
      const aL = lineupData.lineups.away || [];
      const hL = lineupData.lineups.home || [];

      return `
        <div class="lineup-box">
          <div>
            <div class="sub-title">${away}</div>
            ${aL.map(p => `<div class="player"><span class="num">${p.order}</span> ${p.name} <span class="badge">${p.pos}</span></div>`).join('')}
          </div>
          <div>
            <div class="sub-title">${home}</div>
            ${hL.map(p => `<div class="player"><span class="num">${p.order}</span> ${p.name} <span class="badge">${p.pos}</span></div>`).join('')}
          </div>
        </div>
      `;
    }

    loadDetail();
  </script>
</body>
</html>
