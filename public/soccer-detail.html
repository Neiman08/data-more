<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soccer Match Center | Data More</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --green:#6bff19;
  --border:rgba(255,255,255,.08);
  --card:rgba(20,25,30,.65);
  --muted:#8b949e;
  --gold:#facc15;
  --red:#ef4444;
  --blue:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    linear-gradient(rgba(0,0,0,.88),rgba(0,0,0,.94)),
    url('/logos/IMG_0579.JPG');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:#fff;
  font-family:'Inter',sans-serif;
}

.page{
  max-width:1450px;
  margin:auto;
  padding:24px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.logo{
  font-family:'Anton';
  font-size:28px;
  letter-spacing:1px;
}

.logo span{
  color:var(--green);
}

.back{
  color:var(--green);
  text-decoration:none;
  font-weight:800;
  border:1px solid rgba(107,255,25,.25);
  padding:10px 14px;
  border-radius:10px;
  background:rgba(255,255,255,.04);
}

.hero{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:30px;
  margin-bottom:22px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.matchup{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:20px;
}

.team{
  text-align:center;
}

.team img{
  width:95px;
  height:95px;
  object-fit:contain;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.45));
}

.team h2{
  font-family:'Anton';
  font-size:44px;
  margin-top:12px;
  letter-spacing:1px;
}

.team small{
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.score{
  text-align:center;
}

.score-main{
  font-size:72px;
  font-weight:900;
  color:var(--green);
  font-family:'Anton';
}

.live{
  margin-top:10px;
  color:#fff;
  font-size:12px;
  font-weight:800;
}

.league{
  color:var(--gold);
  margin-top:6px;
  font-size:12px;
  font-weight:900;
}

.soccer-live{
  background:linear-gradient(180deg,rgba(18,22,27,.9),rgba(5,8,11,.95));
  border:1px solid rgba(107,255,25,.25);
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  backdrop-filter:blur(12px);
}

.live-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.live-title h3{
  color:var(--green);
  font-size:15px;
  text-transform:uppercase;
}

.live-badge{
  color:var(--green);
  border:1px solid rgba(107,255,25,.35);
  background:rgba(107,255,25,.08);
  border-radius:999px;
  padding:7px 12px;
  font-size:11px;
  font-weight:900;
}

.live-grid{
  display:grid;
  grid-template-columns:1fr 1.1fr 1fr;
  gap:20px;
  align-items:center;
}

.live-team-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:18px;
  padding:16px;
}

.live-team-box h4{
  color:var(--green);
  font-size:13px;
  margin-bottom:10px;
}

.live-stat{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:12px;
}

.live-field{
  position:relative;
  min-height:260px;
  border-radius:22px;
  border:2px solid rgba(255,255,255,.18);
  overflow:hidden;
  background:
    linear-gradient(90deg,rgba(107,255,25,.06) 0 50%,rgba(255,255,255,.03) 50% 100%),
    radial-gradient(circle at center,rgba(107,255,25,.18),rgba(0,0,0,.35));
}

.live-field:before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:2px;
  height:100%;
  background:rgba(255,255,255,.2);
}

.live-field:after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:90px;
  height:90px;
  transform:translate(-50%,-50%);
  border:2px solid rgba(255,255,255,.2);
  border-radius:50%;
}

.goal-left,
.goal-right{
  position:absolute;
  top:50%;
  width:20px;
  height:75px;
  transform:translateY(-50%);
  border:2px solid rgba(255,255,255,.22);
}

.goal-left{left:8px;}
.goal-right{right:8px;}

.ball-dot{
  position:absolute;
  left:50%;
  top:50%;
  width:30px;
  height:30px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:var(--green);
  color:#000;
  display:grid;
  place-items:center;
  font-weight:900;
  box-shadow:0 0 22px rgba(107,255,25,.8);
  z-index:4;
}

.live-momentum{
  margin-top:16px;
}

.momentum-label{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  font-weight:900;
  color:#fff;
  margin-bottom:8px;
}

.momentum-bar{
  height:14px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  display:flex;
  overflow:hidden;
}

.momentum-home{
  background:linear-gradient(90deg,var(--green),#d9ff43);
  width:50%;
}

.momentum-away{
  background:linear-gradient(90deg,var(--red),#ff7b7b);
  width:50%;
}

.timeline{
  margin-top:16px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  padding:12px;
  font-size:12px;
  color:#dbe2ea;
  line-height:1.6;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px;
  backdrop-filter:blur(10px);
}

.panel h3{
  color:var(--green);
  margin-bottom:18px;
  font-size:15px;
  text-transform:uppercase;
}

.stat{
  display:flex;
  justify-content:space-between;
  gap:14px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.stat span{
  color:#c9d1d9;
  font-size:13px;
}

.stat b{
  color:#fff;
  font-size:13px;
  text-align:right;
}

.lineups{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.player{
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:13px;
}

.note{
  color:var(--muted);
  font-size:12px;
}

.bar{
  width:100%;
  height:10px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),#d9ff43);
}

.alert{
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.25);
  font-size:12px;
  line-height:1.5;
}

@media(max-width:900px){
  .matchup,
  .grid,
  .lineups,
  .live-grid{
    grid-template-columns:1fr;
  }

  .score-main{
    font-size:54px;
  }

  .team h2{
    font-size:34px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="top">
    <a href="/soccer" class="back">← SOCCER</a>
    <div class="logo">DATA-<span>MORE</span></div>
  </div>

  <div id="content">Loading Match Center...</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const matchId = params.get('matchId');
const league = params.get('league');

const urlGame = {
  homeTeam: params.get('homeTeam'),
  awayTeam: params.get('awayTeam'),
  homeLogo: params.get('homeLogo'),
  awayLogo: params.get('awayLogo'),
  homeScore: params.get('homeScore'),
  awayScore: params.get('awayScore'),
  time: params.get('time'),
  leagueName: params.get('leagueName')
};

function safe(v, fallback='--'){
  if(v === undefined || v === null || v === '' || v === 'null' || v === 'undefined') return fallback;
  return v;
}

function pct(v){
  if(v === undefined || v === null || v === '' || v === 'N/A' || isNaN(Number(v))) return '--';
  return `${Number(v).toFixed(2)}%`;
}

function normalizeLogo(logo){
  if(!logo || logo === '' || logo === 'null' || logo === 'undefined'){
    return '/logo.png';
  }
  return logo;
}

async function fetchGameFromBoard(){
  try{
    const res = await fetch(`/api/soccer/games-global`);
    const data = await res.json();

    if(!data.ok || !Array.isArray(data.games)) return {};

    return data.games.find(g => String(g.matchId) === String(matchId)) || {};
  }catch(e){
    return {};
  }
}

function renderKeyPlayers(a){
  const players = a.keyPlayers || a.playerProps || a.players || [];

  if(!Array.isArray(players) || !players.length){
    return `<p class="note">Key player data pending.</p>`;
  }

  return players.slice(0,8).map(p => `
    <div class="stat">
      <span>${p.name || p.player || 'Player'}</span>
      <b>${p.goalChance || p.probability || p.market || 'Watch'}</b>
    </div>
  `).join('');
}

function renderGoalProps(a){
  const props = a.goalProps || a.playerProps || [];

  if(!Array.isArray(props) || !props.length){
    return `<p class="note">Goal scorer props unavailable.</p>`;
  }

  return props.slice(0,5).map(p => `
    <div class="stat">
      <span>${p.player || p.name || 'Player'}</span>
      <b>${safe(p.goalChance || p.probability,'--')}%</b>
    </div>
  `).join('');
}

function renderAssistProps(a){
  const props = a.assistProps || a.playerProps || [];

  if(!Array.isArray(props) || !props.length){
    return `<p class="note">Assist props unavailable.</p>`;
  }

  return props.slice(0,5).map(p => `
    <div class="stat">
      <span>${p.player || p.name || 'Player'}</span>
      <b>${safe(p.assistChance,'--')}%</b>
    </div>
  `).join('');
}

function renderInjuries(a){
  const injuries = a.injuries || a.suspensions || [];

  if(!Array.isArray(injuries) || !injuries.length){
    return `<p class="note">No major injuries reported.</p>`;
  }

  return injuries.slice(0,8).map(p => `
    <div class="stat">
      <span>${p.name || p.player || 'Player'}</span>
      <b>${p.reason || p.status || 'OUT'}</b>
    </div>
  `).join('');
}

function renderLineups(a){
  const lineups = a.lineups || {};
  const home = lineups.home || lineups.local || [];
  const away = lineups.away || lineups.visitante || [];

  if(!home.length && !away.length){
    return `<p class="note">Lineups not available yet.</p>`;
  }

  return `
    <div class="lineups">
      <div>
        ${home.map((p,i)=>`
          <div class="player">${i+1}. ${p.player || p.name || 'Player'}</div>
        `).join('')}
      </div>

      <div>
        ${away.map((p,i)=>`
          <div class="player">${i+1}. ${p.player || p.name || 'Player'}</div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderRiskAlerts(a){
  const alerts = a.riskAlerts || a.alerts || [];

  if(!Array.isArray(alerts) || !alerts.length){
    return `<div class="alert">No major betting risk alerts detected.</div>`;
  }

  return alerts.map(x=>`
    <div class="alert">⚠️ ${typeof x === 'string' ? x : x.message}</div>
  `).join('');
}

function renderSoccerLive(a, homeTeam, awayTeam, homeWin, awayWin, matchTime){
  const homePoss = Number(a.homePossession ?? a.possession?.home ?? a.live?.homePossession ?? homeWin ?? 50);
  const awayPoss = Math.max(0, 100 - homePoss);

  const homeAttacks = safe(a.homeAttacks ?? a.live?.homeAttacks ?? a.attacks?.home, 'Pending');
  const awayAttacks = safe(a.awayAttacks ?? a.live?.awayAttacks ?? a.attacks?.away, 'Pending');

  const homeShots = safe(a.homeShots ?? a.live?.homeShots ?? a.shots?.home, 'Pending');
  const awayShots = safe(a.awayShots ?? a.live?.awayShots ?? a.shots?.away, 'Pending');

  const homeCorners = safe(a.homeCorners ?? a.live?.homeCorners ?? a.corners?.home, 'Pending');
  const awayCorners = safe(a.awayCorners ?? a.live?.awayCorners ?? a.corners?.away, 'Pending');

  const homeCards = safe(a.homeCards ?? a.live?.homeCards ?? a.cards?.home, 'Pending');
  const awayCards = safe(a.awayCards ?? a.live?.awayCards ?? a.cards?.away, 'Pending');

  const ballLeft = Math.min(86, Math.max(14, Number(homePoss) || 50));
  const ballTop = 50;

  return `
    <section class="soccer-live">
      <div class="live-title">
        <h3>Data More Soccer Live</h3>
        <div class="live-badge">${matchTime}</div>
      </div>

      <div class="live-grid">

        <div class="live-team-box">
          <h4>${homeTeam}</h4>
          <div class="live-stat"><span>Possession</span><b>${Number(homePoss).toFixed(0)}%</b></div>
          <div class="live-stat"><span>Attacks</span><b>${homeAttacks}</b></div>
          <div class="live-stat"><span>Shots</span><b>${homeShots}</b></div>
          <div class="live-stat"><span>Corners</span><b>${homeCorners}</b></div>
          <div class="live-stat"><span>Cards</span><b>${homeCards}</b></div>
        </div>

        <div>
          <div class="live-field">
            <div class="goal-left"></div>
            <div class="goal-right"></div>
            <div class="ball-dot" style="left:${ballLeft}%; top:${ballTop}%;">⚽</div>
          </div>

          <div class="live-momentum">
            <div class="momentum-label">
              <span>${homeTeam}</span>
              <span>${awayTeam}</span>
            </div>
            <div class="momentum-bar">
              <div class="momentum-home" style="width:${Number(homePoss).toFixed(0)}%"></div>
              <div class="momentum-away" style="width:${Number(awayPoss).toFixed(0)}%"></div>
            </div>
          </div>

          <div class="timeline">
            <b>Live Reading:</b>
            ${a.liveSummary || a.matchFlow || 'Live tactical data pending. Use possession, attacks, shots, corners and cards to read match pressure.'}
          </div>
        </div>

        <div class="live-team-box">
          <h4>${awayTeam}</h4>
          <div class="live-stat"><span>Possession</span><b>${Number(awayPoss).toFixed(0)}%</b></div>
          <div class="live-stat"><span>Attacks</span><b>${awayAttacks}</b></div>
          <div class="live-stat"><span>Shots</span><b>${awayShots}</b></div>
          <div class="live-stat"><span>Corners</span><b>${awayCorners}</b></div>
          <div class="live-stat"><span>Cards</span><b>${awayCards}</b></div>
        </div>

      </div>
    </section>
  `;
}

async function loadMatch(){
  const content = document.getElementById('content');

  try{
    if(!matchId){
      content.innerHTML = `<section class="panel">Missing matchId.</section>`;
      return;
    }

    const [analysisRes, boardGame] = await Promise.all([
      fetch(`/api/soccer/analyze/${matchId}?league=${league || ''}`).then(r => r.json()).catch(() => ({})),
      fetchGameFromBoard()
    ]);

    const data = analysisRes || {};
    const a = data.analysis || data;
    const g = data.game || data.fixture || boardGame || {};

    const homeTeam =
      urlGame.homeTeam ||
      boardGame.homeTeam ||
      data.homeTeam ||
      a.homeTeam ||
      g.homeTeam ||
      g.home_name ||
      g.teams?.home?.name ||
      'HOME';

    const awayTeam =
      urlGame.awayTeam ||
      boardGame.awayTeam ||
      data.awayTeam ||
      a.awayTeam ||
      g.awayTeam ||
      g.away_name ||
      g.teams?.away?.name ||
      'AWAY';

    const homeLogo = normalizeLogo(
      urlGame.homeLogo ||
      boardGame.homeLogo ||
      data.homeLogo ||
      a.homeLogo ||
      a.home_team_logo ||
      g.homeLogo ||
      g.home_logo ||
      g.teams?.home?.logo
    );

    const awayLogo = normalizeLogo(
      urlGame.awayLogo ||
      boardGame.awayLogo ||
      data.awayLogo ||
      a.awayLogo ||
      a.away_team_logo ||
      g.awayLogo ||
      g.away_logo ||
      g.teams?.away?.logo
    );

    const homeScore =
      urlGame.homeScore ??
      boardGame.homeScore ??
      data.homeScore ??
      a.homeScore ??
      g.homeScore ??
      g.goals?.home ??
      0;

    const awayScore =
      urlGame.awayScore ??
      boardGame.awayScore ??
      data.awayScore ??
      a.awayScore ??
      g.awayScore ??
      g.goals?.away ??
      0;

    const matchTime =
      urlGame.time ||
      boardGame.time ||
      data.time ||
      a.time ||
      g.time ||
      g.fixture?.status?.elapsed ||
      'LIVE';

    const leagueName =
      urlGame.leagueName ||
      boardGame.leagueName ||
      data.leagueName ||
      a.leagueName ||
      g.leagueName ||
      g.league?.name ||
      league?.toUpperCase() ||
      'LEAGUE';

    const oneX2 = a.oneX2 || a.probabilities || a.market1x2 || {};

    const homeWin =
      oneX2.home ??
      oneX2.local ??
      oneX2.homeWin ??
      a.homeWinPct ??
      a.homeProbability ??
      0;

    const draw =
      oneX2.draw ??
      oneX2.empate ??
      oneX2.tie ??
      a.drawPct ??
      a.drawProbability ??
      0;

    const awayWin =
      oneX2.away ??
      oneX2.visitante ??
      oneX2.awayWin ??
      a.awayWinPct ??
      a.awayProbability ??
      0;

    content.innerHTML = `
      <section class="hero">
        <div class="matchup">

          <div class="team">
            <img src="${homeLogo}" alt="${homeTeam}" onerror="this.onerror=null;this.src='/logo.png';">
            <h2>${homeTeam}</h2>
            <small>${safe(a.homeRecord,'Home Form Pending')}</small>
          </div>

          <div class="score">
            <div class="score-main">${homeScore} - ${awayScore}</div>
            <div class="live">${matchTime}</div>
            <div class="league">${leagueName}</div>
          </div>

          <div class="team">
            <img src="${awayLogo}" alt="${awayTeam}" onerror="this.onerror=null;this.src='/logo.png';">
            <h2>${awayTeam}</h2>
            <small>${safe(a.awayRecord,'Away Form Pending')}</small>
          </div>

        </div>
      </section>

      ${renderSoccerLive(a, homeTeam, awayTeam, homeWin, awayWin, matchTime)}

      <div class="grid">

        <section class="panel">
          <h3>AI Match Edge</h3>
          <div class="stat"><span>Main Pick</span><b>${safe(a.pick)}</b></div>
          <div class="stat"><span>Confidence</span><b>${safe(a.confidence)}</b></div>
          <div class="stat"><span>Probability</span><b>${pct(a.probability ?? a.pickProbability)}</b></div>
          <div class="stat"><span>Over 2.5</span><b>${safe(a.over25 || a.totalGoalsPick,'Pending')}</b></div>
          <div class="stat"><span>BTTS</span><b>${safe(a.btts || a.bothTeamsToScore,'Pending')}</b></div>
          <div class="stat"><span>Projected Goals</span><b>${safe(a.projectedGoals,'Pending')}</b></div>
        </section>

        <section class="panel">
          <h3>1X2 Probability</h3>
          <div class="stat"><span>${homeTeam}</span><b>${pct(homeWin)}</b></div>
          <div class="stat"><span>Draw</span><b>${pct(draw)}</b></div>
          <div class="stat"><span>${awayTeam}</span><b>${pct(awayWin)}</b></div>
          <div class="bar"><div class="fill" style="width:${Number(homeWin) || 50}%"></div></div>
        </section>

        <section class="panel">
          <h3>Advanced Match Variables</h3>
          <div class="stat"><span>xG Projection</span><b>${safe(a.xgTotal,'Pending')}</b></div>
          <div class="stat"><span>Possession Edge</span><b>${safe(a.possessionEdge,'Pending')}</b></div>
          <div class="stat"><span>Shots Projection</span><b>${safe(a.shotsProjection,'Pending')}</b></div>
          <div class="stat"><span>Danger Level</span><b>${safe(a.riskLevel,'Pending')}</b></div>
          <div class="stat"><span>Game Tempo</span><b>${safe(a.gameTempo,'Pending')}</b></div>
        </section>

        <section class="panel">
          <h3>Corners / Cards Market</h3>
          <div class="stat"><span>Corners Over</span><b>${safe(a.cornersOver,'Pending')}</b></div>
          <div class="stat"><span>Cards Over</span><b>${safe(a.cardsOver,'Pending')}</b></div>
          <div class="stat"><span>Referee Risk</span><b>${safe(a.refereeRisk,'Pending')}</b></div>
          <div class="stat"><span>Intensity</span><b>${safe(a.gameIntensity,'Pending')}</b></div>
        </section>

        <section class="panel">
          <h3>Top Goal Scorer Props</h3>
          ${renderGoalProps(a)}
        </section>

        <section class="panel">
          <h3>Top Assist Props</h3>
          ${renderAssistProps(a)}
        </section>

        <section class="panel">
          <h3>Key Players</h3>
          ${renderKeyPlayers(a)}
        </section>

        <section class="panel">
          <h3>Injuries / Suspensions</h3>
          ${renderInjuries(a)}
        </section>

      </div>

      <section class="panel" style="margin-top:20px;">
        <h3>Confirmed / Projected Lineups</h3>
        ${renderLineups(a)}
      </section>

      <section class="panel" style="margin-top:20px;">
        <h3>Betting Risk Alerts</h3>
        ${renderRiskAlerts(a)}
      </section>
    `;

  }catch(err){
    console.log(err);

    content.innerHTML = `
      <section class="panel">
        Error loading match center.
      </section>
    `;
  }
}

loadMatch();
</script>

</body>
</html>
