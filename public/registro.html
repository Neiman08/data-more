<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Data More Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #6bff19;
      --bg: #020509;
      --card: rgba(12, 18, 28, 0.88);
      --border: rgba(255,255,255,.10);
      --muted: #9ca3af;
      --text: #ffffff;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 30% 20%, rgba(107,255,25,.16), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(59,130,246,.14), transparent 35%),
        linear-gradient(180deg,#030712,#020509);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
      font-family:'Inter',sans-serif;
      color:#fff;
    }

    .register-card{
      width:100%;
      max-width:430px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:26px;
      padding:38px 30px;
      box-shadow:0 25px 70px rgba(0,0,0,.65);
      backdrop-filter:blur(14px);
    }

    .logo-text{
      font-family:'Anton',sans-serif;
      text-align:center;
      font-size:40px;
      letter-spacing:.5px;
      margin-bottom:12px;
    }

    .logo-text span{
      color:var(--green);
    }

    h2{
      text-align:center;
      font-size:28px;
      font-weight:900;
      margin-bottom:8px;
    }

    p{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:600;
      margin-bottom:28px;
    }

    .form-group{
      margin-bottom:17px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:var(--green);
    }

    input{
      width:100%;
      padding:15px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:14px;
      font-weight:700;
      outline:none;
      transition:.25s;
    }

    input::placeholder{
      color:rgba(255,255,255,.42);
    }

    input:focus{
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(107,255,25,.12);
    }

    .btn-submit{
      width:100%;
      border:none;
      background:var(--green);
      color:#000;
      padding:16px;
      border-radius:14px;
      font-size:14px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      cursor:pointer;
      transition:.25s;
      margin-top:8px;
    }

    .btn-submit:hover{
      transform:translateY(-2px);
      filter:brightness(1.08);
    }

    .footer-links{
      margin-top:24px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .footer-links a{
      color:var(--green);
      text-decoration:none;
      font-weight:900;
    }

    @media(max-width:480px){

      .register-card{
        padding:32px 22px;
      }

      .logo-text{
        font-size:34px;
      }

    }
  </style>
</head>

<body>

  <div class="register-card">

    <div class="logo-text">
      DATA-<span>MORE</span>
    </div>

    <h2>Create Account</h2>

    <p>Create your account to access premium sports analytics</p>

    <form action="/api/auth/register" method="POST">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="nombre" placeholder="John Smith" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="telefono" placeholder="+1 224 000 0000" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">
        Create Account
      </button>

    </form>

    <div class="footer-links">
      Already have an account?
      <a href="/login">Sign In</a>
    </div>

  </div>

</body>
</html>
