<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data More Horse Racing</title>
  <style>
    body { margin:0; background:#0d1117; color:white; font-family:Arial,sans-serif; padding:20px; }
    .header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .logo { width:55px; height:55px; }
    h1 { margin:0; font-size:28px; font-weight:900; }
    .controls { display:flex; gap:10px; margin-bottom:25px; flex-wrap:wrap; }
    button,a { border:none; border-radius:10px; padding:12px 18px; font-weight:800; cursor:pointer; text-decoration:none; color:white; }
    .btn-load { background:#8b5cf6; }
    .btn-mlb { background:#2563eb; }
    .btn-soccer { background:#22c55e; color:#052e16; }
    .btn-nba { background:#f97316; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:18px; }
    .card { background:#161b22; border:1px solid #30363d; border-left:5px solid #a855f7; border-radius:16px; padding:18px; }
    .race-title { font-size:18px; font-weight:900; color:#c084fc; margin-bottom:8px; }
    .meta { color:#94a3b8; font-size:13px; margin-bottom:12px; }
    .pick-box { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.35); padding:12px; border-radius:10px; margin-bottom:12px; }
    .section-title { color:#38bdf8; font-size:13px; font-weight:900; margin:12px 0 8px; text-transform:uppercase; }
    .rank-row { display:flex; justify-content:space-between; gap:8px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.07); font-size:13px; }
    .bet { font-size:13px; background:#0f172a; padding:8px; border-radius:8px; margin-top:6px; }
    .small { color:#94a3b8; font-size:12px; }
  </style>
</head>

<body>
  <div class="header">
    <img src="/logo.png" class="logo" onerror="this.style.display='none'">
    <h1>DATA MORE HORSE</h1>
  </div>

  <div class="controls">
    <button class="btn-load" onclick="loadRaces()">🏇 Cargar Carreras Reales</button>
    <a class="btn-mlb" href="/">⚾ MLB</a>
    <a class="btn-soccer" href="/soccer">⚽ Soccer</a>
    <a class="btn-nba" href="/nba">🏀 NBA</a>
  </div>

  <div id="races" class="grid"></div>

<script>
async function loadRaces() {
  const container = document.getElementById('races');
  container.innerHTML = 'Cargando carreras reales...';

  try {
    // Nota: El track y la fecha son dinámicos según tu implementación de backend
    const res = await fetch('/api/horse-racing/import-structured?track=gp&date=2026-05-02');
    const data = await res.json();

    if (!data.ok) {
      container.innerHTML = `<div class="card">Error: ${data.error || 'No se pudieron cargar carreras'}</div>`;
      return;
    }

    container.innerHTML = '';

    data.races.forEach((race) => {
      const analysis = race.analysis;

      container.innerHTML += `
        <div class="card">
          <div class="race-title">🏇 Carrera ${race.raceNumber} - ${race.track}</div>
          <div class="meta">Fecha: ${race.date} | Caballos: ${race.runners.length}</div>

          ${analysis ? renderAnalysis(analysis) : ''}

          <div class="section-title">Retrospecto oficial</div>
          <iframe
            src="/api/horse-racing/pdf?track=${race.track.toLowerCase()}&date=${race.date}#page=${race.raceNumber}&toolbar=0&navpanes=0&scrollbar=0"
            scrolling="no"
            style="width:100%; height:820px; border:1px solid #334155; border-radius:12px; background:white; overflow:hidden;">
          </iframe>
        </div>
      `;
    });

  } catch (err) {
    container.innerHTML = `<div class="card">Error cargando datos: ${err.message}</div>`;
  }
}

function renderAnalysis(a) {
  if (!a) return '';

  return `
    <div class="section-title">Pick del Modelo</div>
    <div class="pick-box">
      🥇 <b>${a.pick}</b><br>
      Confianza: <b>${a.confidence}</b>
    </div>

    <div class="section-title">Top 3</div>
    ${(a.top3 || []).map((h, i) => `
      <div class="rank-row">
        <span>${i + 1}. ${h.name}</span>
        <span>${h.probability}%</span>
      </div>
    `).join('')}

    <div class="section-title">Apuestas sugeridas</div>
    <div class="bet">Win: ${a.bets?.win || 'N/A'}</div>
    <div class="bet">Exacta: ${a.bets?.exacta || 'N/A'}</div>
    <div class="bet">Trifecta: ${a.bets?.trifecta || 'N/A'}</div>
  `;
}

// Carga inicial automática
loadRaces();
</script>

</body>
</html>
