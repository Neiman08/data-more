<script>
document.getElementById('dateInput').value = new Intl.DateTimeFormat('en-CA', {
  timeZone: 'America/Chicago',
  year: 'numeric',
  month: '2-digit',
  day: '2-digit'
}).format(new Date());
const HORSE_COLORS = {
  1:  { bg:'#d90429', text:'#fff' },
  2:  { bg:'#ffffff', text:'#000' },
  3:  { bg:'#2563eb', text:'#fff' },
  4:  { bg:'#facc15', text:'#000' },
  5:  { bg:'#16a34a', text:'#fff' },
  6:  { bg:'#000000', text:'#fff' },
  7:  { bg:'#f97316', text:'#fff' },
  8:  { bg:'#ec4899', text:'#fff' },
  9:  { bg:'#06b6d4', text:'#fff' },
  10: { bg:'#7c3aed', text:'#fff' },
  11: { bg:'#6b7280', text:'#fff' },
  12: { bg:'#84cc16', text:'#000' },
  13: { bg:'#92400e', text:'#fff' },
  14: { bg:'#1e3a8a', text:'#fff' },
  15: { bg:'#166534', text:'#fff' },
  16: { bg:'#d4af37', text:'#000' }
};
function getHorseColor(number) {
  return HORSE_COLORS[Number(number)] || { bg:'#111827', text:'#fff' };
}
function getHorseNumber(h, index) {
  return h?.number || h?.programNumber || h?.horseNumber || h?.post || h?.runnerNumber || index + 1;
}
function normalizeHorseName(name) {
  return String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]/gi, '')
    .trim();
}
function normalizeRaceNumber(value) {
  const raw = String(value || '').replace(/[^\d]/g, '');
  return raw || value;
}
function cleanBet(bet) {
  if (!bet || bet === '-') return '-';
  return String(bet)
    .replace(/\s+/g, ' ')
    .replace(/,+/g, ', ')
    .replace(/\//g, ' / ')
    .replace(/\s-\s/g, '-')
    .trim();
}
function mergeDuplicateRaces(races = []) {
  const merged = [];
  for (const race of races) {
    const raceNumber = normalizeRaceNumber(race.raceNumber);
    const existing = merged.find(r =>
      normalizeRaceNumber(r.raceNumber) === raceNumber
    );
    if (existing) {
      const combinedRunners = [
        ...(existing.runners || []),
        ...(race.runners || [])
      ];
      const uniqueRunners = [];
      const seen = new Set();
      combinedRunners.forEach((runner, idx) => {
        const key = normalizeHorseName(runner.name || runner.horse || runner.runnerName || `runner-${idx}`);
        if (!seen.has(key)) {
          seen.add(key);
          uniqueRunners.push(runner);
        }
      });
      existing.runners = uniqueRunners;
      if (race.analysis && !existing.analysis) {
        existing.analysis = race.analysis;
      }
      if (
        race.analysis &&
        existing.analysis &&
        (race.analysis.top3 || []).length > (existing.analysis.top3 || []).length
      ) {
        existing.analysis = race.analysis;
      }
    } else {
      merged.push({
        ...race,
        raceNumber
      });
    }
  }
  return merged.sort((a, b) => Number(a.raceNumber) - Number(b.raceNumber));
}
async function loadRaces() {
  const container = document.getElementById('races');
  container.innerHTML = '<div class="loading">⌛ Procesando Big Data y Retrospectos...</div>';
  const track = document.getElementById('trackSelect').value;
  const date = document.getElementById('dateInput').value;
  try {
    const res = await fetch(`/api/horse-racing/import-structured?track=${track}&date=${date}`);
    const data = await res.json();
    if (!data.ok || !data.races || !data.races.length) {
      container.innerHTML = `
        <div class="card" style="grid-column:1/-1; border-left-color:#ef4444;">
          No hay datos disponibles para esta fecha o hipódromo.
        </div>
      `;
      return;
    }
    const mergedRaces = mergeDuplicateRaces(data.races);
    container.innerHTML = '';
    mergedRaces.forEach((race) => {
      const a = race.analysis;
      const confClass = a && a.confidence ? a.confidence.toLowerCase() : '';
      container.innerHTML += `
        <div class="card ${confClass}">
          <div class="race-title">Carrera ${race.raceNumber}</div>
          <div class="meta">${String(race.track || track).toUpperCase()} • ${race.date || date}</div>
          ${
            a
              ? renderAnalysis(a, race.runners || [])
              : '<div class="loading" style="font-size:10px;">Análisis en proceso...</div>'
          }
        </div>
      `;
    });
    container.innerHTML += `
      <div class="pdf-full">
        <div class="section-title" style="margin-top:0">Retrospecto Oficial</div>
        <a href="/api/horse-racing/pdf?track=${track}&date=${date}" target="_blank" class="btn-pdf">
          📄 Expandir PDF Full Screen
        </a>
        <div class="pdf-wrapper">
          <iframe src="/api/horse-racing/pdf?track=${track}&date=${date}"></iframe>
        </div>
      </div>
    `;
  } catch (err) {
    container.innerHTML = `
      <div class="card" style="grid-column:1/-1; border-left-color:#ef4444;">
        ⚠️ Error de conexión: ${err.message}
      </div>
    `;
  }
}
function renderAnalysis(a, runners = []) {
  const badge = a.confidence === 'ALTA' ? '🔥' : a.confidence === 'MEDIA' ? '⚠️' : '';
  const findRunner = (name) => {
    return runners.find(r =>
      normalizeHorseName(r.name || r.horse || r.runnerName) === normalizeHorseName(name)
    );
  };
  const pickRunner = findRunner(a.pick);
  const pickNumber = pickRunner ? getHorseNumber(pickRunner, 0) : '';
  const pickColor = getHorseColor(pickNumber || 1);
  const top3 = (a.top3 || [])
    .sort((x, y) => Number(y.probability || 0) - Number(x.probability || 0))
    .slice(0, 3);
  return `
    <div class="section-title">Pick del Modelo</div>
    <div class="pick-box">
      <div class="horse-name-wrap">
        <span 
          class="horse-number"
          style="background:${pickColor.bg}; color:${pickColor.text};"
        >
          ${pickNumber || '1'}
        </span>
        <div>
          <span style="color:var(--green); font-size:18px; font-weight:900; line-height:1.1;">
            ${a.pick || 'Pendiente'}
          </span>
          ${badge}
          <br>
          <span style="font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase;">
            Confianza ${a.confidence || 'MEDIA'}
          </span>
        </div>
      </div>
    </div>
    <div class="section-title">Top 3 Probabilidades</div>
    ${top3.map((h, i) => {
      const runner = findRunner(h.name);
      const horseNum = runner ? getHorseNumber(runner, i) : getHorseNumber(h, i);
      const horseColor = getHorseColor(horseNum);
      return `
        <div class="rank-row">
          <span class="horse-name-wrap">
            <span 
              class="horse-number"
              style="background:${horseColor.bg}; color:${horseColor.text};"
            >
              ${horseNum}
            </span>
            <span class="horse-name">${h.name}</span>
          </span>
          <b style="color:var(--green); font-size:13px;">
            ${h.probability}%
          </b>
        </div>
      `;
    }).join('')}
    <div class="section-title">Estrategia Sugerida</div>
    <div class="bet">WIN <b>${cleanBet(a.bets?.win)}</b></div>
    <div class="bet">EXACTA <b>${cleanBet(a.bets?.exacta)}</b></div>
    <div class="bet">TRIFECTA <b>${cleanBet(a.bets?.trifecta)}</b></div>
    <div class="bet">SUPERFECTA <b>${cleanBet(a.bets?.superfecta || '-')}</b></div>
  `;
}
function buildTicket() {
  alert('Ticket inteligente listo para conectar con el análisis completo.');
}
loadRaces();
</script>
