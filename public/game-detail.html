<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Game Detail | Data More</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green:#6bff19;
      --card:rgba(8,12,16,.88);
      --border:rgba(255,255,255,.10);
      --muted:#a9b0b8;
      --gold:#facc15;
      --red:#ef4444;
      --blue:#38bdf8;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.96)),
        url("logos/IMG_0579.JPG");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      color:#fff;
      -webkit-tap-highlight-color: transparent;
    }

    .page{
      max-width:1250px;
      margin:0 auto;
      padding:24px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
    }

    .back{
      color:var(--green);
      text-decoration:none;
      font-weight:900;
      border:1px solid rgba(107,255,25,.35);
      padding:10px 16px;
      border-radius:10px;
      background:rgba(255,255,255,.05);
      font-size:14px;
      transition:all .2s;
    }

    .logo{font-weight:900;font-size:22px;letter-spacing:-1px;}
    .logo span{color:var(--green);}

    .hero-card,.panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:24px;
      backdrop-filter:blur(14px);
      box-shadow:0 22px 60px rgba(0,0,0,.55);
      margin-bottom:24px;
    }

    .hero-card{border-color:rgba(107,255,25,.35);}

    .matchup{
      display:grid;
      grid-template-columns:1fr 176px 1fr;
      gap:12px;
      align-items:center;
      text-align:center;
    }

    .team img{
      width:78px;
      height:78px;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.65));
    }

    .team h2{
      font-family:'Anton',sans-serif;
      font-size:36px;
      margin:7px 0 3px;
      letter-spacing:1px;
    }

    .record{
      color:var(--green);
      font-weight:900;
      font-size:14px;
    }

    .pitcher{
      color:var(--gold);
      font-size:12px;
      font-weight:900;
      margin-top:5px;
    }

    .status{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:7px;
    }

    .predictor-title{
      color:var(--green);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.5px;
      font-size:12px;
      margin-bottom:9px;
    }

    .circle-chart{
      width:176px;
      height:176px;
      border-radius:50%;
      background:conic-gradient(
        var(--gold) 0%,
        var(--gold) var(--away),
        var(--red) var(--away),
        var(--red) 100%
      );
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 auto;
      box-shadow:0 0 45px rgba(0,0,0,.65);
    }

    .circle-inner{
      width:112px;
      height:112px;
      background:#05080c;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.10);
      font-size:16px;
    }

    .circle-inner .vs{
      font-size:12px;
      color:var(--muted);
    }

    .pct-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
    }

    .pct-box{
      flex:1;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:8px;
      font-weight:900;
      font-size:13px;
    }

    .pct-box span{
      display:block;
      color:var(--muted);
      font-size:11px;
      margin-bottom:4px;
    }

    .panel h3{
      margin:0 0 14px;
      font-size:15px;
      color:var(--green);
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .sub-title{
      color:#fff;
      font-weight:900;
      font-size:12px;
      margin:6px 0 8px;
    }

    .stat-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:9px 0;
      font-size:13px;
    }

    .stat-row span:first-child{color:var(--muted);}
    .stat-row span:last-child{font-weight:900;text-align:right;}

    .mini-stat-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,.055);
      padding:7px 0;
      font-size:12px;
    }

    .mini-stat-row span:first-child{
      color:var(--muted);
      font-weight:800;
    }

    .mini-stat-row span:last-child{
      color:#fff;
      font-weight:900;
      text-align:right;
    }

    .bar-row{margin:12px 0;}

    .bar-top{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      font-weight:900;
      margin-bottom:7px;
    }

    .bar-bg{
      width:100%;
      height:10px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--green),#d7ff31);
      width:0%;
    }

    .player-card{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .player-card img,
    .avatar-fallback{
      width:36px;
      height:36px;
      border-radius:50%;
      background:#111;
      border:1px solid rgba(255,255,255,.15);
      flex:0 0 auto;
    }

    .player-card img{
      object-fit:cover;
    }

    .avatar-fallback{
      display:inline-grid;
      place-items:center;
      color:var(--green);
      font-size:12px;
      font-weight:900;
      background:radial-gradient(circle at 30% 20%,rgba(107,255,25,.22),rgba(10,14,18,.95));
      box-shadow:inset 0 0 18px rgba(107,255,25,.06);
    }

    .p-name{
      font-weight:900;
      display:block;
      font-size:11px;
    }

    .p-info{
      color:var(--muted);
      font-size:9px;
      display:block;
      margin-top:2px;
    }

    .lineup-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .player{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:5px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:11px;
    }

    .num{
      color:var(--green);
      font-weight:900;
      margin-right:6px;
    }

    .badge{
      display:inline-block;
      padding:3px 7px;
      border-radius:999px;
      font-size:9px;
      font-weight:900;
      background:rgba(107,255,25,.12);
      color:var(--green);
      border:1px solid rgba(107,255,25,.35);
      margin-bottom:6px;
    }

    .note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .loading{
      color:var(--green);
      font-weight:900;
      text-align:center;
      padding:40px;
    }

    /* DATA MORE LIVE GAMECAST */
    .live-gamecast-card{
      background:linear-gradient(180deg,rgba(18,22,27,.96),rgba(5,8,11,.97));
      border:1px solid rgba(107,255,25,.38);
      border-radius:26px;
      padding:24px;
      box-shadow:0 22px 60px rgba(0,0,0,.55),0 0 35px rgba(107,255,25,.07);
      margin-bottom:24px;
      backdrop-filter:blur(14px);
    }

    .live-mini-card{
      background:rgba(10,14,18,.96);
      border:1px solid rgba(107,255,25,.28);
      border-radius:18px;
      padding:14px;
      align-self:start;
    }

    .mini-top{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:10px;
      align-items:center;
    }

    .mini-player{
      background:rgba(255,255,255,.04);
      border-radius:14px;
      padding:9px;
      min-width:0;
    }

    .mini-player.right{
      text-align:right;
    }

    .mini-label{
      display:block;
      color:var(--green);
      font-size:9px;
      font-weight:900;
      margin-bottom:7px;
      letter-spacing:.7px;
    }

    .mini-flex{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .mini-flex.right{
      justify-content:flex-end;
    }

    .mini-headshot{
      width:42px;
      height:42px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .mini-name-row{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }

    .mini-player strong{
      display:block;
      font-size:13px;
      line-height:1.15;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .mini-player small{
      color:var(--muted);
      font-size:10px;
    }

    .mini-vs{
      font-weight:900;
      color:var(--muted);
      font-size:11px;
      padding:0 2px;
    }

    .position-badge{
      display:none;
      color:var(--green);
      border:1px solid rgba(107,255,25,.28);
      background:rgba(107,255,25,.10);
      border-radius:999px;
      padding:2px 6px;
      font-size:9px;
      font-weight:900;
      line-height:1;
      flex:0 0 auto;
    }

    .mini-counts{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
      margin-top:12px;
      text-align:center;
      font-size:12px;
      font-weight:900;
    }

    .mini-count-box{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-width:0;
    }

    .mini-count-title{
      color:#fff;
      font-size:10px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .count-dots{
      display:flex;
      align-items:center;
      gap:4px;
    }

    .count-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:transparent;
      border:2px solid rgba(255,255,255,.28);
    }

    .count-dot.ball{
      border-color:#6bff19;
    }

    .count-dot.ball.active{
      background:#6bff19;
      box-shadow:0 0 10px rgba(107,255,25,.9);
    }

    .count-dot.strike,
    .count-dot.out{
      border-color:#ff2626;
    }

    .count-dot.strike.active,
    .count-dot.out.active{
      background:#ff2626;
      box-shadow:0 0 10px rgba(255,38,38,.9);
    }

    .mini-zone-wrap{
      margin-top:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
    }

    .mini-zone{
      position:relative;
      width:155px;
      height:155px;
      background:
        linear-gradient(90deg,#e67c5f 0 33%,#5fa1ea 33% 66%,#8db7e8 66%);
      border-radius:8px;
      overflow:hidden;
    }

    .mini-zone-box{
      position:absolute;
      inset:29px;
      border:3px solid white;
    }

    .mini-pitch-dot{
      position:absolute;
      width:28px;
      height:28px;
      border-radius:50%;
      background:red;
      color:#fff;
      font-weight:900;
      display:grid;
      place-items:center;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:5;
    }

    .mini-bases{
      position:relative;
      width:76px;
      height:76px;
    }

    .mini-base{
      position:absolute;
      width:18px;
      height:18px;
      transform:rotate(45deg);
      border-radius:4px;
      border:2px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.06);
    }

    .mini-base.active{
      background:var(--green);
      border-color:#fff;
      box-shadow:0 0 14px rgba(107,255,25,.8);
    }

    .mini-base.first{
      right:0;
      top:29px;
    }

    .mini-base.second{
      left:29px;
      top:0;
    }

    .mini-base.third{
      left:0;
      top:29px;
    }

    .mini-bottom{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-last,
    .mini-prob{
      background:rgba(255,255,255,.04);
      border-radius:12px;
      padding:9px;
      min-width:0;
    }

    .pitch-num{
      width:24px;
      height:24px;
      border-radius:50%;
      background:red;
      display:grid;
      place-items:center;
      font-weight:900;
      margin-bottom:6px;
      font-size:11px;
    }

    .mini-bar{
      width:100%;
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      margin-top:6px;
    }

    .mini-fill{
      width:50%;
      height:100%;
      background:linear-gradient(90deg,#6bff19,#c7ff45);
    }

    .gamecast-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .gamecast-kicker{
      margin:0 0 4px;
      color:var(--green);
      font-weight:900;
      font-size:12px;
      letter-spacing:1.5px;
    }

    .gamecast-header h2{
      margin:0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      letter-spacing:-.5px;
    }

    .gamecast-status{
      background:rgba(107,255,25,.12);
      color:var(--green);
      border:1px solid rgba(107,255,25,.35);
      padding:8px 13px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .gamecast-scoreline{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }

    .gc-score-team{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .gc-score-team strong{
      font-family:'Anton',sans-serif;
      font-size:28px;
      letter-spacing:1px;
    }

    .gc-score-team span{
      color:var(--green);
      font-size:32px;
      font-weight:900;
      font-family:'Roboto Mono',monospace;
    }

    .gc-inning-box{
      text-align:center;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      font-size:12px;
    }

    .gamecast-matchup{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:14px;
      align-items:center;
      margin-top:16px;
    }

    .gc-player{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:15px;
    }

    .gc-player.right{text-align:right;}

    .gc-label{
      display:block;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .gc-player strong{
      display:block;
      color:#fff;
      font-size:17px;
      font-weight:900;
      margin-top:6px;
    }

    .gc-player small{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
      font-weight:800;
    }

    .gc-vs{
      color:var(--muted);
      font-weight:900;
      font-size:13px;
    }

    .gamecast-counts{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:20px 0;
    }

    .gc-count-box{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:14px;
      padding:11px;
      text-align:center;
      font-size:12px;
      font-weight:900;
      color:#fff;
    }

    .dot-wrap{
      display:block;
      margin-top:7px;
      letter-spacing:3px;
      font-size:13px;
    }

    .gamecast-main{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
      align-items:center;
    }

    .strike-zone-wrap{
      background:rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.06);
      border-radius:22px;
      padding:20px;
      min-height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .strike-zone{
      position:relative;
      width:235px;
      height:235px;
      background:
        linear-gradient(90deg,rgba(59,130,246,.58) 0 33.3%,rgba(239,68,68,.58) 33.3% 66.6%,rgba(59,130,246,.58) 66.6% 100%),
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.20));
      border:2px solid rgba(255,255,255,.18);
      box-shadow:0 18px 40px rgba(0,0,0,.5);
      overflow:hidden;
    }

    .strike-zone:before,
    .strike-zone:after{
      content:"";
      position:absolute;
      background:rgba(0,0,0,.55);
      z-index:1;
    }

    .strike-zone:before{
      left:33.33%;
      top:0;
      width:2px;
      height:100%;
      box-shadow:78px 0 0 rgba(0,0,0,.55);
    }

    .strike-zone:after{
      top:33.33%;
      left:0;
      height:2px;
      width:100%;
      box-shadow:0 78px 0 rgba(0,0,0,.55);
    }

    .zone-box{
      position:absolute;
      inset:45px;
      border:4px solid rgba(0,0,0,.78);
      z-index:2;
    }

    .pitch-dot{
      position:absolute;
      left:50%;
      top:45%;
      width:34px;
      height:34px;
      border-radius:50%;
      transform:translate(-50%,-50%);
      background:#ef1111;
      color:#fff;
      display:grid;
      place-items:center;
      border:2px solid #050505;
      font-weight:900;
      z-index:5;
      box-shadow:
        0 7px 18px rgba(0,0,0,.55),
        0 0 18px rgba(255,255,255,.25),
        0 0 35px currentColor;
      transition:
        left .6s cubic-bezier(.22,.61,.36,1),
        top .6s cubic-bezier(.22,.61,.36,1),
        background .35s ease,
        transform .3s ease;
    }

    .pitch-dot.pulse{
      transform:translate(-50%,-50%) scale(1.18);
    }

    .bases-panel{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      border-radius:22px;
      padding:18px;
      min-height:300px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .bases-title{
      color:var(--green);
      font-weight:900;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:8px;
    }

    .diamond{
      height:155px;
      position:relative;
      margin:8px auto;
      width:190px;
    }

    .base{
      position:absolute;
      width:34px;
      height:34px;
      background:rgba(255,255,255,.20);
      border:2px solid rgba(255,255,255,.35);
      transform:rotate(45deg);
      border-radius:4px;
    }

    .base.active{
      background:var(--green);
      border-color:rgba(255,255,255,.85);
      box-shadow:0 0 20px rgba(107,255,25,.65);
    }

    .base.home{left:78px;bottom:0;background:rgba(255,255,255,.10);}
    .base.first{right:22px;bottom:58px;}
    .base.second{left:78px;top:0;}
    .base.third{left:22px;bottom:58px;}

    .bases-text{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      line-height:1.45;
      text-align:center;
      margin:6px 0 0;
    }

    .last-pitch{
      margin-top:20px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .last-pitch-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .last-pitch-number{
      display:grid;
      place-items:center;
      width:34px;
      height:34px;
      border-radius:50%;
      background:#ef1111;
      color:#fff;
      font-weight:900;
      border:2px solid #050505;
      flex:0 0 auto;
    }

    .last-pitch strong{
      color:#fff;
      font-size:13px;
      display:block;
    }

    .last-pitch small{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      display:block;

<body>
  <main class="page">
    <div class="top">
      <a href="mlb.html" class="back">← MLB</a>
      <div class="logo">DATA-<span>MORE</span></div>
    </div>

    <div id="content" class="loading">Loading game data...</div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gamePk = params.get('gamePk');
    const date = params.get('date');
    const content = document.getElementById('content');
    let liveGamecastTimer = null;

    async function safeFetch(url, fallback = {}) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);

        if (!res.ok) return fallback;
        return await res.json();
      } catch (err) {
        console.warn("Fetch failed:", url, err);
        return fallback;
      }
    }

    function getPitcherId(centerData, game, side){
      return (
        centerData?.pitcherStats?.[side]?.playerId ||
        centerData?.pitcherStats?.[side]?.id ||
        centerData?.pitcherStats?.[side]?.personId ||
        game?.[`${side}PitcherId`] ||
        game?.[`${side}ProbablePitcherId`] ||
        game?.probablePitchers?.[side]?.id ||
        game?.probablePitchers?.[side]?.playerId ||
        game?.[side]?.probablePitcher?.id ||
        null
      );
    }

    function playerPlaceholderSrc(){
      return 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2232%22 fill=%22%230b1117%22/%3E%3Ccircle cx=%2232%22 cy=%2224%22 r=%2212%22 fill=%22%236bff19%22 fill-opacity=%22.32%22/%3E%3Cpath d=%22M14 56c3-13 12-20 18-20s15 7 18 20%22 fill=%22%236bff19%22 fill-opacity=%22.22%22/%3E%3C/svg%3E';
    }

    function initialsForName(name){
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if(!parts.length) return 'DM';
      return parts.slice(0, 2).map(part => part[0]).join('').toUpperCase();
    }

    function mlbHeadshot(id, size = 120){
      if(!id) return playerPlaceholderSrc();

    function isUnavailable(value){
      if(value === undefined || value === null) return true;
      if(typeof value === 'number') return Number.isNaN(value);
      const raw = String(value).trim().toLowerCase();
      return raw === '' ||
        raw === 'pending' ||
        raw === 'data unavailable' ||
        raw === 'undefined' ||
        raw === 'null' ||
        raw === '--' ||
        raw === 'n/a' ||
        raw === 'no data';
    }

    function displayValue(value, fallback = 'Advanced data not available yet'){
      if(isUnavailable(value)) return fallback;
      return value;
    }

    function pctValue(value){
      if(isUnavailable(value)) return null;
      const n = Number(value);
      return Number.isFinite(n) ? `${n.toFixed(1)}%` : String(value);
    }

    function parsePctValue(value){
      if(isUnavailable(value)) return null;
      const n = Number(String(value).replace('%', '').trim());
      return Number.isFinite(n) ? n : null;
    }

    function marketEdgeValue(modelProb, vegasImplied){
      const model = Number(modelProb);
      const vegas = parsePctValue(vegasImplied);
      if(!Number.isFinite(model) || !Number.isFinite(vegas)) return null;
      const edge = model - vegas;
      return `${edge >= 0 ? '+' : ''}${edge.toFixed(1)}%`;
    }

    function compactNumber(value){
      if(isUnavailable(value)) return null;
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(2).replace(/\.00$/, '') : String(value);
    }

    function metricTile(label, value){
      if(isUnavailable(value)) return '';
      return `<div class="metric-tile"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function statLine(label, value){
      if(isUnavailable(value)) return '';
      return `<div class="stat-row"><span>${label}</span><span>${value}</span></div>`;
    }

    function compactNotice(message = 'Advanced data not available yet'){
      return `<p class="note">${message}</p>`;
    }

    function hasAnyData(...values){
      return values.some(value => !isUnavailable(value));
    }

    function joinSections(...sections){
      return sections.filter(section => String(section || '').trim()).join('');
    }

    function renderGrid(className, ...sections){
      const html = joinSections(...sections);
      return html ? `<div class="${className}">${html}</div>` : '';
    }

    function confidenceRating(confidence, probability){
      const raw = String(confidence || '').toLowerCase();
      const pct = Number(probability);

      if(raw.includes('alta') || raw.includes('high') || pct >= 62) return 'A';
      if(raw.includes('media') || raw.includes('medium') || pct >= 56) return 'B';
      if(raw.includes('baja') || raw.includes('low')) return 'C';

      return null;
    }

    function starsForConfidence(confidence, probability){
      const rating = confidenceRating(confidence, probability);
      if(rating === 'A') return '★★★★★';
      if(rating === 'B') return '★★★★☆';
      if(rating === 'C') return '★★★☆☆';
      return null;
    }

    function modelFavorite(game, analysis, awayPct, homePct){
      return analysis.pick || (homePct >= awayPct ? game.homeAbbrev : game.awayAbbrev);
    }

    function buildAIExplanation({ game, analysis, centerData, awayPct, homePct }){
      const favorite = modelFavorite(game, analysis, awayPct, homePct);
      const favIsHome = favorite === game.homeAbbrev || favorite === game.homeTeamName || favorite === game.homePitcher;
      const favPitcher = favIsHome ? game.homePitcher : game.awayPitcher;
      const oppAbbrev = favIsHome ? game.awayAbbrev : game.homeAbbrev;
      const favPct = Math.max(Number(awayPct), Number(homePct)).toFixed(1);
      const bullpenNote = centerData?.bullpen ? 'bullpen availability and fatigue checks remain part of the pre-bet review' : 'bullpen context is still pending';
      const marketNote = centerData?.odds?.currentMoneyline
        ? 'current market pricing is available for comparison'
        : 'sportsbook line data is not available yet, so Data More is prioritizing model-side fundamentals';

      return `Data More favors ${favorite} because the current model snapshot gives that side the stronger win profile at ${favPct}%. The recommendation is anchored by the same prediction engine already used across the MLB board, with ${favPitcher || 'the listed starter'} as a key matchup variable against ${oppAbbrev}. ${marketNote}, while ${bullpenNote}.`;
    }

    function buildLongExplanation({ game, analysis, centerData, awayPct, homePct, advancedModel }){
      const favorite = modelFavorite(game, analysis, awayPct, homePct);
      const underdog = favorite === game.homeAbbrev ? game.awayAbbrev : game.homeAbbrev;
      const total = displayValue(advancedModel.projectedRuns.total);
      const confidence = displayValue(analysis.confidence || analysis.confidenceLevel);

      return `
        <p>Data More's recommendation is ${favorite}, and the reason is not a single stat. The model is weighing starter profile, team run creation, recent form, projected scoring environment, and the current win-probability split. That combination gives ${favorite} a cleaner betting profile than ${underdog} for this matchup.</p>
        <p>The projected total is ${total}, which frames how aggressive the model can be with side and run-environment exposure. If the market moves sharply before first pitch, the Market Intelligence panel should be reviewed again because closing line value can change the quality of the entry without changing the underlying team projection.</p>
        <p>The main risks are lineup confirmation, bullpen availability, and late weather or roof changes. Those factors do not replace the pick, but they explain why this panel keeps market, pitching, bullpen, lineup, and weather context visible before the user commits capital.</p>
        <p>Current confidence is ${confidence}. Treat this as a decision-support read: the prediction remains Data More's output, while the surrounding cards explain the path and the risks around it.</p>
      `;
    }

    function numberValue(value){
      if(isUnavailable(value)) return null;
      const n = Number(String(value).replace('%', ''));
      return Number.isFinite(n) ? n : null;
    }

    function lowerIsBetterScore(value, min, max){
      const n = numberValue(value);
      if(n === null) return null;
      return Math.max(0, Math.min(100, ((max - n) / (max - min)) * 100));
    }

    function higherIsBetterScore(value, min, max){
      const n = numberValue(value);
      if(n === null) return null;
      return Math.max(0, Math.min(100, ((n - min) / (max - min)) * 100));
    }

    function averageScores(...scores){
      const clean = scores.filter(score => Number.isFinite(score));
      if(!clean.length) return null;
      return clean.reduce((sum, score) => sum + score, 0) / clean.length;
    }

    function compareMetric(label, awayValue, homeValue, awayScore, homeScore){
      if(isUnavailable(awayValue) && isUnavailable(homeValue)) return '';
      const a = Number.isFinite(awayScore) ? awayScore : 50;
      const h = Number.isFinite(homeScore) ? homeScore : 50;
      const total = a + h;
      const width = total > 0 ? Math.max(5, Math.min(95, (a / total) * 100)) : 50;
      return `
        <div class="compare-row">
          <span>${label}</span>
          <div class="compare-track"><div class="compare-fill" style="width:${width}%"></div></div>
          <span>${displayValue(awayValue, '--')} | ${displayValue(homeValue, '--')}</span>
        </div>
      `;
    }

    function pitcherKRate(stats = {}){
      const k = numberValue(stats.K);
      const bf = numberValue(stats.battersFaced);
      if(Number.isFinite(k) && Number.isFinite(bf) && bf > 0) return Number(((k / bf) * 100).toFixed(1));
      return null;
    }

    function pitcherBbRate(stats = {}){
      const bb = numberValue(stats.BB);
      const bf = numberValue(stats.battersFaced);
      if(Number.isFinite(bb) && Number.isFinite(bf) && bf > 0) return Number(((bb / bf) * 100).toFixed(1));
      return null;
    }

    function renderSabermetricStudy(game, centerData){
      const awayPitcher = centerData?.pitcherStats?.away || {};
      const homePitcher = centerData?.pitcherStats?.home || {};
      const awayTeam = centerData?.teamStats?.away || {};
      const homeTeam = centerData?.teamStats?.home || {};
      const odds = centerData?.odds || {};
      const projected = centerData?.advancedModel?.projectedRuns || {};

      const awayKRate = pitcherKRate(awayPitcher);
      const homeKRate = pitcherKRate(homePitcher);
      const awayBbRate = pitcherBbRate(awayPitcher);
      const homeBbRate = pitcherBbRate(homePitcher);

      const awayPitchingScore = averageScores(
        lowerIsBetterScore(awayPitcher.ERA, 2.4, 6.2),
        lowerIsBetterScore(awayPitcher.WHIP, 0.9, 1.7),
        higherIsBetterScore(awayKRate, 12, 34),
        lowerIsBetterScore(awayBbRate, 4, 14),
        lowerIsBetterScore(awayPitcher.HR, 0, 28)
      );
      const homePitchingScore = averageScores(
        lowerIsBetterScore(homePitcher.ERA, 2.4, 6.2),
        lowerIsBetterScore(homePitcher.WHIP, 0.9, 1.7),
        higherIsBetterScore(homeKRate, 12, 34),
        lowerIsBetterScore(homeBbRate, 4, 14),
        lowerIsBetterScore(homePitcher.HR, 0, 28)
      );

      const awayOffenseScore = averageScores(
        higherIsBetterScore(awayTeam.AVG, .210, .285),
        higherIsBetterScore(awayTeam.OBP, .285, .365),
        higherIsBetterScore(awayTeam.SLG, .340, .480),
        higherIsBetterScore(awayTeam.OPS, .630, .850),
        higherIsBetterScore(awayTeam.runs, 250, 460),
        higherIsBetterScore(awayTeam.HR, 45, 130),
        higherIsBetterScore(awayTeam.hits, 500, 760)
      );
      const homeOffenseScore = averageScores(
        higherIsBetterScore(homeTeam.AVG, .210, .285),
        higherIsBetterScore(homeTeam.OBP, .285, .365),
        higherIsBetterScore(homeTeam.SLG, .340, .480),
        higherIsBetterScore(homeTeam.OPS, .630, .850),
        higherIsBetterScore(homeTeam.runs, 250, 460),
        higherIsBetterScore(homeTeam.HR, 45, 130),
        higherIsBetterScore(homeTeam.hits, 500, 760)
      );

      const awayProjected = higherIsBetterScore(projected.away, 2, 7);
      const homeProjected = higherIsBetterScore(projected.home, 2, 7);
      const awayOverall = averageScores(awayPitchingScore, awayOffenseScore, awayProjected);
      const homeOverall = averageScores(homePitchingScore, homeOffenseScore, homeProjected);
      const lean = Number(homeOverall || 0) >= Number(awayOverall || 0) ? game.homeAbbrev : game.awayAbbrev;
      const leanTeam = lean === game.homeAbbrev ? game.homeTeamName || game.homeAbbrev : game.awayTeamName || game.awayAbbrev;
      const pitchingEdge = Number(homePitchingScore || 0) >= Number(awayPitchingScore || 0) ? game.homeAbbrev : game.awayAbbrev;
      const offensiveEdge = Number(homeOffenseScore || 0) >= Number(awayOffenseScore || 0) ? game.homeAbbrev : game.awayAbbrev;
      const marketEdge = !isUnavailable(odds.modelEdge) ? odds.modelEdge : null;
      const hasData = hasAnyData(
        awayPitcher.ERA, homePitcher.ERA,
        awayTeam.OPS, homeTeam.OPS,
        projected.away, projected.home
      );

      if(!hasData) return '';

      const summary = `Data More gives ${leanTeam} the sabermetric edge using the available pitching, offensive efficiency and projected run profile. ${pitchingEdge} owns the starting pitching edge, while ${offensiveEdge} grades stronger on lineup production.`;

      return `
        <section class="premium-card sabermetric-card">
          <div class="card-head">
            <div><div class="card-kicker">Sabermetric Study</div><h3>${game.awayAbbrev} vs ${game.homeAbbrev}</h3></div>
            <span class="sabermetric-lean">Data More Sabermetric Lean: ${lean}</span>
          </div>
          <p class="sabermetric-summary">${summary}${marketEdge ? ` Current market edge is ${marketEdge}.` : ''}</p>
          <div class="sabermetric-grid">
            <div class="sabermetric-block">
              <h4>Pitching</h4>
              ${compareMetric('ERA', awayPitcher.ERA, homePitcher.ERA, lowerIsBetterScore(awayPitcher.ERA, 2.4, 6.2), lowerIsBetterScore(homePitcher.ERA, 2.4, 6.2))}
              ${compareMetric('WHIP', awayPitcher.WHIP, homePitcher.WHIP, lowerIsBetterScore(awayPitcher.WHIP, .9, 1.7), lowerIsBetterScore(homePitcher.WHIP, .9, 1.7))}
              ${compareMetric('K%', awayKRate ? `${awayKRate}%` : null, homeKRate ? `${homeKRate}%` : null, higherIsBetterScore(awayKRate, 12, 34), higherIsBetterScore(homeKRate, 12, 34))}
              ${compareMetric('BB%', awayBbRate ? `${awayBbRate}%` : null, homeBbRate ? `${homeBbRate}%` : null, lowerIsBetterScore(awayBbRate, 4, 14), lowerIsBetterScore(homeBbRate, 4, 14))}
              ${compareMetric('HR Allowed', awayPitcher.HR, homePitcher.HR, lowerIsBetterScore(awayPitcher.HR, 0, 28), lowerIsBetterScore(homePitcher.HR, 0, 28))}
              ${compareMetric('IP', awayPitcher.IP, homePitcher.IP, higherIsBetterScore(awayPitcher.IP, 20, 130), higherIsBetterScore(homePitcher.IP, 20, 130))}
              ${compareMetric('Quality Starts', awayPitcher.qualityStarts, homePitcher.qualityStarts, higherIsBetterScore(awayPitcher.qualityStarts, 0, 18), higherIsBetterScore(homePitcher.qualityStarts, 0, 18))}
            </div>
            <div class="sabermetric-block">
              <h4>Offense</h4>
              ${compareMetric('AVG', awayTeam.AVG, homeTeam.AVG, higherIsBetterScore(awayTeam.AVG, .210, .285), higherIsBetterScore(homeTeam.AVG, .210, .285))}
              ${compareMetric('OBP', awayTeam.OBP, homeTeam.OBP, higherIsBetterScore(awayTeam.OBP, .285, .365), higherIsBetterScore(homeTeam.OBP, .285, .365))}
              ${compareMetric('SLG', awayTeam.SLG, homeTeam.SLG, higherIsBetterScore(awayTeam.SLG, .340, .480), higherIsBetterScore(homeTeam.SLG, .340, .480))}
              ${compareMetric('OPS', awayTeam.OPS, homeTeam.OPS, higherIsBetterScore(awayTeam.OPS, .630, .850), higherIsBetterScore(homeTeam.OPS, .630, .850))}
              ${compareMetric('Runs', awayTeam.runs, homeTeam.runs, higherIsBetterScore(awayTeam.runs, 250, 460), higherIsBetterScore(homeTeam.runs, 250, 460))}
              ${compareMetric('HR', awayTeam.HR, homeTeam.HR, higherIsBetterScore(awayTeam.HR, 45, 130), higherIsBetterScore(homeTeam.HR, 45, 130))}
              ${compareMetric('Hits', awayTeam.hits, homeTeam.hits, higherIsBetterScore(awayTeam.hits, 500, 760), higherIsBetterScore(homeTeam.hits, 500, 760))}
            </div>
            <div class="sabermetric-block">
              <h4>Matchup Edge</h4>
              ${statLine('Starting Pitching Edge', pitchingEdge)}
              ${statLine('Offensive Edge', offensiveEdge)}
              ${statLine('Market Edge', marketEdge)}
              ${statLine('Overall Sabermetric Lean', lean)}
            </div>
          </div>
        </section>
      `;
    }

    function renderPitcherHistory(game, centerData){
      const away = centerData?.pitcherVsOpponent?.away || {};
      const home = centerData?.pitcherVsOpponent?.home || {};
      const hasHistory = hasAnyData(
        away.starts,
        away.innings,
        away.ERA,
        away.WHIP,
        home.starts,
        home.innings,
        home.ERA,

              <h3>Probable Pitchers</h3>
              <div class="stat-row"><span>${game.awayAbbrev}</span><span>${game.awayPitcher || 'TBD'}</span></div>
              <div class="stat-row"><span>${game.homeAbbrev}</span><span>${game.homePitcher || 'TBD'}</span></div>
              <div class="stat-row"><span>Analysis Type</span><span>Pre-Game Data</span></div>
            </div>

          </section>

          <div class="props-row">
            <section class="panel compact-card">
              <h3>🔥 Top 3 Hit Probability (Game)</h3>
              <div class="two-grid">
                <div>
                  <div class="sub-title">${game.awayAbbrev}</div>
                  ${renderPlayerCards(awayHitPlayers, 'hit')}
                </div>
                <div>
                  <div class="sub-title">${game.homeAbbrev}</div>
                  ${renderPlayerCards(homeHitPlayers, 'hit')}
                </div>
              </div>
            </section>

            <section class="panel compact-card">
              <h3>💣 Top 3 HR Potential (Game)</h3>
              <div class="two-grid">
                <div>
                  <div class="sub-title">${game.awayAbbrev}</div>
                  ${renderPlayerCards(awayHrPlayers, 'hr')}
                </div>
                <div>
                  <div class="sub-title">${game.homeAbbrev}</div>
                  ${renderPlayerCards(homeHrPlayers, 'hr')}
                </div>
              </div>
            </section>
          </div>

          <section class="panel compact-card">
            <h3>Confirmed / Projected Lineups</h3>
            ${renderLineups(lineupData, propsData, game.awayAbbrev, game.homeAbbrev)}
          </section>

          ${renderGrid(
            'premium-grid',
            renderPlayerPropsCenter(awayHitPlayers, homeHitPlayers, awayHrPlayers, homeHrPlayers),
            renderHistoricalPerformance(performanceData)
          )}

          <div class="premium-stack">
            ${renderExplainThisPick({ game, analysis, centerData, advancedModel, awayPct, homePct })}
          </div>
        `;

        await loadLiveGamecast();
        if(liveGamecastTimer) clearInterval(liveGamecastTimer);
        liveGamecastTimer = setInterval(loadLiveGamecast, 15000);

      }catch(err){
        console.error(err);
        content.innerHTML = 'Error loading game detail.';
      }
    }

    async function loadLiveGamecast(){
      try{
        if(!gamePk) return;

        const res = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`);
        const data = await res.json();

        const liveData = data.liveData || {};
        const linescore = liveData.linescore || {};
        const plays = liveData.plays || {};
        const currentPlay = plays.currentPlay || {};
        const matchup = currentPlay.matchup || {};
        const count = currentPlay.count || {balls:0, strikes:0, outs:0};

        const gcStatus = document.getElementById('gcStatus');
        if(gcStatus) gcStatus.textContent = data.gameData?.status?.detailedState || 'LIVE';
        
        updateLiveWinProbability(linescore);

        const pitcherName = matchup.pitcher?.fullName || '--';
        const batterName = matchup.batter?.fullName || '--';
        document.getElementById('gcPitcher').textContent = pitcherName;
        document.getElementById('gcBatter').textContent = batterName;
        setLivePlayerImage('Pitcher', matchup.pitcher);
        setLivePlayerImage('Batter', matchup.batter);

        const batterId = matchup.batter?.id || matchup.batter?.personId || matchup.batter?.playerId;
        const batterGameData = batterId ? data.gameData?.players?.[`ID${batterId}`] : null;
        const batterPosition =
          matchup.batter?.primaryPosition?.abbreviation ||
          matchup.batter?.primaryPosition?.code ||
          matchup.batter?.position?.abbreviation ||
          batterGameData?.primaryPosition?.abbreviation ||
          batterGameData?.primaryPosition?.code ||
          (typeof matchup.batter?.position === 'string' ? matchup.batter.position : '') ||
          '';
        const batterPosBadge = document.getElementById('gcBatterPos');
        if(batterPosBadge){
          batterPosBadge.textContent = batterPosition;
          batterPosBadge.style.display = batterPosition ? 'inline-block' : 'none';
        }

        updateCountDots('gcBalls', count.balls);
        updateCountDots('gcStrikes', count.strikes);
        updateCountDots('gcOuts', count.outs);

        const offense = linescore.offense || {};
        document.getElementById('base1').className = offense.first ? 'mini-base first active' : 'mini-base first';
        document.getElementById('base2').className = offense.second ? 'mini-base second active' : 'mini-base second';
        document.getElementById('base3').className = offense.third ? 'mini-base third active' : 'mini-base third';

        const allPitches = currentPlay.playEvents?.filter(e => e.isPitch) || [];
        const lastPitch = allPitches[allPitches.length - 1];
        if(lastPitch){
          const dot = document.getElementById('gcPitchDot');
          document.getElementById('gcPitchNumber').textContent = lastPitch.pitchNumber || '#';
          document.getElementById('gcPitchResult').textContent = lastPitch.details?.call?.description || 'Pitch';
          document.getElementById('gcPitchType').textContent = lastPitch.details?.type?.description || '--';

          const px = lastPitch.pitchData?.coordinates?.pX || 0;
          const pz = lastPitch.pitchData?.coordinates?.pZ || 0;
          
          const pitchType = String(lastPitch.details?.type?.description || '').toLowerCase();
          let pitchColor = '#ef1111';

          if (pitchType.includes('fastball')) pitchColor = '#ef1111';
          if (pitchType.includes('slider')) pitchColor = '#38bdf8';
          if (pitchType.includes('curve')) pitchColor = '#a855f7';
          if (pitchType.includes('change')) pitchColor = '#22c55e';

          dot.style.background = pitchColor;
          dot.style.left = Math.max(10, Math.min(90, 50 + (px * 35))) + '%';
          dot.style.top = Math.max(10, Math.min(90, 50 - (pz * 25))) + '%';
          dot.textContent = lastPitch.pitchNumber;
        }

      }catch(err){
        console.warn("Live gamecast feed error:", err);
      }
    }

    function updateCountDots(id, count){
      const box = document.getElementById(id);
      if(!box) return;

      const dots = box.querySelectorAll('.count-dot');

      dots.forEach((dot, index) => {
        if(index < count){
          dot.classList.add('active');
        }else{
          dot.classList.remove('active');
        }
      });
    }

    function updateLiveWinProbability(linescore){
      const awayRuns = Number(linescore?.teams?.away?.runs || 0);
      const homeRuns = Number(linescore?.teams?.home?.runs || 0);

      let awayProb = 50 + ((awayRuns - homeRuns) * 9);
      awayProb = Math.max(8, Math.min(92, awayProb));

      const fill = document.getElementById('gcWinProbFill');
      const text = document.getElementById('gcWinProbText');

      if(fill) fill.style.width = `${awayProb.toFixed(0)}%`;
      if(text) text.textContent = `${awayProb.toFixed(0)}%`;
    }

    function normalizePlayersFromSources(game, propsData){
      const sources = [
        game?.topHitPlayers,
        game?.topHits,
        game?.hitPlayers,
        game?.topHomeRunPlayers,
        game?.topHrPlayers,
        game?.topHRPlayers,
        game?.homeRunPotential,
        game?.hrPotential,
        propsData?.players,
        propsData?.topHitPlayers,
        propsData?.topHits,
        propsData?.topHomeRunPlayers,
        propsData?.topHRPlayers,
        propsData?.homeRunPotential,
        propsData?.hrPotential
      ];

      return sources.flatMap(x => Array.isArray(x) ? x : []);
    }

    function getTopHits(game, propsData, teamAbbrev){
      const all = normalizePlayersFromSources(game, propsData);

      return all
        .filter(p => {
          const type = String(p.propType || p.type || p.category || '').toLowerCase();
          const team = p.teamAbbrev || p.team || p.teamCode || '';
          return (!teamAbbrev || team === teamAbbrev) &&
            (type.includes('hit') || p.hitProbability || p.avg || p.AVG || p.ops || p.OPS);
        })
        .slice(0, 3);
    }

    function getTopHR(game, propsData, teamAbbrev){
      const all = normalizePlayersFromSources(game, propsData);

      const teamPlayers = all.filter(p => {
        const team = p.teamAbbrev || p.team || p.teamCode || '';
        return !teamAbbrev || team === teamAbbrev;
      });

      const hrPlayers = teamPlayers.filter(p => {
        const type = String(p.propType || p.type || p.category || p.market || '').toLowerCase();

        return (
          type.includes('hr') ||
          type.includes('home') ||
          p.hrProbability != null ||
          p.homeRunProbability != null ||
          p.hrProb != null ||
          p.HRProb != null ||
          p.hr != null ||
          p.HR != null ||
          p.homeRuns != null ||
          p.slg != null ||
          p.SLG != null
        );
      });

      return hrPlayers
        .sort((a,b) => {
          const pa = Number(a.hrProbability ?? a.homeRunProbability ?? a.hrProb ?? a.probability ?? a.prob ?? 0);
          const pb = Number(b.hrProbability ?? b.homeRunProbability ?? b.hrProb ?? b.probability ?? b.prob ?? 0);
          return pb - pa;
        })
        .slice(0, 3);
    }

    function playerHeadshot(p){
      const id = p.personId || p.playerId || p.id || p.mlbId;
      if(!id) return playerPlaceholderSrc();
      return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${id}/headshot/67/current`;
    }

    function playerInfoParts(p, type = 'hit'){
      const probability = type === 'hr'
        ? p.hrChance ?? p.hrProbability ?? p.homeRunProbability ?? p.hrProb ?? p.probability ?? p.prob
        : p.hitChance ?? p.hitProbability ?? p.probability ?? p.prob;
      const parts = [];

      if(!isUnavailable(probability)){
        parts.push(type === 'hr'
          ? `Data More HR Probability: ${probability}%`
          : `Data More Hit Probability: ${probability}%`
        );
      }

      if(type === 'hr'){
        const hr = p.hr ?? p.HR ?? p.homeRuns;
        const slg = p.slg ?? p.SLG;
        if(!isUnavailable(hr)) parts.push(`HR: ${hr}`);
        if(!isUnavailable(slg)) parts.push(`SLG: ${slg}`);
      }else{
        const avg = p.avg ?? p.AVG;
        const ops = p.ops ?? p.OPS;
        if(!isUnavailable(avg)) parts.push(`AVG: ${avg}`);
        if(!isUnavailable(ops)) parts.push(`OPS: ${ops}`);
      }

      return parts.join(' | ');
    }

    function renderPlayerCards(players, type = 'hit'){
      if(!players.length) return '<p class="note">No player data found.</p>';

      return players.map(p => `
        <div class="player-card">
          <img src="${playerHeadshot(p)}" onerror="setPlayerImageFallback(this)">
          <div>
            <span class="p-name">${p.playerName || p.name || '--'}</span>
            ${playerInfoParts(p, type) ? `<span class="p-info">${playerInfoParts(p, type)}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderRiskBars(pct){
      return `
        <div class="bar-row">
          <div class="bar-top"><span>Edge Factor</span><span>${pct}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    }

    function renderLineups(lineupData, propsData, away, home){
      const awayLineup =
        lineupData.awayLineup ||
        lineupData.lineups?.away ||
        lineupData.away ||
        lineupData.teams?.away?.lineup ||
        [];

      const homeLineup =
        lineupData.homeLineup ||
        lineupData.lineups?.home ||
        lineupData.home ||
        lineupData.teams?.home?.lineup ||
        [];

      if(!lineupData.ok || (!awayLineup.length && !homeLineup.length)){
        return '<p class="note">Lineups not yet confirmed.</p>';
      }

      const renderSide = (lineup) => lineup.slice(0,9).map(p => {
        const order = String(p.battingOrder || p.order || '').charAt(0) || '';
        const name = p.name || p.playerName || '--';
        const pos = p.pos || p.position || '--';

        return `
          <div class="player">
            <span><span class="num">${order}</span>${name}</span>
            <span class="badge">${pos}</span>
          </div>
        `;
      }).join('');

      return `
        <div class="lineup-box">
          <div>
            <div class="sub-title">${away}</div>
            ${renderSide(awayLineup)}
          </div>
          <div>
            <div class="sub-title">${home}</div>
            ${renderSide(homeLineup)}
          </div>
        </div>
      `;
    }

    loadDetail();
  </script>
</body>
</html>
