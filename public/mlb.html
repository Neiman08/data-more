<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) {
      window.location.href = 'login.html';
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data More | MLB Prediction Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    :root {
      --green: #6bff19; 
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #888d93;
      --bg-panel: rgba(20, 25, 30, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    main.page {
      max-width: 1440px;
      margin: 0 auto;
      background: radial-gradient(circle at 30% 30%, #0a1a0a 0%, #020509 60%);
      position: relative;
      padding-bottom: 40px;
    }

    header {
      height: 70px;
      padding: 0 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      position: sticky;
      top: 40px; 
      z-index: 1000;
    }

    .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; font-family: 'Anton', sans-serif; text-transform: uppercase; }
    .logo span { color: var(--green); }

    nav { display: flex; gap: 20px; }
    nav a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
    nav a.active { opacity: 1; border-bottom: 2px solid var(--green); padding-bottom: 25px; margin-bottom: -25px; }

    .header-actions { display: flex; gap: 12px; }
    .btn-login { border: 1px solid rgba(255,255,255,0.5); padding: 8px 18px; border-radius: 6px; color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; }
    .btn-reg { background: var(--green); padding: 8px 18px; border-radius: 6px; color: #000; text-decoration: none; font-size: 12px; font-weight: 800; }
    .btn-logout { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 8px 18px; font-size: 12px; font-weight: 800; cursor: pointer; }

    .espn-ticker-container {
        width: 100%;
        background: #000;
        border-bottom: 1px solid var(--border);
        height: 40px;
        display: flex;
        align-items: center;
        overflow: hidden;
        position: sticky;
        top: 0;
        z-index: 10000;
    }
    .ticker-wrapper {
        display: flex;
        white-space: nowrap;
        animation: ticker-scroll 150s linear infinite;
    }
    .ticker-wrapper:hover { animation-play-state: paused; }
    .ticker-item {
        display: flex;
        align-items: center;
        padding: 0 30px;
        border-right: 1px solid var(--border);
        height: 40px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
    }
    .ticker-item img { width: 16px; height: 16px; object-fit: contain; margin: 0 6px; }
    .sport-tag { font-size: 8px; padding: 2px 5px; border-radius: 4px; margin-right: 8px; font-weight: 900; text-transform: uppercase; }
    .tag-mlb { background: #2563eb; color: white; } 
    .tag-soccer { background: var(--green); color: #000; }
    .tag-nba { background: #f97316; color: white; }
    .ticker-score { color: #fff; margin: 0 2px; font-weight: 800; }
    .ticker-status { margin-left: 10px; color: var(--green); font-size: 9px; font-weight: bold; }
    
    @keyframes ticker-scroll {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
    }

    .container {
      padding: 30px 50px;
    }

    h1.page-title {
      font-family: 'Anton';
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }
    h1.page-title span { color: var(--green); }

    .nav-sports {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
    }
    .nav-sports a { text-decoration: none; }
    .nav-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-btn.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 800; }

    .topbar {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      align-items: center;
    }
    .topbar input[type="date"] {
      background: #111;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    .btn-action {
      background: var(--green);
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 800;
      text-decoration: none;
      font-size: 13px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-sec {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    @media (max-width: 1300px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 25px;
      backdrop-filter: blur(10px);
    }

    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .team-box { text-align: center; flex: 1; }
    .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
    .team-abbr { display: block; font-size: 20px; font-weight: 900; color: #fff; }
    .team-record { display: block; font-size: 11px; color: var(--green); font-weight: 700; }
    .pitcher-name { font-size: 10px; color: #facc15; font-weight: bold; margin-top: 5px; display: block; }

    .game-status-center { flex: 1; text-align: center; padding: 0 15px; }
    .live-tag { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; display: inline-block; text-transform: uppercase; margin-bottom: 5px;}
    .status-live { background: rgba(239, 68, 68, 0.2); color: #ef4444; animation: blink 1.5s infinite; }
    .status-other { background: rgba(255,255,255,0.05); color: var(--muted); }
    .score-now { font-size: 32px; font-weight: 900; color: #fff; font-family: 'Anton', sans-serif; letter-spacing: -1px; }

    .bases-container { margin-top: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px;}
    .diamond-box { display: flex; justify-content: center; gap: 4px; }
    .base { width: 8px; height: 8px; border: 1.5px solid rgba(255,255,255,0.2); transform: rotate(45deg); }
    .base.active { background: #facc15; border-color: #facc15; box-shadow: 0 0 5px rgba(250, 204, 21, 0.5); }
    .count-box { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 5px;}

    .last5-box { display: flex; justify-content: center; gap: 3px; margin-top: 5px; }
    .last5-item { width: 16px; height: 16px; border-radius: 3px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; }
    .last5-item.win { background: var(--green); color: #000; }
    .last5-item.loss { background: #ef4444; color: #fff; }

    .lineup-container { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
    .player-line { display: flex; justify-content: space-between; font-size: 10px; padding: 2px 0; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.02); }
    .order-num { color: var(--green); font-weight: bold; margin-right: 3px; }
    .pos-tag { color: var(--muted); font-size: 9px;}

    .analyze-btn {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .analyze-btn:hover { opacity: 0.8; }

    .prediction-box { padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid; }
    .border-baja { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
    .border-media { border-color: #facc15; background: rgba(250, 204, 21, 0.05); }
    .border-alta { border-color: var(--green); background: rgba(107, 255, 25, 0.05); }
    
    .section { border-top: 1px solid rgba(255,255,255,0.05); padding: 12px 0; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase;}
    .pick-val { font-size: 18px; font-weight: 800; color: #fff; }
    .data-mono { font-family: monospace; font-size: 11px; color: var(--muted); }

    .player-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 6px;}
    .player-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
    .p-name { font-size: 12px; font-weight: 700; color: #fff; display:block; }
    .p-stats { font-size: 10px; color: var(--muted); display:block; margin-top:2px; }

    .props-team-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .props-team-title {
      font-size: 11px;
      color: #fff;
      font-weight: 900;
      margin: 12px 0 8px;
      text-transform: uppercase;
    }

    .props-market-title {
      font-size: 10px;
      color: var(--green);
      font-weight: 900;
      margin: 10px 0 5px;
      text-transform: uppercase;
    }

    @media (max-width: 650px) {
      .props-team-grid {
        grid-template-columns: 1fr;
      }
    }

    .pro-lock-panel { padding: 20px; border: 1px solid #facc15; border-radius: 12px; background: rgba(250,204,21,0.03); text-align: center; margin-top: 10px; }
    .lock-title { font-size: 15px; font-weight: 800; color: #facc15; text-transform: uppercase;}
    .btn-upgrade { background: var(--green); color: #000; width: 100%; font-weight: 800; padding: 12px; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; font-size: 12px;}

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading { animation: pulse 1s infinite; color: var(--green); font-size: 12px; text-align: center; padding: 20px;}
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>
<body>

<main class="page">
  <div class="espn-ticker-container">
    <div class="ticker-wrapper" id="tickerWrapper">
        <span class="ticker-item">Syncing live scores...</span>
    </div>
  </div>

  <header>
    <div class="logo">DATA-<span>MORE</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a class="active" href="picks.html">Picks</a>
      <a href="precios.html">Pricing</a>
      <a href="resultados.html">Results</a>
      <a href="estadisticas.html">Stats</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <div class="container">
    <h1 class="page-title">MLB <span>AI PREDICTION ENGINE</span></h1>
    <p style="color:var(--green); font-size:11px; font-weight:800; margin-bottom:10px;">
      LIVE EDGE ANALYSIS
    </p>
    <p style="color:var(--muted); font-size:12px; margin-bottom:20px;">
      Real-time predictions powered by advanced AI and betting models
    </p>

    <div class="nav-sports">
        <a href="mlb.html"><button type="button" class="nav-btn active">⚾ MLB</button></a>
        <a href="soccer.html"><button type="button" class="nav-btn">⚽ Soccer</button></a>
        <a href="nba.html"><button type="button" class="nav-btn">🏀 NBA</button></a>
        <a href="horse.html"><button type="button" class="nav-btn">🏇 Horse Racing</button></a>
    </div>

    <div class="topbar">
      <input type="date" id="dateInput" />
      <button class="btn-action" onclick="loadGames()">Load Board</button>
      <button class="btn-action btn-sec" onclick="analyzeAll()">⚡ RUN FULL ANALYSIS</button>
    </div>

    <div id="status" style="margin-bottom: 15px; font-size: 12px; color: var(--muted);">System ready. Select a date to begin.</div>
    
    <div id="gamesGrid" class="grid"></div>
  </div>
</main>

<script>
  const dateInput = document.getElementById("dateInput");
  const gamesGrid = document.getElementById("gamesGrid");
  const status = document.getElementById("status");

  function getChicagoDate() {
    const now = new Date();
    return new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Chicago',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).format(now);
  }

  dateInput.value = getChicagoDate();

  async function initTicker() {
    const ticker = document.getElementById('tickerWrapper');
    async function fetchScores() {
      try {
        const [mlbRes, soccerRes, nbaRes] = await Promise.all([
          fetch('/api/baseball/games').catch(() => null),
          fetch('/api/soccer-games-global').catch(() => null),
          fetch('/api/nba-games').catch(() => null)
        ]);

        let html = '';

        if (mlbRes) {
          const data = await mlbRes.json();
          if (data.ok) data.games.forEach(g => {
            html += `<div class="ticker-item"><span class="sport-tag tag-mlb">MLB</span><img src="/logos/${g.awayAbbrev}.png" onerror="this.style.display='none'">${g.awayAbbrev} <span class="ticker-score">${g.awayScore}</span> @ <span class="ticker-score">${g.homeScore}</span> ${g.homeAbbrev}<img src="/logos/${g.homeAbbrev}.png" onerror="this.style.display='none'"><span class="ticker-status">${g.status}</span></div>`;
          });
        }

        if (soccerRes) {
          const data = await soccerRes.json();
          if (data.ok) data.games.slice(0, 12).forEach(g => {
            html += `<div class="ticker-item"><span class="sport-tag tag-soccer">SOC</span><img src="${g.homeLogo || '/logo.png'}" onerror="this.src='/logo.png'"><span class="ticker-score">${g.homeScore ?? 0}</span> - <span class="ticker-score">${g.awayScore ?? 0}</span><img src="${g.awayLogo || '/logo.png'}" onerror="this.src='/logo.png'"><span class="ticker-status">${g.time}</span></div>`;
          });
        }

        if (nbaRes) {
          const data = await nbaRes.json();
          if (data.ok) data.games.forEach(g => {
            html += `<div class="ticker-item"><span class="sport-tag tag-nba">NBA</span><img src="${g.awayLogo || '/logo.png'}" onerror="this.src='/logo.png'"><span class="ticker-score">${g.awayScore ?? 0}</span> @ <span class="ticker-score">${g.homeScore ?? 0}</span><img src="${g.homeLogo || '/logo.png'}" onerror="this.src='/logo.png'"><span class="ticker-status">${g.status}</span></div>`;
          });
        }

        if (html) ticker.innerHTML = html + html;
      } catch (err) {
        console.error("Ticker error:", err);
      }
    }

    fetchScores();
    setInterval(fetchScores, 60000);
  }

  function renderLast5Boxes(str) {
    if (!str || str === 'No data' || str === '---') return '';
    return `
      <div class="last5-box">
        ${str.split(' ').map(r => {
          const clean = r.trim().toUpperCase();
          if (clean !== 'W' && clean !== 'L') return '';
          return `<span class="last5-item ${clean === 'W' ? 'win' : 'loss'}">${clean}</span>`;
        }).join('')}
      </div>
    `;
  }

  async function loadGames() {
    const date = dateInput.value;
    status.innerHTML = `<div class="loading">Loading board...</div>`;
    gamesGrid.innerHTML = "";

    try {
      const res = await fetch(`/api/baseball/games?date=${date}`);
      const data = await res.json();

      if (!data.ok) {
        status.textContent = "Unable to load games. Please try again.";
        return;
      }

      if (!data.games.length) {
        status.textContent = "No games scheduled for this date.";
        return;
      }

      for (const game of data.games) {
        const card = document.createElement("div");
        card.className = "card";
        
        const lRes = await fetch(`/api/baseball/lineup/${game.gamePk}`).catch(() => null);
        const lData = lRes ? await lRes.json() : { ok: false };

        // ===== NUEVA LÓGICA DE NORMALIZACIÓN Y RENDERING =====
        const rawStatus = (game.status || '').toLowerCase();

        const isPregame =
          rawStatus.includes('pre') ||
          rawStatus.includes('scheduled') ||
          rawStatus.includes('preview') ||
          rawStatus.includes('warmup');

        const isLive =
          rawStatus.includes('live') ||
          rawStatus.includes('progress') ||
          rawStatus.includes('in progress');

        const awayScore = Number.isFinite(game.awayScore) ? game.awayScore : 0;
        const homeScore = Number.isFinite(game.homeScore) ? game.homeScore : 0;
        const inningText = isPregame ? '' : (game.inning || '');
        const balls = Number.isFinite(game.balls) ? game.balls : 0;
        const strikes = Number.isFinite(game.strikes) ? game.strikes : 0;
        const outs = Number.isFinite(game.outs) ? game.outs : 0;

        const liveTagHtml = isLive
          ? `<div class="live-tag status-live">● LIVE</div>`
          : `<div class="live-tag status-other">${game.status || 'PRE-GAME'}</div>`;

        const basesHtml = isLive ? `
          <div class="bases-container">
              <div class="diamond-box">
                <div id="base2-${game.gamePk}" class="base ${game.runnerOn2b ? 'active' : ''}"></div>
              </div>
              <div class="diamond-box">
                <div id="base3-${game.gamePk}" class="base ${game.runnerOn3b ? 'active' : ''}"></div>
                <div id="base1-${game.gamePk}" class="base ${game.runnerOn1b ? 'active' : ''}"></div>
              </div>
              <div class="count-box">
                  <span id="balls-${game.gamePk}">B: ${balls}</span> |
                  <span id="strikes-${game.gamePk}">S: ${strikes}</span> |
                  <span id="outs-${game.gamePk}">O: ${outs}</span>
              </div>
          </div>
        ` : '';

        card.innerHTML = `
          <div class="match-header" onclick="window.location.href='/game-detail.html?gamePk=${game.gamePk}&date=${dateInput.value}'" style="cursor:pointer;">
            <div class="team-box">
              <img src="/logos/${game.awayAbbrev}.png" class="team-logo">
              <span class="team-abbr">${game.awayAbbrev}</span>
              <span class="team-record">${game.awayWins || 0}-${game.awayLosses || 0}</span>
              ${renderLast5Boxes(game.awayLast5)}
              <span class="pitcher-name">${game.awayPitcher || 'TBD'}</span>
            </div>
            <div class="game-status-center">
              ${liveTagHtml}
              <div style="font-size:10px; color:var(--muted); margin-top:2px;" id="inning-text-${game.gamePk}">${inningText}</div>
              <div class="score-now" id="score-${game.gamePk}">${awayScore} - ${homeScore}</div>
              ${basesHtml}
            </div>
            <div class="team-box">
              <img src="/logos/${game.homeAbbrev}.png" class="team-logo">
              <span class="team-abbr">${game.homeAbbrev}</span>
              <span class="team-record">${game.homeWins || 0}-${game.homeLosses || 0}</span>
              ${renderLast5Boxes(game.homeLast5)}
              <span class="pitcher-name">${game.homePitcher || 'TBD'}</span>
            </div>
          </div>
          ${renderLineups(lData)}
          <div id="results-${game.gamePk}">
            <button class="analyze-btn" onclick="analyzeGame('${game.gamePk}', '${game.awayAbbrev}', '${game.homeAbbrev}', '${game.status}')">ANALYZE WITH AI</button>
          </div>`;

        gamesGrid.appendChild(card);
      }

      status.textContent = `${data.games.length} games available.`;
    } catch (e) {
      status.textContent = "Error loading the board.";
      console.error(e);
    }
  }

  function renderPlayerList(title, players, type) {
    if (!players.length) {
      return `
        <div class="props-market-title">${title}</div>
        <div style="font-size:11px; color:var(--muted); padding:8px 0;">No data available</div>
      `;
    }

    return `
      <div class="props-market-title">${title}</div>
      ${players.map(p => {
        const imgSrc = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${p.personId}/headshot/67/current`;
        const statLine = type === 'hit'
          ? `Prob: ${p.hitChance}% | AVG: ${p.avg} | OPS: ${p.ops}`
          : `Prob: ${p.hrChance}% | HR: ${p.homeRuns} | SLG: ${p.slg}`;

        return `
          <div class="player-row">
            <img src="${imgSrc}" class="player-img" onerror="this.src='/logos/mlb_generic.png'">
            <div class="player-info">
              <span class="p-name">${p.name}</span>
              <span class="p-stats">${statLine}</span>
            </div>
          </div>
        `;
      }).join('')}
    `;
  }

  async function analyzeGame(gamePk, awayAbbrev, homeAbbrev, gameStatus) {
    const container = document.getElementById(`results-${gamePk}`);
    container.innerHTML = `<div class="loading">Running AI analysis...</div>`;

    try {
      const [anaRes, propRes] = await Promise.all([
        fetch(`/api/analyze/${gamePk}?date=${dateInput.value}`),
        fetch(`/api/baseball/player-props/${gamePk}`)
      ]);

      const anaData = await anaRes.json();
      const propData = await propRes.json();

      if (!anaData.ok) {
        container.innerHTML = '<div style="font-size:11px; color:red; text-align:center;">Analysis unavailable</div>';
        return;
      }

      const a = anaData.analysis;
      const loggedUser = JSON.parse(localStorage.getItem('user') || 'null');
      const isPro = loggedUser && loggedUser.proActivo === true;
      
      const allowedStatuses = ['Scheduled', 'Pre-Game', 'Warmup', 'Preview'];
      const canSavePick = allowedStatuses.some(s => String(gameStatus || '').toLowerCase().includes(s.toLowerCase()));

      if (canSavePick && anaData.ok) {
        const today = dateInput.value || new Date().toISOString().split('T')[0];
        const picksToSave = [];

        picksToSave.push({
          date: today,
          market: 'ML',
          gamePk,
          pick: a.pick,
          team: a.pick
        });

        if (a.runLine?.pick && a.runLine.pick !== 'N/A') {
          picksToSave.push({
            date: today,
            market: 'RL',
            gamePk,
            pick: a.runLine.pick
          });
        }

        fetch('/api/picks/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(picksToSave)
        }).catch(() => {});
      }

      const winPct = a.pick === a.away.team ? a.away.modelWinPct : a.home.modelWinPct;
      const confRaw = String(a.confidence || "").toLowerCase();
      let confNormalized = "low";

      if (confRaw.includes("alta") || confRaw.includes("high")) confNormalized = "high";
      if (confRaw.includes("media") || confRaw.includes("medium")) confNormalized = "medium";

      let colorClass =
        confNormalized === "high" ? "border-alta" :
        confNormalized === "medium" ? "border-media" :
        "border-baja";
      
      let html = `
        <div class="prediction-box ${colorClass}">
          <div class="section-header">
            <span style="color:var(--text)">🔥 Winner (Moneyline)</span>
            <span class="promo-tag" style="background:rgba(255,255,255,0.1); color:var(--text); animation:none;">${confNormalized.toUpperCase()}</span>
          </div>
          <span class="pick-val">${a.pick}</span>
          <div class="data-mono">Model Probability: ${Number(winPct).toFixed(2)}%</div>
        </div>`;

      if (!isPro) {
        html += `
          <div class="pro-lock-panel">
            <div class="lock-title">🔒 PRO Features Locked</div>
            <p style="font-size:11px; color:var(--muted); margin: 5px 0 10px 0;">Unlock advanced picks: Run Line, Totals & Player Props.</p>
            <button onclick="window.location.href='/precios.html'" class="btn-upgrade">UNLOCK NOW</button>
          </div>`;

        container.innerHTML = html;
        return;
      }

      html += `
        <div class="section">
          <div class="section-header"><span style="color:#2563eb">📊 Handicap (Run Line)</span></div>
          <span class="pick-val">${a.runLine?.pick || 'N/A'}</span>
          <div class="data-mono">Cover Prob: ${Number(a.runLine?.coverProb || 0).toFixed(2)}%</div>
        </div>

        <div class="section">
          <div class="section-header"><span style="color:var(--green)">📈 Team Totals</span></div>
          <div class="player-line" style="font-size:11px;"><span>${awayAbbrev}</span> <span style="font-weight:700; color:#fff;">${a.teamTotals?.away?.pick || 'TBD'}</span></div>
          <div class="player-line" style="font-size:11px;"><span>${homeAbbrev}</span> <span style="font-weight:700; color:#fff;">${a.teamTotals?.home?.pick || 'TBD'}</span></div>
        </div>

        <div class="section" style="border:none">
      `;

      if (propData.ok) {
        const allProps = propData.allProps || [];
        const sortedHits = [...allProps].sort((a, b) => Number(b.hitChance || 0) - Number(a.hitChance || 0));
        const sortedHR = [...allProps].sort((a, b) => Number(b.hrChance || 0) - Number(a.hrChance || 0));
        const lockPlayer = sortedHits[0];
        const hrPlayer = sortedHR[0];
        const valuePlayer = sortedHits.find(p => Number(p.hitChance) > 55 && Number(p.hitChance) < 70);

        html += `
        <div style="margin-bottom:15px;">
          <div style="font-size:10px;color:#6bff19;font-weight:900;margin-bottom:5px;">🔒 LOCK OF THE GAME</div>
          ${lockPlayer ? `
            <div class="player-row" style="border:1px solid #6bff19;">
              <img src="https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${lockPlayer.personId}/headshot/67/current" class="player-img">
              <div>
                <div class="p-name">${lockPlayer.name}</div>
                <div class="p-stats">Hit Prob: ${lockPlayer.hitChance}%</div>
              </div>
            </div>
          ` : ''}

          <div style="font-size:10px;color:#facc15;font-weight:900;margin:10px 0 5px;">💣 HR PICK OF THE GAME</div>
          ${hrPlayer ? `
            <div class="player-row" style="border:1px solid #facc15;">
              <img src="https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${hrPlayer.personId}/headshot/67/current" class="player-img">
              <div>
                <div class="p-name">${hrPlayer.name}</div>
                <div class="p-stats">HR Prob: ${hrPlayer.hrChance}%</div>
              </div>
            </div>
          ` : ''}
        </div>
        `;

        const topHits = sortedHits.slice(0, 3);
        const topHR = sortedHR.slice(0, 3);

        html += `
          <div class="section-header" style="margin-top:20px;"><span style="color:#facc15">💎 Top Player Props</span></div>
          <div>
            ${renderPlayerList('🔥 Top 3 Hit Probability (Game)', topHits, 'hit')}
            ${renderPlayerList('💣 Top 3 HR Potential (Game)', topHR, 'hr')}
          </div>
        `;
      } else {
        html += `<div style="font-size:11px; color:var(--muted); text-align:center; padding:10px;">Error loading props</div>`;
      }

      html += `</div>`;
      container.innerHTML = html;

    } catch (e) { 
      container.innerHTML = '<div style="font-size:11px; color:red; text-align:center;">Connection error. Please try again.</div>'; 
      console.error(e); 
    }
  }

  async function analyzeAll() {
    const btns = document.querySelectorAll('.analyze-btn');
    status.textContent = `Running AI analysis on ${btns.length} games...`;
    for (const b of btns) { 
      b.click(); 
      await new Promise(r => setTimeout(r, 1500)); 
    }
    status.textContent = "All games analyzed successfully.";
  }

  async function updateRealStats() {
    try {
      const res = await fetch('/api/stats/daily-performance?t=' + Date.now());
      const data = await res.json();
      if (data.ok) {
        // Asignación de elementos si existen en el DOM
        if(document.getElementById('statML')) document.getElementById('statML').textContent = data.mlSuccess + '%';
        if(document.getElementById('statProps')) document.getElementById('statProps').textContent = data.propsSuccess + '%';
        if(document.getElementById('totalVerdes')) document.getElementById('totalVerdes').textContent = data.totalWins;
      }
    } catch (e) {}
  }

  async function updateLiveScores() {
    if (document.visibilityState !== 'visible') return;
    try {
      const res = await fetch(`/api/baseball/live-scores?t=${Date.now()}`);
      const data = await res.json();
      if (data.ok && data.games) {
        data.games.forEach(g => {
          const scoreEl = document.querySelector(`#score-${g.gamePk}`);
          const inningEl = document.querySelector(`#inning-text-${g.gamePk}`);
          if (scoreEl) scoreEl.textContent = `${g.awayScore} - ${g.homeScore}`;
          if (inningEl) inningEl.textContent = `${g.inningState || ''} ${g.inning || ''}`;
          
          const b1 = document.querySelector(`#base1-${g.gamePk}`);
          const b2 = document.querySelector(`#base2-${g.gamePk}`);
          const b3 = document.querySelector(`#base3-${g.gamePk}`);
          if (b1) {
            g.runnerOn1b ? b1.classList.add('active') : b1.classList.remove('active');
            g.runnerOn2b ? b2.classList.add('active') : b2.classList.remove('active');
            g.runnerOn3b ? b3.classList.add('active') : b3.classList.remove('active');
            document.querySelector(`#balls-${g.gamePk}`).textContent = `B: ${g.balls || 0}`;
            document.querySelector(`#strikes-${g.gamePk}`).textContent = `S: ${g.strikes || 0}`;
            document.querySelector(`#outs-${g.gamePk}`).textContent = `O: ${g.outs || 0}`;
          }
        });
      }
    } catch (e) {}
  }

  setInterval(updateLiveScores, 30000);

  function renderLineups(data) {
    if (!data.ok || !data.awayLineup || data.awayLineup.length === 0) {
      return '<div style="font-size:9px; text-align:center; padding:10px; color:var(--muted); background:rgba(0,0,0,0.1); border-radius:8px; margin-bottom:15px;">Pending confirmed lineups...</div>';
    }
    const renderSide = (l) => l.slice(0, 9).map(p => `
      <div class="player-line">
        <span><span class="order-num">${String(p.battingOrder).charAt(0)}</span> ${p.name}</span>
        <span class="pos-tag">${p.pos}</span>
      </div>`).join('');
    return `
      <div class="lineup-container">
          <div style="display:flex; justify-content:space-between; gap:10px;">
              <div style="width:48%">${renderSide(data.awayLineup)}</div>
              <div style="width:48%">${renderSide(data.homeLineup)}</div>
          </div>
      </div>`;
  }

  function renderHeaderActions() {
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    const container = document.getElementById('headerActions');
    if (!user) {
      container.innerHTML = `
        <a href="login.html" class="btn-login">LOG IN</a>
        <a href="registro.html" class="btn-reg">SIGN UP</a>
      `;
    } else {
      const userName = user.nombre || user.email.split('@')[0];
      const planTag = user.proActivo 
        ? '<span style="color:var(--green); font-weight:800; margin-left:5px;">[PRO]</span>' 
        : '<span style="color:#facc15; font-weight:800; margin-left:5px;">[FREE]</span>';
      container.innerHTML = `
        <span style="font-size:12px; color:#fff; font-weight:700;">👤 ${userName}${planTag}</span>
        <button class="btn-logout" onclick="logout()">LOG OUT</button>
      `;
    }
  }

  function logout() {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  loadGames();
  initTicker();
  updateRealStats();
  renderHeaderActions();
</script>
</body>
</html>
